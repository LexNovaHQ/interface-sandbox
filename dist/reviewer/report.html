<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interface Report</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:#0b0d12;color:#f5f7fb}main{max-width:1040px;margin:0 auto;padding:48px 20px}p{color:#aab2c5;line-height:1.5}a{color:#9fc2ff}.card,.section{background:#0f1420;border:1px solid #252c3d;border-radius:16px;padding:22px;margin-top:24px}pre{white-space:pre-wrap;background:#111722;border:1px solid #2c3343;padding:16px;border-radius:10px;overflow:auto}.pill{display:inline-block;border:1px solid #2c3343;border-radius:999px;padding:4px 9px;margin:4px 6px 4px 0;color:#cfd6e6;font-size:12px}summary{cursor:pointer;color:#9fc2ff}
  </style>
</head>
<body>
  <main>
    <p><a href="/reviewer/">← Back to reviewer</a></p>
    <h1>Interface Report</h1>
    <p id="meta">Loading report...</p>
    <div id="report"></div>
  </main>

  <script>
    const API_BASE = '/api/interface-diligence';
    const params = new URLSearchParams(location.search);
    const runId = params.get('run_id') || '';
    const meta = document.getElementById('meta');
    const report = document.getElementById('report');

    load().catch((error) => {
      meta.textContent = 'Report failed to load.';
      report.innerHTML = '<pre>' + escapeHtml(error.message) + '</pre>';
    });

    async function load() {
      if (!runId) throw new Error('Missing run_id in report URL.');
      const path = '/public/' + 'reviewer' + '/report/' + encodeURIComponent(runId);
      const response = await fetch(API_BASE + path, { headers: { accept: 'application/json' } });
      const text = await response.text();
      const json = parseJson(text);
      if (!response.ok) throw new Error(response.status + ': ' + text);

      const payload = normalize(json.renderer_payload || {});
      const shell = payload.report_shell || {};
      const sections = getSections(payload);

      meta.innerHTML = [
        '<span class="pill">Run: ' + escapeHtml(runId) + '</span>',
        '<span class="pill">' + escapeHtml(shell.validation_status || payload.validation_status || 'REPORT_READY') + '</span>'
      ].join('');

      report.innerHTML = '<div class="card"><h2>' + escapeHtml(shell.report_title || 'Interface Public-Footprint Diligence Report') + '</h2>' +
        '<p>' + escapeHtml(shell.qualified_review_notice || 'Review-ready support material. Qualified review required before reliance.') + '</p>' +
        '<p>' + escapeHtml(shell.public_footprint_limitation || 'Public-footprint limitation applies.') + '</p></div>' +
        sections.map(renderSection).join('');
    }

    function normalize(value) {
      return value.renderer_payload && typeof value.renderer_payload === 'object' ? value.renderer_payload : value;
    }

    function getSections(payload) {
      if (Array.isArray(payload.section_list)) return payload.section_list;
      if (payload.sections && typeof payload.sections === 'object') {
        const order = Array.isArray(payload.section_order) ? payload.section_order : Object.keys(payload.sections);
        return order.map((key) => ({ id: key, title: payload.sections[key]?.heading || key, data: payload.sections[key] || {} }));
      }
      if (Array.isArray(payload.sections)) return payload.sections;
      return [];
    }

    function renderSection(section) {
      const data = section.data || section;
      return '<section class="section"><h2>' + escapeHtml(section.title || data.heading || section.id || 'Section') + '</h2>' +
        summary(data) + '<details><summary>Technical payload</summary><pre>' + escapeHtml(JSON.stringify(data, null, 2)) + '</pre></details></section>';
    }

    function summary(data) {
      if (!data || typeof data !== 'object') return '';
      return Object.keys(data).filter((key) => !['key','heading'].includes(key)).slice(0, 6).map((key) => {
        return '<p><strong>' + escapeHtml(label(key)) + ':</strong> ' + escapeHtml(compact(data[key])) + '</p>';
      }).join('');
    }

    function compact(value) {
      if (value === null || value === undefined || value === '') return 'Not specified';
      if (['string','number','boolean'].includes(typeof value)) return String(value);
      if (Array.isArray(value)) return value.length + ' row(s)';
      if (typeof value === 'object') return Object.keys(value).length + ' field(s)';
      return String(value);
    }

    function label(value) {
      return String(value).replace(/_/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
    }

    function parseJson(text) {
      try { return JSON.parse(text || '{}'); } catch (_error) { return { raw: text }; }
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
