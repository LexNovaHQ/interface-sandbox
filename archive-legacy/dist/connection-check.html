<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interface Diligence Connection Check</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:#0b0d12;color:#f5f7fb}main{max-width:820px;margin:0 auto;padding:48px 20px}p{color:#aab2c5;line-height:1.5}button{padding:12px 16px;border:0;border-radius:10px;background:#f5f7fb;color:#0b0d12;font-weight:800;cursor:pointer}pre{white-space:pre-wrap;background:#111722;border:1px solid #2c3343;padding:16px;border-radius:10px;overflow:auto}a{color:#9fc2ff}.card{background:#0f1420;border:1px solid #252c3d;border-radius:16px;padding:22px;margin-top:24px}
  </style>
</head>
<body>
  <main>
    <p><a href="/">Back to Interface Sandbox</a></p>
    <h1>Connection Check</h1>
    <p>Health-only check for the Interface Diligence API proxy.</p>
    <div class="card">
      <button id="checkButton" type="button">Check backend health</button>
      <pre id="resultBox">Not checked.</pre>
    </div>
  </main>
  <script>
    const resultBox = document.getElementById("resultBox");
    document.getElementById("checkButton").addEventListener("click", async () => {
      resultBox.textContent = "Checking...";
      try {
        const response = await fetch("/api/interface-diligence/health", {
          method: "GET",
          headers: { accept: "application/json" }
        });
        const body = await response.text();
        resultBox.textContent = JSON.stringify({
          ok: response.ok,
          status: response.status,
          body
        }, null, 2);
      } catch (error) {
        resultBox.textContent = JSON.stringify({
          ok: false,
          error: error.message
        }, null, 2);
      }
    });
  </script>
</body>
</html>
