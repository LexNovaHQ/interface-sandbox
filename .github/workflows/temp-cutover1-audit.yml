name: Temporary Cutover 1 Validation

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Install backend dependencies
        working-directory: diligence-artifact-backend
        run: npm ci
      - name: Run Cutover 1 checks
        working-directory: diligence-artifact-backend
        run: |
          node scripts/check-no-legacy-registry-refs.mjs
          node scripts/check-phase3a-target-profile-package.mjs
