name: Temporary Cutover 1 Audit

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Build Cutover 1 audit ledger
        shell: bash
        run: |
          set -euo pipefail
          ROOT=diligence-artifact-backend
          TOKEN='TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml'
          {
            echo '=== LIVE REFERENCES ==='
            grep -RIn --exclude='TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml' --exclude-dir=node_modules --exclude-dir=archive-legacy "$TOKEN" "$ROOT" || true
            echo '=== TP.BIZ MARKERS ==='
            grep -n 'field_id: TP.BIZ.00[789]' "$ROOT/references/registry/Diligence_Field_Derivation_Registry.yml" || true
            grep -n 'field_id: TP.BIZ.010' "$ROOT/references/registry/Diligence_Field_Derivation_Registry.yml" || true
            echo '=== ADDENDUM ==='
            cat "$ROOT/references/registry/TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml"
          } > cutover1-audit.txt
          cat cutover1-audit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cutover1-audit
          path: cutover1-audit.txt
          if-no-files-found: error
