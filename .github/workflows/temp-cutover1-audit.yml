name: Temporary Cutover 1 Residue Scan

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  residue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Scan retired addendum references
        shell: bash
        run: |
          set -euo pipefail
          cd diligence-artifact-backend
          TOKEN='TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml'
          grep -RIn --exclude-dir=node_modules --exclude-dir=archive --exclude-dir=archive-legacy "$TOKEN" src scripts agent-packages references > ../cutover1-residue.txt || true
          cat ../cutover1-residue.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cutover1-residue
          path: cutover1-residue.txt
          if-no-files-found: error
