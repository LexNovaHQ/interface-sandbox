name: CO-FINAL Matrix Launcher f144

on:
  push:
    branches: [main]
    paths: [".github/workflows/co-final-launch-f144.yml"]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Record launcher execution on PR 95
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/LexNovaHQ/interface-sandbox/issues/95/comments \
            -f body="CO-FINAL corrected matrix launcher executed from main at run ${GITHUB_RUN_ID}; dispatching exact PR head f144d49."

      - name: Dispatch trusted isolated matrix workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            repos/LexNovaHQ/interface-sandbox/actions/workflows/artifact-backend-deploy.yml/dispatches \
            -f ref=main
