name: Temporary FDR Phase2A Cutover

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  cutover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Install backend dependencies
        working-directory: diligence-artifact-backend
        run: npm ci
      - name: Apply exact Cutover 1
        shell: bash
        run: |
          set -euo pipefail
          cd diligence-artifact-backend
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFileSync, writeFileSync, unlinkSync, existsSync, readdirSync, statSync } from 'node:fs';
          import path from 'node:path';
          import yaml from 'js-yaml';

          const FDR = 'references/registry/Diligence_Field_Derivation_Registry.yml';
          const ADDENDUM = 'references/registry/TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml';
          const PROMPT = 'agent-packages/agent_3_target_feature/02_M7_TARGET_PROFILE_BACKEND_CURRENT.md';
          const AUTHORITY = 'references/registry/M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml';
          const GUARD = 'scripts/check-no-legacy-registry-refs.mjs';
          const TOKEN = 'TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml';

          assert.ok(existsSync(ADDENDUM), 'ADDENDUM_MISSING_BEFORE_CUTOVER');
          const fdrText = readFileSync(FDR, 'utf8');
          const addendumText = readFileSync(ADDENDUM, 'utf8');
          const fdr = yaml.load(fdrText);
          const addendum = yaml.load(addendumText);

          assert.equal(fdr.registry.row_count, 456, 'FDR_ROW_COUNT_NOT_456');
          assert.equal(fdr.registry.version, 'v3.1_agnostic_multidomain_provenance', 'FDR_VERSION_NOT_V3_1');
          const fdrRows = new Map(fdr.fields.map((row) => [row.field_id, row]));
          for (const legacyRow of addendum.fields) {
            assert.ok(['TP.BIZ.009', 'TP.BIZ.010'].includes(legacyRow.field_id), `UNEXPECTED_ADDENDUM_ROW:${legacyRow.field_id}`);
            assert.ok(fdrRows.has(legacyRow.field_id), `FDR_ROW_MISSING:${legacyRow.field_id}`);
            assert.deepEqual(fdrRows.get(legacyRow.field_id), legacyRow, `FDR_ROW_NOT_LOSSLESS:${legacyRow.field_id}`);
          }
          assert.equal(addendum.fields.length, 2, 'ADDENDUM_ROW_COUNT_NOT_2');
          assert.equal(fdr.fields.filter((row) => row.field_id === 'TP.BIZ.009').length, 1, 'TP_BIZ_009_DUPLICATE');
          assert.equal(fdr.fields.filter((row) => row.field_id === 'TP.BIZ.010').length, 1, 'TP_BIZ_010_DUPLICATE');

          let prompt = readFileSync(PROMPT, 'utf8');
          const oldPromptLine = '`TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml` governs the two public operating-context signal fields when present through the active authority chain.';
          const newPromptLine = '`Diligence_Field_Derivation_Registry.yml` governs the two public operating-context signal fields through `TP.BIZ.009` and `TP.BIZ.010`.';
          assert.ok(prompt.includes(oldPromptLine), 'PROMPT_ADDENDUM_REFERENCE_NOT_FOUND');
          prompt = prompt.replace(oldPromptLine, newPromptLine);
          writeFileSync(PROMPT, prompt, 'utf8');

          let authority = readFileSync(AUTHORITY, 'utf8');
          const authorityLine = '    - TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml\n';
          assert.ok(authority.includes(authorityLine), 'AUTHORITY_ADDENDUM_REFERENCE_NOT_FOUND');
          authority = authority.replace(authorityLine, '');
          writeFileSync(AUTHORITY, authority, 'utf8');

          let guard = readFileSync(GUARD, 'utf8');
          const oldDeadTail = '  ["CLASSIFICATION", "DERIVATION", "MATRIX"].join("_")\n]);';
          const newDeadTail = '  ["CLASSIFICATION", "DERIVATION", "MATRIX"].join("_"),\n  ["TARGET", "PROFILE", "PUBLIC", "REGULATORY", "GRIEVANCE", "FIELD", "ADDENDUM.yaml"].join("_")\n]);';
          assert.ok(guard.includes(oldDeadTail), 'GUARD_DEAD_LIST_ANCHOR_NOT_FOUND');
          guard = guard.replace(oldDeadTail, newDeadTail);
          assert.ok(guard.includes('const roots = ["src", "scripts", "agent-packages"];'), 'GUARD_ROOTS_ANCHOR_NOT_FOUND');
          guard = guard.replace('const roots = ["src", "scripts", "agent-packages"];', 'const roots = ["src", "scripts", "agent-packages", "references"];');
          writeFileSync(GUARD, guard, 'utf8');

          unlinkSync(ADDENDUM);

          const residue = [];
          for (const root of ['src', 'scripts', 'agent-packages', 'references']) walk(root);
          function walk(target) {
            if (!existsSync(target)) return;
            const stat = statSync(target);
            if (stat.isFile()) {
              if (!/\.(?:js|mjs|cjs|json|md|ya?ml)$/i.test(target)) return;
              if (readFileSync(target, 'utf8').includes(TOKEN)) residue.push(target);
              return;
            }
            for (const entry of readdirSync(target)) {
              if (['node_modules', '.git', 'archive', 'archive-legacy'].includes(entry)) continue;
              walk(path.join(target, entry));
            }
          }
          assert.deepEqual(residue, [], `ADDENDUM_REFERENCE_RESIDUE:${residue.join(',')}`);
          console.log(JSON.stringify({ cutover: 'TP.BIZ.009_TP.BIZ.010_TO_FDR', status: 'PASS' }, null, 2));
          NODE
      - name: Run Cutover 1 checks
        working-directory: diligence-artifact-backend
        run: |
          node scripts/check-no-legacy-registry-refs.mjs
          node scripts/check-phase3a-target-profile-package.mjs
      - name: Commit Cutover 1
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diligence-artifact-backend/references/registry/Diligence_Field_Derivation_Registry.yml \
                  diligence-artifact-backend/references/registry/M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml \
                  diligence-artifact-backend/agent-packages/agent_3_target_feature/02_M7_TARGET_PROFILE_BACKEND_CURRENT.md \
                  diligence-artifact-backend/scripts/check-no-legacy-registry-refs.mjs
          git rm diligence-artifact-backend/references/registry/TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml
          git commit -m 'Cutover TP.BIZ.009 and TP.BIZ.010 to FDR'
          git push origin HEAD:domain-gate-v0-preflight
