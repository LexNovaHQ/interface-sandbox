name: Phase 1 RB00 RB01 Validation

on:
  pull_request:
    paths:
      - "diligence-artifact-backend/src/phases/01-source-discovery/contracts/**"
      - "diligence-artifact-backend/test/fixtures/phase1-universal-baselines/**"
      - "diligence-artifact-backend/scripts/check-phase1-public-contract-freeze.mjs"
      - "diligence-artifact-backend/scripts/check-phase1-universal-baseline-red.mjs"
      - "diligence-artifact-backend/package.json"
      - ".github/workflows/phase1-rb00-rb01.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Validate frozen public contract and expected-red baselines
        run: npm run check:phase1-rb00-rb01
