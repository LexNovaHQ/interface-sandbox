name: Contract Sync Patch

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - contract-sync-patch-trigger.txt
      - .github/workflows/contract-sync-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Patch Phase 7 read permissions
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('diligence-artifact-backend/src/runtime/contracts/artifact-permissions.contract.js')
          text = path.read_text()
          old = 'const DATA_PROVENANCE_MINIMAL_READS = Object.freeze([ART.targetProfile, ART.domainDerivationProfile, ART.activityInventory, ART.activityProfile, ...DOMAIN_GATE_RUNTIME_ARTIFACT_NAMES, ART.dataPrivacyNavigationIndex, ...PHASE7_DAP_LAYER4_ARTIFACT_NAMES, ...PHASE7_DAP_LAYER5_ARTIFACT_NAMES, ART.dapSemanticBatchValidationPattern]);'
          new = 'const DATA_PROVENANCE_MINIMAL_READS = Object.freeze([ART.legalCartographyIndex, ART.legalSignalDerivationProfile, ART.targetProfile, ART.domainDerivationProfile, ART.activityInventory, ART.activityProfile, ...DOMAIN_GATE_RUNTIME_ARTIFACT_NAMES, ART.dataPrivacyNavigationIndex, ...PHASE7_DAP_LAYER4_ARTIFACT_NAMES, ...PHASE7_DAP_LAYER5_ARTIFACT_NAMES, ART.dapSemanticBatchValidationPattern]);'
          if old not in text:
              raise SystemExit('DATA_PROVENANCE_MINIMAL_READS_TARGET_NOT_FOUND')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diligence-artifact-backend/src/runtime/contracts/artifact-permissions.contract.js
          git rm .github/workflows/contract-sync-patch.yml
          git commit -m "Sync Phase 7 routed legal read permissions"
          git push origin HEAD:domain-gate-v0-preflight
