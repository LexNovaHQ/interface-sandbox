name: Contract Sync Patch

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - contract-sync-patch-trigger-phase7-terminal.txt
      - .github/workflows/contract-sync-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Patch Phase 7 terminal output expectation
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('diligence-artifact-backend/scripts/check-phase7-data-provenance-profile.mjs')
          text = path.read_text()
          old = '''  assert.deepEqual(phase7.terminal_outputs, [
    "dap_registry_manifest",
    "dap_strategic_derivation_matrix",
    "dap_semantic_batch_route_manifest",
    ...PHASE7_DAP_LAYER4_ARTIFACT_NAMES.filter((name) => name.startsWith("dap_semantic_batch_")),
    "dap_semantic_batch_validation_manifest",
    "data_provenance_profile_semantic_batch_gate"
  ]);'''
          new = '''  assert.deepEqual(phase7.terminal_outputs, [
    "dap_registry_manifest",
    "dap_strategic_derivation_matrix",
    ...PHASE7_DAP_LAYER4_ARTIFACT_NAMES.filter((name) => name.startsWith("dap_semantic_batch_")),
    "dap_semantic_batch_validation_manifest",
    "data_provenance_profile_semantic_batch_gate"
  ]);
  assert.equal(new Set(phase7.terminal_outputs).size, phase7.terminal_outputs.length, "Phase7 terminal outputs must not contain duplicates");'''
          if old not in text:
              raise SystemExit('PHASE7_TERMINAL_OUTPUT_ASSERTION_TARGET_NOT_FOUND')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diligence-artifact-backend/scripts/check-phase7-data-provenance-profile.mjs
          git rm .github/workflows/contract-sync-patch.yml
          git commit -m "Sync Phase 7 terminal output checker"
          git push origin HEAD:domain-gate-v0-preflight
