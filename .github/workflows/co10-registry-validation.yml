name: Temporary Seven Command Evidence Runner

on:
  push:
    branches:
      - co10-registry-validation-work
    paths:
      - .github/workflows/co10-registry-validation.yml

permissions:
  contents: write

jobs:
  run-acceptance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: No-op carrier
        run: echo 'PR-triggered acceptance workflow on base branch owns rerun'

# synchronize PR head after base workflow install
