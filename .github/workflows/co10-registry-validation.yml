name: Temporary Package Lock Generator

on:
  push:
    branches:
      - co10-registry-validation-work
    paths:
      - .github/workflows/co10-registry-validation.yml

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Run npm install
        working-directory: diligence-artifact-backend
        run: npm install
      - name: Commit generated package-lock.json to working branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add diligence-artifact-backend/package-lock.json
          git commit -m 'CO-1 Generate package lockfile'
          git push origin HEAD:domain-gate-v0-preflight

# trigger pull-request acceptance after base workflow installation
