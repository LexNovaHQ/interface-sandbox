name: Runtime API Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'runtime-api/**'
      - 'functions/_prompts/**'
      - 'functions/_schemas/**'
      - 'scripts/generate-diligence-*.mjs'
      - '.github/workflows/runtime-api-deploy.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - audit-existing-runtime
      runtime_url:
        description: 'Existing runtime URL for audit-existing-runtime mode'
        required: false
        default: 'https://lexnova-runtime-api-24qnalslaa-uc.a.run.app'
        type: string

jobs:
  check:
    name: Runtime syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Generate diligence bundles
        run: npm run build:runtime

      - name: Package generated diligence bundles
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Syntax check
        working-directory: runtime-api
        run: npm run check

  deploy:
    name: Deploy Cloud Run runtime
    needs: check
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Generate diligence bundles
        run: npm run build:runtime

      - name: Package generated diligence bundles
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: runtime-api
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_CLOUD_RUN_SERVICE: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          GEMINI_SEARCH_API_KEYS: ${{ secrets.GEMINI_SEARCH_API_KEYS }}
          GEMINI_JSON_API_KEYS: ${{ secrets.GEMINI_JSON_API_KEYS }}
          GEMINI_REASONING_API_KEYS: ${{ secrets.GEMINI_REASONING_API_KEYS }}
          GEMINI_REGISTRY_API_KEYS: ${{ secrets.GEMINI_REGISTRY_API_KEYS }}
          GEMINI_SEARCH_MODEL_SEQUENCE: ${{ secrets.GEMINI_SEARCH_MODEL_SEQUENCE }}
          GEMINI_JSON_MODEL_SEQUENCE: ${{ secrets.GEMINI_JSON_MODEL_SEQUENCE }}
          GEMINI_REASONING_MODEL_SEQUENCE: ${{ secrets.GEMINI_REASONING_MODEL_SEQUENCE }}
          GEMINI_REGISTRY_MODEL_SEQUENCE: ${{ secrets.GEMINI_REGISTRY_MODEL_SEQUENCE }}
          GEMINI_FINAL_MODEL_SEQUENCE: ${{ secrets.GEMINI_FINAL_MODEL_SEQUENCE }}
        run: |
          set -euo pipefail

          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GCP_CLOUD_RUN_SERVICE
            RUNTIME_ACCESS_TOKEN
            ALLOWED_ORIGIN
            GEMINI_SEARCH_API_KEYS
            GEMINI_JSON_API_KEYS
            GEMINI_REASONING_API_KEYS
            GEMINI_REGISTRY_API_KEYS
            GEMINI_SEARCH_MODEL_SEQUENCE
            GEMINI_JSON_MODEL_SEQUENCE
            GEMINI_REASONING_MODEL_SEQUENCE
            GEMINI_REGISTRY_MODEL_SEQUENCE
            GEMINI_FINAL_MODEL_SEQUENCE
          )

          for name in "${required[@]}"; do
            value="${!name:-}"
            if [[ -z "$value" ]]; then
              echo "Missing required secret/env: $name" >&2
              exit 1
            fi
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "Secret/env contains a newline and must be re-saved as a single-line value: $name" >&2
              exit 1
            fi
          done

          gcloud run deploy "$GCP_CLOUD_RUN_SERVICE" \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --set-env-vars="^|^RUNTIME_ACCESS_TOKEN=${RUNTIME_ACCESS_TOKEN}|ALLOWED_ORIGIN=${ALLOWED_ORIGIN}|GEMINI_SEARCH_API_KEYS=${GEMINI_SEARCH_API_KEYS}|GEMINI_JSON_API_KEYS=${GEMINI_JSON_API_KEYS}|GEMINI_REASONING_API_KEYS=${GEMINI_REASONING_API_KEYS}|GEMINI_REGISTRY_API_KEYS=${GEMINI_REGISTRY_API_KEYS}|GEMINI_SEARCH_MODEL_SEQUENCE=${GEMINI_SEARCH_MODEL_SEQUENCE}|GEMINI_JSON_MODEL_SEQUENCE=${GEMINI_JSON_MODEL_SEQUENCE}|GEMINI_REASONING_MODEL_SEQUENCE=${GEMINI_REASONING_MODEL_SEQUENCE}|GEMINI_REGISTRY_MODEL_SEQUENCE=${GEMINI_REGISTRY_MODEL_SEQUENCE}|GEMINI_FINAL_MODEL_SEQUENCE=${GEMINI_FINAL_MODEL_SEQUENCE}"

      - name: Resolve runtime URL
        id: runtime
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_CLOUD_RUN_SERVICE: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$GCP_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Smoke deployed runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage5:features

      - name: Run Stage 6 Legal Stack Review E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage6:legal

      - name: Run Stage 7 Registry Ledger E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage7:registry

      - name: Run Stage 8 Operator Challenge E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage8:operator

      - name: Run Stage 9 Report Assembler E2E
        working-directory: runtime-api
        run: npm run e2e:stage9:report

      - name: Render Stage 9 HTML report
        working-directory: runtime-api
        run: npm run render:stage9:html

      - name: Run Stage 10 Vault Handoff E2E
        working-directory: runtime-api
        run: npm run e2e:stage10:vault

      - name: Verify Stage 7/8/9/10 report exports
        if: always()
        run: |
          ls -la runtime-api/.runtime-e2e-cache || true
          test -f runtime-api/.runtime-e2e-cache/stage7-priority-ledger.json && echo "stage7 audit export found" || echo "stage7 audit export missing"
          test -f runtime-api/.runtime-e2e-cache/stage8-operator-challenge.json && echo "stage8 audit export found" || echo "stage8 audit export missing"
          test -f runtime-api/.runtime-e2e-cache/stage8-corrected-ledger.json && echo "stage8 corrected ledger found" || echo "stage8 corrected ledger missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-data.json && echo "stage9 report data found" || echo "stage9 report data missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-preview.json && echo "stage9 report preview found" || echo "stage9 report preview missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-validation.json && echo "stage9 report validation found" || echo "stage9 report validation missing"
          test -f runtime-api/.runtime-e2e-cache/legal-exposure-diligence-report.html && echo "stage9 HTML report found" || echo "stage9 HTML report missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-html-render-validation.json && echo "stage9 HTML validation found" || echo "stage9 HTML validation missing"
          test -f runtime-api/.runtime-e2e-cache/review-ready-remediation-handoff.json && echo "stage10 handoff found" || echo "stage10 handoff missing"
          test -f runtime-api/.runtime-e2e-cache/vault-handoff-preview.json && echo "stage10 handoff preview found" || echo "stage10 handoff preview missing"
          test -f runtime-api/.runtime-e2e-cache/stage10-handoff-validation.json && echo "stage10 handoff validation found" || echo "stage10 handoff validation missing"

      - name: Upload runtime E2E cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-cache
          path: runtime-api/.runtime-e2e-cache/**
          include-hidden-files: true
          if-no-files-found: warn

  audit-existing-runtime:
    needs: check
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'audit-existing-runtime'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Generate diligence bundles
        run: npm run build:runtime

      - name: Package generated diligence bundles
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Smoke existing runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage5:features

      - name: Run Stage 6 Legal Stack Review E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage6:legal

      - name: Run Stage 7 Registry Ledger E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage7:registry

      - name: Run Stage 8 Operator Challenge E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage8:operator

      - name: Run Stage 9 Report Assembler E2E
        working-directory: runtime-api
        run: npm run e2e:stage9:report

      - name: Render Stage 9 HTML report
        working-directory: runtime-api
        run: npm run render:stage9:html

      - name: Run Stage 10 Vault Handoff E2E
        working-directory: runtime-api
        run: npm run e2e:stage10:vault

      - name: Verify Stage 7/8/9/10 report exports
        if: always()
        run: |
          ls -la runtime-api/.runtime-e2e-cache || true
          test -f runtime-api/.runtime-e2e-cache/stage7-priority-ledger.json && echo "stage7 audit export found" || echo "stage7 audit export missing"
          test -f runtime-api/.runtime-e2e-cache/stage8-operator-challenge.json && echo "stage8 audit export found" || echo "stage8 audit export missing"
          test -f runtime-api/.runtime-e2e-cache/stage8-corrected-ledger.json && echo "stage8 corrected ledger found" || echo "stage8 corrected ledger missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-data.json && echo "stage9 report data found" || echo "stage9 report data missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-preview.json && echo "stage9 report preview found" || echo "stage9 report preview missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-report-validation.json && echo "stage9 report validation found" || echo "stage9 report validation missing"
          test -f runtime-api/.runtime-e2e-cache/legal-exposure-diligence-report.html && echo "stage9 HTML report found" || echo "stage9 HTML report missing"
          test -f runtime-api/.runtime-e2e-cache/stage9-html-render-validation.json && echo "stage9 HTML validation found" || echo "stage9 HTML validation missing"
          test -f runtime-api/.runtime-e2e-cache/review-ready-remediation-handoff.json && echo "stage10 handoff found" || echo "stage10 handoff missing"
          test -f runtime-api/.runtime-e2e-cache/vault-handoff-preview.json && echo "stage10 handoff preview found" || echo "stage10 handoff preview missing"
          test -f runtime-api/.runtime-e2e-cache/stage10-handoff-validation.json && echo "stage10 handoff validation found" || echo "stage10 handoff validation missing"

      - name: Upload runtime E2E cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-cache
          path: runtime-api/.runtime-e2e-cache/**
          include-hidden-files: true
          if-no-files-found: warn
