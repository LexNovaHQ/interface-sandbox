name: Runtime API Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'runtime-api/**'
      - '.github/workflows/runtime-api-deploy.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runtime deps
        working-directory: runtime-api
        run: npm ci

      - name: Runtime syntax check
        working-directory: runtime-api
        run: npm run check

  deploy:
    needs: check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runtime deps
        working-directory: runtime-api
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push runtime image
        working-directory: runtime-api
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lexnova-runtime-api/runtime-api:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run runtime
        id: runtime
        run: |
          gcloud run deploy lexnova-runtime-api \
            --image "$IMAGE" \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "RUNTIME_ACCESS_TOKEN=${{ secrets.RUNTIME_ACCESS_TOKEN }}" \
            --set-secrets "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_SECRET_NAME }}:latest,GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2_SECRET_NAME }}:latest,GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3_SECRET_NAME }}:latest,GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4_SECRET_NAME }}:latest,GEMINI_API_KEY_5=${{ secrets.GEMINI_API_KEY_5_SECRET_NAME }}:latest,GEMINI_API_KEY_6=${{ secrets.GEMINI_API_KEY_6_SECRET_NAME }}:latest,GEMINI_API_KEY_7=${{ secrets.GEMINI_API_KEY_7_SECRET_NAME }}:latest,GEMINI_API_KEY_8=${{ secrets.GEMINI_API_KEY_8_SECRET_NAME }}:latest,GEMINI_API_KEY_9=${{ secrets.GEMINI_API_KEY_9_SECRET_NAME }}:latest,GEMINI_API_KEY_10=${{ secrets.GEMINI_API_KEY_10_SECRET_NAME }}:latest" \
            --quiet
          URL=$(gcloud run services describe lexnova-runtime-api --region us-central1 --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke deployed runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage5:features

      - name: Run Stage 6 Legal Stack Review E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage6:legal

      - name: Run Stage 7 Registry Ledger E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ steps.runtime.outputs.url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run e2e:stage7:registry

      - name: Upload runtime E2E cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-cache
          path: runtime-api/.runtime-e2e-cache
          if-no-files-found: warn
