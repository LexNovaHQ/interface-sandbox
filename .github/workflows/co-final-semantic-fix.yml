name: CO-FINAL Semantic Fix

on:
  push:
    branches:
      - co-e2e-01-03-critical-authority
    paths:
      - ".github/workflows/co-final-semantic-fix.yml"
      - "diligence-artifact-backend/scripts/apply-co-final-semantic-fixes.py"
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - ".github/workflows/co-final-semantic-fix.yml"
      - "diligence-artifact-backend/scripts/apply-co-final-semantic-fixes.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: co-final-semantic-fix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-exact-semantic-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout authorized branch head
        uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Apply exact-count semantic fixes
        run: python diligence-artifact-backend/scripts/apply-co-final-semantic-fixes.py

      - name: Validate corrected JavaScript syntax
        run: |
          node --check diligence-artifact-backend/src/phases/07-data-provenance-profile/layer2-anti-unknown-protocol.js
          node --check diligence-artifact-backend/src/phases/07-data-provenance-profile/layer2-source-navigation-inventory-builder.js

      - name: Run semantic outcome integrity audit
        working-directory: diligence-artifact-backend
        run: node scripts/check-semantic-outcome-integrity.mjs

      - name: Commit only authorized semantic corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.invalid"
          git add -- \
            diligence-artifact-backend/agent-packages/agent_3_target_feature/00_TERMINAL_RECEIPT_RULES_INTEGRATED.md \
            diligence-artifact-backend/agent-packages/agent_4_data_privacy/00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED.md \
            diligence-artifact-backend/agent-packages/agent_4_data_privacy/M10_DATA_PROVENANCE.md \
            diligence-artifact-backend/prompts/02_M7_TARGET_PROFILE_RUNTIME_SYNC_PATCHED_STEP1_LOCKED_v3.md \
            diligence-artifact-backend/prompts/03_M8_FEATURE_PROFILE_RUNTIME_SYNC_PATCHED_STEP2_UPDATED.md \
            diligence-artifact-backend/src/phases/07-data-provenance-profile/layer2-anti-unknown-protocol.js \
            diligence-artifact-backend/src/phases/07-data-provenance-profile/layer2-source-navigation-inventory-builder.js
          if git diff --cached --quiet; then
            echo "No semantic corrections remained to commit."
            exit 0
          fi
          git commit -m "Apply CO-FINAL semantic outcome corrections"
          git push origin HEAD:co-e2e-01-03-critical-authority
