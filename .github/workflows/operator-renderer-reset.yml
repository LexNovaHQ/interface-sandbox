name: Operator Renderer Reset

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Reviewer run id"
        required: true
        default: "LN-20260702-151836-SARVAM-AI-737590"
      artifact_name:
        description: "Artifact to delete and regenerate"
        required: true
        default: "renderer_payload"

permissions:
  contents: read
  id-token: write

jobs:
  reset-renderer:
    name: Delete stale renderer and rerun RENDERER
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: diligence-artifact-backend
        run: npm install

      - name: Delete stale renderer artifact and reset run
        working-directory: diligence-artifact-backend
        env:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
        run: |
          set -euo pipefail
          test "$ARTIFACT_NAME" = "renderer_payload"
          test -n "$RUN_ID"
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_CLOUD_RUN_SERVICE"
          test -n "$GPT_ACTION_API_KEY"
          node --input-type=module <<'NODE'
          import crypto from "node:crypto";
          import { google } from "googleapis";
          import { initializeApp, applicationDefault, getApps } from "firebase-admin/app";
          import { getFirestore } from "firebase-admin/firestore";

          const runId = process.env.RUN_ID;
          const artifactName = process.env.ARTIFACT_NAME;
          const projectId = process.env.GCP_PROJECT_ID;

          if (artifactName !== "renderer_payload") {
            throw new Error(`REFUSING_UNSUPPORTED_ARTIFACT:${artifactName}`);
          }

          if (!getApps().length) {
            initializeApp({ credential: applicationDefault(), projectId });
          }

          const db = getFirestore();
          const drive = google.drive({ version: "v3", auth: new google.auth.GoogleAuth({ scopes: ["https://www.googleapis.com/auth/drive"] }) });
          const runRef = db.collection("runs").doc(runId);
          const artifactRef = runRef.collection("artifacts").doc(artifactName);
          const runBeforeSnap = await runRef.get();
          if (!runBeforeSnap.exists) throw new Error(`RUN_NOT_FOUND:${runId}`);
          const runBefore = runBeforeSnap.data();
          const artifactSnap = await artifactRef.get();

          let deletedDriveFileId = "";
          let deletedLatestVersion = 0;

          if (artifactSnap.exists) {
            const artifact = artifactSnap.data();
            deletedDriveFileId = artifact.drive_file_id || "";
            deletedLatestVersion = Number(artifact.latest_version || artifact.version || 0);
            if (deletedDriveFileId) {
              await drive.files.delete({ fileId: deletedDriveFileId, supportsAllDrives: true }).catch((error) => {
                if (error?.code !== 404) throw error;
              });
            }
            const versionsSnap = await artifactRef.collection("versions").get();
            const batch = db.batch();
            versionsSnap.docs.forEach((doc) => batch.delete(doc.ref));
            batch.delete(artifactRef);
            await batch.commit();
          }

          const now = new Date().toISOString();
          await runRef.set({
            current_phase: "RENDERER",
            status: "LOCKED_WITH_LIMITATIONS",
            runner_state: "IDLE",
            runner_auto_continue: false,
            runner_active_phase: "",
            runner_last_error: "",
            final_report_url: "",
            updated_at: now
          }, { merge: true });

          const eventRef = runRef.collection("events").doc(crypto.randomUUID().replaceAll("-", ""));
          await eventRef.set({
            run_id: runId,
            event_id: eventRef.id,
            event_type: "OPERATOR_RENDERER_ARTIFACT_RESET",
            actor: "github-actions-operator",
            created_at: now,
            payload: {
              artifact_name: artifactName,
              deleted_drive_file_id_present: Boolean(deletedDriveFileId),
              deleted_latest_version: deletedLatestVersion,
              prior_status: runBefore.status || "",
              prior_current_phase: runBefore.current_phase || "",
              reset_phase: "RENDERER"
            }
          });

          const runAfter = (await runRef.get()).data();
          const artifactAfter = await artifactRef.get();
          console.log(JSON.stringify({
            ok: true,
            run_id: runId,
            deleted_renderer_payload: artifactSnap.exists,
            deleted_drive_file_id_present: Boolean(deletedDriveFileId),
            deleted_latest_version: deletedLatestVersion,
            before: {
              status: runBefore.status || "",
              current_phase: runBefore.current_phase || "",
              runner_state: runBefore.runner_state || ""
            },
            after: {
              status: runAfter.status || "",
              current_phase: runAfter.current_phase || "",
              runner_state: runAfter.runner_state || "",
              renderer_artifact_exists: artifactAfter.exists
            }
          }, null, 2));
          NODE

      - name: Rerun renderer once
        env:
          RUN_ID: ${{ inputs.run_id }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format="value(status.url)")
          echo "Artifact backend URL: $URL"
          curl --fail-with-body -sS \
            -H "content-type: application/json" \
            -H "x-ln-api-key: $GPT_ACTION_API_KEY" \
            -X POST \
            -d '{"auto_continue":false}' \
            "$URL/v1/reviewer/jobs/$RUN_ID/worker"
          echo

      - name: Verify renderer regenerated
        working-directory: diligence-artifact-backend
        env:
          RUN_ID: ${{ inputs.run_id }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { initializeApp, applicationDefault, getApps } from "firebase-admin/app";
          import { getFirestore } from "firebase-admin/firestore";

          const runId = process.env.RUN_ID;
          const projectId = process.env.GCP_PROJECT_ID;
          if (!getApps().length) initializeApp({ credential: applicationDefault(), projectId });
          const runRef = getFirestore().collection("runs").doc(runId);
          const run = (await runRef.get()).data();
          const renderer = await runRef.collection("artifacts").doc("renderer_payload").get();
          if (!renderer.exists) throw new Error("RENDERER_ARTIFACT_NOT_REGENERATED");
          const meta = renderer.data();
          if (run.status !== "COMPLETE" || run.current_phase !== "COMPLETE") {
            throw new Error(`RUN_NOT_COMPLETE_AFTER_RENDERER:${run.status}:${run.current_phase}`);
          }
          console.log(JSON.stringify({
            ok: true,
            run_id: runId,
            status: run.status,
            current_phase: run.current_phase,
            final_report_url: run.final_report_url || "",
            renderer_payload: {
              latest_version: meta.latest_version || meta.version || 0,
              lock_status: meta.lock_status || "",
              updated_at: meta.updated_at || meta.created_at || "",
              drive_file_id_present: Boolean(meta.drive_file_id)
            }
          }, null, 2));
          NODE
