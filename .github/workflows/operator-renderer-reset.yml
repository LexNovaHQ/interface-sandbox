name: Operator Renderer Reset

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Reviewer run id"
        required: true
        default: "LN-20260702-151836-SARVAM-AI-737590"
      artifact_name:
        description: "Artifact to delete and regenerate"
        required: true
        default: "renderer_payload"

permissions:
  contents: read
  id-token: write

jobs:
  reset-renderer:
    name: Delete stale renderer and rerun RENDERER
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform,https://www.googleapis.com/auth/drive

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Delete stale renderer artifact and reset run
        env:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
          GCLOUD_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          test "$ARTIFACT_NAME" = "renderer_payload"
          test -n "$RUN_ID"
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_CLOUD_RUN_SERVICE"
          test -n "$GPT_ACTION_API_KEY"
          test -n "$GCLOUD_ACCESS_TOKEN"
          node .github/scripts/operator-renderer-reset.mjs

      - name: Rerun renderer once
        env:
          RUN_ID: ${{ inputs.run_id }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format="value(status.url)")
          echo "Artifact backend URL: $URL"
          curl --fail-with-body -sS \
            -H "content-type: application/json" \
            -H "x-ln-api-key: $GPT_ACTION_API_KEY" \
            -X POST \
            -d '{"auto_continue":false}' \
            "$URL/v1/reviewer/jobs/$RUN_ID/worker"
          echo

      - name: Verify renderer regenerated
        env:
          RUN_ID: ${{ inputs.run_id }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCLOUD_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          test -n "$GCLOUD_ACCESS_TOKEN"
          node .github/scripts/operator-renderer-verify.mjs
