name: CO-FINAL Trusted Main Live Matrix

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: co-final-trusted-main-live-matrix
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      GEMINI_MODELS: ${{ secrets.GEMINI_MODELS }}
      DRIVE_PARENT_FOLDER_ID: ${{ secrets.DRIVE_PARENT_FOLDER_ID }}
      SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
      CERT_BRANCH: co-e2e-01-03-critical-authority
      CERT_SERVICE: interface-diligence-cert-pr95
      CERT_QUEUE: diligence-cert-pr95
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact PR tree
        uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Authenticate with trusted main identity
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute isolated eight-scenario matrix
        shell: bash
        run: bash diligence-artifact-backend/co-final-live-matrix-run.sh

      - name: Upload live evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: co-final-eight-scenario-live-matrix-${{ github.run_id }}
          path: |
            /tmp/co-final-live-matrix.json
            diligence-artifact-backend/audits/CO_FINAL_EIGHT_SCENARIO_LIVE_MATRIX_RUNTIME.json
          if-no-files-found: warn
          retention-days: 30
