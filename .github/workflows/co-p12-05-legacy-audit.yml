name: CO P12 05 Legacy Audit

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - diligence-artifact-backend/scripts/audit-co-p12-05-legacy.mjs
      - .github/workflows/co-p12-05-legacy-audit.yml

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - run: npm ci
      - run: node scripts/audit-co-p12-05-legacy.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: co-p12-05-legacy-audit
          path: diligence-artifact-backend/co-p12-05-legacy-audit.json
          retention-days: 2
