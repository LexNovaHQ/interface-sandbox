name: Temporary Seven Command Acceptance Rerun

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Run seven-command sequence and capture evidence
        shell: bash
        run: |
          set +e
          cd diligence-artifact-backend
          LOG="$RUNNER_TEMP/seven-command-acceptance.log"
          JSON="$RUNNER_TEMP/seven-command-status.json"
          : > "$LOG"
          overall=0
          results=''
          run_step() {
            number="$1"
            label="$2"
            shift 2
            echo "===== COMMAND $number: $label =====" | tee -a "$LOG"
            "$@" >> "$LOG" 2>&1
            status=$?
            echo "EXIT_STATUS=$status" | tee -a "$LOG"
            echo >> "$LOG"
            if [ "$status" -ne 0 ]; then overall=1; fi
            if [ -n "$results" ]; then results="$results,"; fi
            results="$results{\"command\":$number,\"label\":\"$label\",\"exit_status\":$status}"
          }
          run_step 1 'npm install' npm install
          run_step 2 'runtime YAML dependency fixture' node scripts/check-runtime-yaml-dep.mjs
          run_step 3 'assembled registry fixture' node scripts/check-domain-registry-assembled.mjs
          run_step 4 'no legacy registry references' node scripts/check-no-legacy-registry-refs.mjs
          run_step 5 'Phase 3 domain derivation contract' node scripts/check-phase3-domain-derivation-contract.mjs
          run_step 6 'Phase 3A target profile package' node scripts/check-phase3a-target-profile-package.mjs
          run_step 7 'full repository check' npm run check
          printf '{\n  "branch": "domain-gate-v0-preflight",\n  "base_head": "8df51f6cc40c5446fddcf9d4a3359d1245b09c98",\n  "overall_status": %s,\n  "commands": [%s]\n}\n' "$overall" "$results" > "$JSON"
          cp "$LOG" ../.seven-command-acceptance.log
          cp "$JSON" ../.seven-command-status.json
      - name: Commit evidence to acceptance branch
        shell: bash
        run: |
          set -euo pipefail
          cp .seven-command-acceptance.log "$RUNNER_TEMP/"
          cp .seven-command-status.json "$RUNNER_TEMP/"
          git fetch origin acceptance-rerun-m7-route
          git checkout -B acceptance-rerun-m7-route origin/acceptance-rerun-m7-route
          cp "$RUNNER_TEMP/seven-command-acceptance.log" .seven-command-acceptance.log
          cp "$RUNNER_TEMP/seven-command-status.json" .seven-command-status.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .seven-command-acceptance.log .seven-command-status.json
          git commit -m 'Temporary seven-command acceptance evidence rerun'
          git push origin HEAD:acceptance-rerun-m7-route
