name: Deploy Landing Console and Verify
# one-use trigger: deploy Phase 1 legacy-prefix guard repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/landing-console-deploy-controller.yml"

permissions:
  actions: write
  contents: read

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Dispatch and verify Artifact Backend Deploy
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'artifact-backend-deploy.yml';
            const startedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { mode: 'deploy' }
            });

            let run = null;
            for (let attempt = 0; attempt < 60; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 10000));
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                branch: 'main',
                event: 'workflow_dispatch',
                per_page: 20
              });
              run = response.data.workflow_runs.find(candidate =>
                Date.parse(candidate.created_at) >= startedAt - 15000
              ) || null;
              if (run) break;
            }

            if (!run) throw new Error('Dispatched Artifact Backend Deploy run was not found.');
            core.info(`Tracking deployment run ${run.id}: ${run.html_url}`);

            for (let attempt = 0; attempt < 180 && run.status !== 'completed'; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 10000));
              const response = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: run.id });
              run = response.data;
            }

            if (run.status !== 'completed') throw new Error(`Deployment run ${run.id} did not complete within the polling window.`);
            core.info(`Deployment run ${run.id} completed with ${run.conclusion}.`);
            core.info(`Source commit: ${run.head_sha}`);
            if (run.conclusion !== 'success') core.setFailed(`Artifact Backend Deploy run ${run.id} concluded with ${run.conclusion}.`);
