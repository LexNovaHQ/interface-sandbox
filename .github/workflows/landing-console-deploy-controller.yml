name: Dispatch Live Run Status and Verify

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/landing-console-deploy-controller.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch and verify live run status
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'live-run-status.yml';
            const startedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { target: 'Sarvam AI', max_runs: '5' }
            });

            let run = null;
            for (let attempt = 0; attempt < 60; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 5000));
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                branch: 'main',
                event: 'workflow_dispatch',
                per_page: 20
              });
              run = response.data.workflow_runs.find(candidate =>
                Date.parse(candidate.created_at) >= startedAt - 15000
              ) || null;
              if (run) break;
            }

            if (!run) throw new Error('Dispatched Live Run Status workflow was not found.');
            core.info(`Tracking status run ${run.id}: ${run.html_url}`);

            for (let attempt = 0; attempt < 120 && run.status !== 'completed'; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 5000));
              const response = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: run.id });
              run = response.data;
            }

            if (run.status !== 'completed') throw new Error(`Status run ${run.id} did not complete within the polling window.`);
            core.info(`Status run ${run.id} completed with ${run.conclusion}.`);
            if (run.conclusion !== 'success') core.setFailed(`Live Run Status run ${run.id} concluded with ${run.conclusion}.`);

# one-use-sarvam-status-dispatch-1
