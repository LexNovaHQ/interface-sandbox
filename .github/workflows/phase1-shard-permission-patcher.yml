name: Phase 1 Shard Permission Patcher

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase1-shard-permission-patcher.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Tighten bounded root shard matcher
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("diligence-artifact-backend/src/runtime/contracts/artifact-permissions.contract.js")
          text = path.read_text(encoding="utf-8")
          old = '  if (String(permission || "").startsWith("lossless_root__")) return artifactName === permission || artifactName.startsWith(`${permission}__part_`);'
          new = '  if (String(permission || "").startsWith("lossless_root__")) return artifactName === permission || (LOSSLESS_COMMON_ROOT_PART_ARTIFACT_PATTERN.test(artifactName) && artifactName.startsWith(`${permission}__part_`));'
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("lossless-root permission matcher not found")
          PY
          git diff --check
          if git diff --quiet; then
            echo "Bounded matcher already present."
            exit 0
          fi
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.com"
          git add diligence-artifact-backend/src/runtime/contracts/artifact-permissions.contract.js
          git commit -m "Bound Phase 1 shard permissions to three-digit parts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
