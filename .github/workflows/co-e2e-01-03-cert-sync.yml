name: Apply CO-E2E-01-03 certification sync

on:
  pull_request:
    branches: [domain-gate-v0-preflight]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'co-e2e-01-03-critical-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0
      - name: Apply synchronization
        working-directory: diligence-artifact-backend
        run: node scripts/apply-co-e2e-01-03-cert-sync.mjs
      - name: Remove temporary files
        run: |
          rm diligence-artifact-backend/scripts/apply-co-e2e-01-03-cert-sync.mjs
          rm .github/workflows/co-e2e-01-03-cert-sync.yml
          rm .github/workflows/co-e2e-01-03-debug.yml
      - name: Commit synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Synchronize CO-E2E-01-03 certification contracts"
          git push origin HEAD:co-e2e-01-03-critical-authority
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - working-directory: diligence-artifact-backend
        run: npm ci
      - working-directory: diligence-artifact-backend
        run: npm run check:phase1-16-production
