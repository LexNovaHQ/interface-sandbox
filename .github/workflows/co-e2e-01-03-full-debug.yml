name: Capture CO-E2E-01-03 full gate

on:
  pull_request:
    branches: [domain-gate-v0-preflight]
    types: [synchronize]

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'co-e2e-01-03-critical-authority'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - run: npm ci
      - name: Capture full gate
        run: |
          set +e
          npm run check:phase1-16-production > full-gate-debug.log 2>&1
          code=$?
          cat full-gate-debug.log
          echo "$code" > full-gate-debug.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: co-e2e-full-gate-debug
          path: |
            diligence-artifact-backend/full-gate-debug.log
            diligence-artifact-backend/full-gate-debug.exit
