name: Report Artifact Deploy Once

on:
  workflow_run:
    workflows:
      - Artifact Backend Deploy
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Publish deployment result to PR 96
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const conclusion = run.conclusion || 'unknown';
            const status = conclusion === 'success' ? '**PASS**' : `**${conclusion.toUpperCase()}**`;
            const body = [
              '## Artifact Backend Deploy receipt',
              '',
              `- Result: ${status}`,
              `- Source branch: \`${run.head_branch}\``,
              `- Source commit: \`${run.head_sha}\``,
              `- Workflow run: ${run.html_url}`,
              `- Completed at: \`${run.updated_at}\``
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 96,
              body
            });
            if (conclusion !== 'success') {
              core.setFailed(`Artifact Backend Deploy concluded with ${conclusion}`);
            }
