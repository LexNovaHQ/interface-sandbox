name: Phase 1 Shard Persistence Patcher

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase1-shard-persistence-patcher.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply bounded Phase 1 shard persistence patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          pipeline_path = Path("diligence-artifact-backend/src/runtime/contracts/pipeline.contract.js")
          pipeline = pipeline_path.read_text(encoding="utf-8")
          old_contract = 'optional_writes: AGENT_1B_OPTIONAL_ROOT_ARTIFACT_NAMES, dynamic_writes: ["legal_doc_{DOC_TYPE}"]'
          new_contract = 'optional_writes: [], dynamic_writes: [...AGENT_1B_OPTIONAL_ROOT_ARTIFACT_NAMES, "legal_doc_{DOC_TYPE}"]'
          if old_contract in pipeline:
              pipeline = pipeline.replace(old_contract, new_contract, 1)
              pipeline_path.write_text(pipeline, encoding="utf-8")
          elif new_contract not in pipeline:
              raise SystemExit("AGENT_1B_EXTRACT contract shape not found")

          check_path = Path("diligence-artifact-backend/scripts/check-phase1-agnostic-source-discovery.mjs")
          check = check_path.read_text(encoding="utf-8")
          permission_import = 'import { AGENT_1B_OPTIONAL_ROOT_ARTIFACT_NAMES, artifactMatchesPermission } from "../src/runtime/contracts/artifact-permissions.contract.js";\n'
          anchor_import = 'import { isLegacyFamilyArtifactName } from "../src/phases/01-source-discovery/validators/source-discovery.validator.js";\n'
          if permission_import not in check:
              if anchor_import not in check:
                  raise SystemExit("Phase 1 validator import anchor not found")
              check = check.replace(anchor_import, anchor_import + permission_import, 1)

          assertion_block = '''\nconst companyIdentityRootPermission = AGENT_1B_OPTIONAL_ROOT_ARTIFACT_NAMES.find((name) => name === "lossless_root__company_identity");
          assert.ok(companyIdentityRootPermission, "company_identity root permission missing");
          assert.equal(artifactMatchesPermission("lossless_root__company_identity", companyIdentityRootPermission), true, "single company_identity root must match its bounded permission");
          assert.equal(artifactMatchesPermission("lossless_root__company_identity__part_001", companyIdentityRootPermission), true, "company_identity shard must match its bounded root permission");
          assert.equal(artifactMatchesPermission("lossless_root__company_identity__part_01", companyIdentityRootPermission), false, "malformed shard suffix must be rejected");
          assert.equal(artifactMatchesPermission("lossless_root__unknown__part_001", companyIdentityRootPermission), false, "unknown root shard must be rejected");
          assert.ok(pipelineContract.includes('optional_writes: [], dynamic_writes: [...AGENT_1B_OPTIONAL_ROOT_ARTIFACT_NAMES, "legal_doc_{DOC_TYPE}"]'), "Phase 1B must persist both single roots and physical root shards through bounded dynamic writes");
          '''
          assertion_marker = 'assert.equal(isLegacyFamilyArtifactName("lossless_root__homepage_landing"), false, "active lossless-root artifacts must be accepted");\n'
          if 'companyIdentityRootPermission' not in check:
              if assertion_marker not in check:
                  raise SystemExit("Phase 1 regression assertion anchor not found")
              check = check.replace(assertion_marker, assertion_marker + assertion_block, 1)
              check_path.write_text(check, encoding="utf-8")
          PY

          git diff --check
          if git diff --quiet; then
            echo "Patch already present."
            exit 0
          fi
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.com"
          git add diligence-artifact-backend/src/runtime/contracts/pipeline.contract.js diligence-artifact-backend/scripts/check-phase1-agnostic-source-discovery.mjs
          git commit -m "Persist Phase 1 sparse root shards"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
