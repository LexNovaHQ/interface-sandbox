name: Temporary CO8 Registry Residue Scan

on:
  push:
    branches:
      - co8-registry-repoint-work
    paths:
      - .github/workflows/co8-registry-repoint.yml

permissions:
  contents: write

jobs:
  residue-scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co8-registry-repoint-work
      - name: Build retired-token hit ledger
        run: |
          set -euo pipefail
          cd diligence-artifact-backend
          pattern='DOMAIN_DERIVATION_REGISTRY_v0|AI_REGISTRY_KEY\.md|FIELD_DERIVATION_REGISTRY_v2_LOCKED|REGISTRY_KEY_v3_0|CLASSIFICATION_DERIVATION_MATRIX'
          grep -RInE "$pattern" src scripts agent-packages > ../.co8-legacy-hits.txt || true
          if [ ! -s ../.co8-legacy-hits.txt ]; then
            echo CLEAN > ../.co8-legacy-hits.txt
          fi
      - name: Commit temporary hit ledger
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .co8-legacy-hits.txt
          git commit -m 'Temporary CO-8 legacy token hit ledger'
          git push origin HEAD:co8-registry-repoint-work
