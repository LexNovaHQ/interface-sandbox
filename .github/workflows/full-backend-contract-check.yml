name: Full Backend Contract Check

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - full-backend-contract-check-trigger.txt
      - .github/workflows/full-backend-contract-check.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run full backend contract suite
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee full-backend-contract-check.log
      - name: Upload full backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-backend-contract-check-log-${{ github.run_number }}
          path: diligence-artifact-backend/full-backend-contract-check.log
          retention-days: 3
