name: CO-FINAL Forensics Alias Fix

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - ".github/workflows/co-final-forensics-alias-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: co-final-forensics-alias-fix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-exact-forensics-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout authorized branch
        uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Apply exact-count forensic status corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("diligence-artifact-backend/src/phases/_shared/forensics/profile-forensics.shared.js")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '    coverage_result: uncovered.length ? "COVERAGE_LIMITED_TARGETED_REINVESTIGATION_REQUIRED" : "PASS",',
                  '    coverage_result: uncovered.length ? "REINVESTIGATION_REQUIRED" : "PASS",',
                  1,
              ),
              (
                  '    targeted_reinvestigation_required: uncovered.length > 0,',
                  '''    targeted_reinvestigation_required: uncovered.length > 0,
              reinvestigation_metadata: uncovered.length ? {
                status: "REINVESTIGATION_REQUIRED",
                reinvestigation_owner_phase: "ACTIVITY_PROFILE_REVIEW",
                reinvestigation_scope: uncovered.map((row) => row.candidate_id),
                reinvestigation_reason_code: "FEATURE_CANDIDATE_COVERAGE_LIMITED",
                attempt_limit: 2,
                blocking: false
              } : null,''',
                  1,
              ),
              (
                  '        required_action: "TARGETED_REINVESTIGATION_REQUIRED",',
                  '''        required_action: "REINVESTIGATION_REQUIRED",
                    reinvestigation_owner_phase: "ACTIVITY_PROFILE_REVIEW",
                    reinvestigation_scope: row.candidate_id,
                    reinvestigation_reason_code: "FEATURE_CANDIDATE_UNCOVERED",
                    attempt_limit: 2,''',
                  1,
              ),
              (
                  '          coverage_disposition: "TARGETED_REINVESTIGATION_REQUIRED",',
                  '''          coverage_disposition: "UNCOVERED_FEATURE_CANDIDATE",
                    reinvestigation_metadata: {
                      status: "REINVESTIGATION_REQUIRED",
                      reinvestigation_owner_phase: "ACTIVITY_PROFILE_REVIEW",
                      reinvestigation_scope: candidate.candidate_id,
                      reinvestigation_reason_code: "FEATURE_CANDIDATE_UNCOVERED",
                      attempt_limit: 2,
                      blocking: false
                    },''',
                  1,
              ),
          ]

          for old, new, expected in replacements:
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f"exact replacement count mismatch: expected={expected} found={count} source={old!r}")
              text = text.replace(old, new)

          for forbidden in (
              "COVERAGE_LIMITED_TARGETED_REINVESTIGATION_REQUIRED",
              "TARGETED_REINVESTIGATION_REQUIRED",
          ):
              if forbidden in text:
                  raise SystemExit(f"forbidden forensic alias remains: {forbidden}")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Install locked dependencies
        working-directory: diligence-artifact-backend
        run: npm ci

      - name: Validate corrected forensics and outcome semantics
        working-directory: diligence-artifact-backend
        run: |
          node --check src/phases/_shared/forensics/profile-forensics.shared.js
          node scripts/check-activity-profile-forensics-runtime-smoke.mjs
          node scripts/check-target-profile-forensics-runtime-smoke.mjs
          node scripts/check-semantic-outcome-integrity.mjs

      - name: Commit corrected forensic ledger
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.invalid"
          git add diligence-artifact-backend/src/phases/_shared/forensics/profile-forensics.shared.js
          git diff --cached --check
          git commit -m "Canonicalize shared forensic reinvestigation metadata"
          git pull --rebase origin co-e2e-01-03-critical-authority
          git push origin HEAD:co-e2e-01-03-critical-authority
