name: Runtime API Full Live Audit

on:
  workflow_dispatch:
    inputs:
      runtime_url:
        description: "Existing deployed runtime URL"
        required: true
        default: "https://lexnova-runtime-api-24qnalslaa-uc.a.run.app"
        type: string
      target_url:
        description: "Target URL for full live runtime audit"
        required: true
        default: "https://sarvam.ai"
        type: string
      company_name:
        description: "Company name for full live runtime audit"
        required: true
        default: "Sarvam AI"
        type: string
      artifact_retention_days:
        description: "Audit artifact retention in days"
        required: true
        default: "30"
        type: string
      audit_stop_stage:
        description: "Audit stop stage. Default runs through Stage 6B with canonical Stage 5 audit UI."
        required: true
        default: "6b"
        type: string

permissions:
  contents: read

jobs:
  full-live-runtime-audit:
    name: Full live runtime audit through Stage 6B
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Build runtime bundles
        run: npm run build:runtime

      - name: Package generated bundles for runtime-api
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Runtime syntax check
        working-directory: runtime-api
        run: npm run check

      - name: Clear audit artifacts
        run: |
          set -euo pipefail
          rm -rf runtime-api/.runtime-e2e-cache/full-runtime-audit
          rm -rf runtime-api/.runtime-e2e-cache/staged-live-runtime-audit
          rm -rf runtime-api/.runtime-e2e-cache/stage5*
          rm -rf runtime-api/.runtime-e2e-cache/stage6*
          rm -rf runtime-api/source-scout-output
          rm -rf runtime-api/step2-output
          rm -rf runtime-api/step5-quality-audit
          mkdir -p runtime-api/.runtime-e2e-cache/full-runtime-audit

      - name: Smoke existing/deployed runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Runtime API Full Live Audit through Stage 6B
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          AUDIT_TARGET_URL: ${{ inputs.target_url }}
          AUDIT_COMPANY_NAME: ${{ inputs.company_name }}
          AUDIT_STOP_STAGE: ${{ inputs.audit_stop_stage }}
          AUDIT_OUTPUT_DIR: .runtime-e2e-cache/full-runtime-audit
          STAGE5_CANONICAL_ENABLED: "true"
          STAGE5_CANONICAL_BLOCKING: "true"
          STAGE5_LEGACY_FALLBACK: "false"
          GEMINI_SEARCH_API_KEYS: ${{ secrets.GEMINI_SEARCH_API_KEYS }}
          GEMINI_JSON_API_KEYS: ${{ secrets.GEMINI_JSON_API_KEYS }}
          GEMINI_REASONING_API_KEYS: ${{ secrets.GEMINI_REASONING_API_KEYS }}
          GEMINI_REGISTRY_API_KEYS: ${{ secrets.GEMINI_REGISTRY_API_KEYS }}
          GEMINI_SEARCH_MODEL_SEQUENCE: ${{ secrets.GEMINI_SEARCH_MODEL_SEQUENCE }}
          GEMINI_JSON_MODEL_SEQUENCE: ${{ secrets.GEMINI_JSON_MODEL_SEQUENCE }}
          GEMINI_REASONING_MODEL_SEQUENCE: ${{ secrets.GEMINI_REASONING_MODEL_SEQUENCE }}
          GEMINI_REGISTRY_MODEL_SEQUENCE: ${{ secrets.GEMINI_REGISTRY_MODEL_SEQUENCE }}
          GEMINI_FINAL_MODEL_SEQUENCE: ${{ secrets.GEMINI_FINAL_MODEL_SEQUENCE }}
        run: npm run audit:full-live-runtime

      - name: Publish Stage 5 canonical audit UI
        if: always()
        working-directory: runtime-api
        env:
          AUDIT_OUTPUT_DIR: .runtime-e2e-cache/full-runtime-audit
        run: node scripts/publish-stage5-audit-ui.mjs

      - name: Upload full live audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-live-runtime-audit-${{ github.run_id }}
          path: runtime-api/.runtime-e2e-cache/full-runtime-audit
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
