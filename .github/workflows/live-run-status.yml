name: Live Run Status

on:
  workflow_dispatch:
    inputs:
      target:
        description: Exact run target label
        required: true
        default: Sarvam AI
        type: string
      max_runs:
        description: Maximum matching runs to return
        required: true
        default: "5"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'diligence-reviewer-worker' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Read matching production runs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT }}
          TARGET: ${{ inputs.target }}
          MAX_RUNS: ${{ inputs.max_runs }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TARGET"
          [[ "$MAX_RUNS" =~ ^[0-9]+$ ]]
          test "$MAX_RUNS" -ge 1
          test "$MAX_RUNS" -le 20

          jq -n --arg target "$TARGET" --argjson limit 100 '{
            structuredQuery: {
              from: [{collectionId: "runs"}],
              where: {
                fieldFilter: {
                  field: {fieldPath: "target"},
                  op: "EQUAL",
                  value: {stringValue: $target}
                }
              },
              limit: $limit
            }
          }' > /tmp/query.json

          query_firestore() {
            local token="$1"
            curl --silent --show-error \
              -o /tmp/firestore.json \
              -w '%{http_code}' \
              -H "Authorization: Bearer $token" \
              -H 'Content-Type: application/json' \
              --data @/tmp/query.json \
              "https://firestore.googleapis.com/v1/projects/$GCP_PROJECT_ID/databases/(default)/documents:runQuery"
          }

          TOKEN=$(gcloud auth print-access-token)
          HTTP_CODE=$(query_firestore "$TOKEN")
          AUTH_MODE="DEPLOY_SERVICE_ACCOUNT"

          if [[ "$HTTP_CODE" != "200" && -n "$GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT" ]]; then
            echo "Direct Firestore read returned HTTP $HTTP_CODE; attempting runtime-service-account impersonation."
            if IMPERSONATED_TOKEN=$(gcloud auth print-access-token --impersonate-service-account="$GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT" 2>/tmp/impersonation-error.txt); then
              HTTP_CODE=$(query_firestore "$IMPERSONATED_TOKEN")
              AUTH_MODE="RUNTIME_SERVICE_ACCOUNT_IMPERSONATION"
            else
              echo "Runtime service-account impersonation was unavailable:"
              cat /tmp/impersonation-error.txt
            fi
          fi

          echo "Firestore read auth mode: $AUTH_MODE"
          echo "Firestore read HTTP status: $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Firestore response:"
            jq . /tmp/firestore.json 2>/dev/null || cat /tmp/firestore.json
            exit 1
          fi

          if ! jq -e 'type == "array"' /tmp/firestore.json >/dev/null; then
            echo "Firestore response was not a runQuery result array:"
            jq . /tmp/firestore.json 2>/dev/null || cat /tmp/firestore.json
            exit 1
          fi

          jq --argjson max "$MAX_RUNS" '[.[] | select(.document) | .document.fields | {
            run_id: (.run_id.stringValue // ""),
            target: (.target.stringValue // ""),
            root_url: (.root_url.stringValue // ""),
            created_at: (.created_at.stringValue // ""),
            updated_at: (.updated_at.stringValue // ""),
            status: (.status.stringValue // ""),
            current_phase: (.current_phase.stringValue // ""),
            central_phase: (.central_phase.stringValue // ""),
            central_phase_label: (.central_phase_label.stringValue // ""),
            active_internal_job: (.active_internal_job.stringValue // ""),
            runner_state: (.runner_state.stringValue // ""),
            runner_last_error: (.runner_last_error.stringValue // ""),
            runner_worker_heartbeat_at: (.runner_worker_heartbeat_at.stringValue // ""),
            runner_last_completed_at: (.runner_last_completed_at.stringValue // ""),
            artifact_count: ((.artifact_count.integerValue // "0") | tonumber),
            diligence_qa_complete: (.diligence_qa_complete.booleanValue // false),
            assembly_authorized: (.assembly_authorized.booleanValue // false),
            assembly_complete: (.assembly_complete.booleanValue // false)
          }] | sort_by(.created_at) | reverse | .[0:$max]' /tmp/firestore.json | tee /tmp/live-run-status.json

          test "$(jq length /tmp/live-run-status.json)" -gt 0

          QUEUE_DIAGNOSTIC_STATUS="AVAILABLE"
          if ! gcloud tasks queues describe "$CLOUD_TASKS_QUEUE" \
            --location "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format=json > /tmp/cloud-tasks-queue.json 2>/tmp/cloud-tasks-queue-error.txt; then
            QUEUE_DIAGNOSTIC_STATUS="UNAVAILABLE"
            printf '{}\n' > /tmp/cloud-tasks-queue.json
          fi

          if [[ "$QUEUE_DIAGNOSTIC_STATUS" == "AVAILABLE" ]]; then
            if ! gcloud tasks list \
              --queue "$CLOUD_TASKS_QUEUE" \
              --location "$GCP_REGION" \
              --project "$GCP_PROJECT_ID" \
              --limit=100 \
              --format=json > /tmp/cloud-tasks-list.json 2>/tmp/cloud-tasks-list-error.txt; then
              printf '[]\n' > /tmp/cloud-tasks-list.json
            fi
          else
            printf '[]\n' > /tmp/cloud-tasks-list.json
          fi

          jq '{state, rateLimits, retryConfig, stats}' /tmp/cloud-tasks-queue.json > /tmp/cloud-tasks-queue-summary.json
          jq '[.[] | {name, scheduleTime, createTime, dispatchCount, responseCount, firstAttempt, lastAttempt}]' /tmp/cloud-tasks-list.json > /tmp/cloud-tasks-list-summary.json

          LOG_DIAGNOSTIC_STATUS="AVAILABLE"
          SINCE=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          LOG_FILTER="resource.type=cloud_run_revision AND resource.labels.service_name=$GCP_ARTIFACT_CLOUD_RUN_SERVICE AND timestamp>=\"$SINCE\""
          if ! gcloud logging read "$LOG_FILTER" \
            --project "$GCP_PROJECT_ID" \
            --limit=500 \
            --order=desc \
            --format=json > /tmp/cloud-run-logs.json 2>/tmp/cloud-run-logs-error.txt; then
            LOG_DIAGNOSTIC_STATUS="UNAVAILABLE"
            printf '[]\n' > /tmp/cloud-run-logs.json
          fi

          jq '[.[] | select((.textPayload // .jsonPayload.message // .jsonPayload.error // "") | test("SARVAM|LN-20260715|ERROR|FAILED|M9|P2_"; "i")) | {
            timestamp,
            severity,
            revision: .resource.labels.revision_name,
            text: (.textPayload // .jsonPayload.message // .jsonPayload.error // .jsonPayload)
          }][0:200]' /tmp/cloud-run-logs.json > /tmp/cloud-run-relevant-logs.json

          {
            echo "## Production run status — $TARGET"
            echo "- Firestore auth mode: $AUTH_MODE"
            echo "- Queue diagnostics: $QUEUE_DIAGNOSTIC_STATUS"
            echo "- Worker-log diagnostics: $LOG_DIAGNOSTIC_STATUS"
            echo '```json'
            cat /tmp/live-run-status.json
            echo '```'
            echo '## Cloud Tasks queue'
            echo '```json'
            cat /tmp/cloud-tasks-queue-summary.json
            echo '```'
            echo '## Pending tasks'
            echo '```json'
            cat /tmp/cloud-tasks-list-summary.json
            echo '```'
            echo '## Relevant worker logs'
            echo '```json'
            cat /tmp/cloud-run-relevant-logs.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload status evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-run-status-${{ github.run_id }}
          path: |
            /tmp/live-run-status.json
            /tmp/firestore.json
            /tmp/impersonation-error.txt
            /tmp/cloud-tasks-queue.json
            /tmp/cloud-tasks-queue-summary.json
            /tmp/cloud-tasks-queue-error.txt
            /tmp/cloud-tasks-list.json
            /tmp/cloud-tasks-list-summary.json
            /tmp/cloud-tasks-list-error.txt
            /tmp/cloud-run-logs.json
            /tmp/cloud-run-relevant-logs.json
            /tmp/cloud-run-logs-error.txt
          if-no-files-found: warn
          retention-days: 7
