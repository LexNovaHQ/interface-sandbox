name: CO-FINAL Public Transport Smoke

on:
  push:
    branches:
      - co-e2e-01-03-critical-authority
    paths:
      - ".github/workflows/co-final-public-transport-smoke.yml"
      - "diligence-artifact-backend/scripts/co-final-public-transport-smoke.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: co-final-public-transport-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-and-record-public-transport-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout authorized branch
        uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Execute one-phase real public transport smoke
        id: smoke
        continue-on-error: true
        env:
          CO_FINAL_PUBLIC_BASE_URL: https://sandbox.lexnovahq.com
        run: python diligence-artifact-backend/scripts/co-final-public-transport-smoke.py

      - name: Commit redacted live transport receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.invalid"
          git add diligence-artifact-backend/audits/CO_FINAL_PUBLIC_TRANSPORT_SMOKE.json
          git diff --cached --check
          git commit -m "Record CO-FINAL public transport smoke receipt"
          git pull --rebase origin co-e2e-01-03-critical-authority
          git push origin HEAD:co-e2e-01-03-critical-authority

      - name: Enforce smoke result
        if: steps.smoke.outcome != 'success'
        run: exit 1
