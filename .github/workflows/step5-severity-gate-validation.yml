name: Step 5 Severity Gate Validation

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - step5-severity-gate-validation-trigger.txt
      - .github/workflows/step5-severity-gate-validation.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate severity policy
        run: npm run check:production-gate-severity
      - name: Validate active syntax
        run: npm run check:syntax:active
      - name: Validate Phase 12 post-clean gate
        run: npm run check:phase12-post-clean
      - name: Run universal production gate
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee step5-severity-gate-validation.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step5-severity-gate-validation-${{ github.run_number }}
          path: diligence-artifact-backend/step5-severity-gate-validation.log
          retention-days: 3
