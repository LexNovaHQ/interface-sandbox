name: Phase 1 Shard Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase1-shard-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - name: Install
        working-directory: diligence-artifact-backend
        run: npm ci --silent
      - name: Run critical gate and capture failure
        id: critical
        working-directory: diligence-artifact-backend
        shell: bash
        run: |
          set +e
          npm run check:critical > critical.log 2>&1
          status=$?
          tail -n 40 critical.log
          exit $status
      - name: Upload bounded critical log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-shard-critical-log-${{ github.run_id }}
          path: diligence-artifact-backend/critical.log
          if-no-files-found: error
          retention-days: 3
