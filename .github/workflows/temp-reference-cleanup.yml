name: Temporary Reference Cleanup

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - name: Correct scrubbed FDR comment
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('diligence-artifact-backend/references/registry/Diligence_Field_Derivation_Registry.yml')
          text = path.read_text(encoding='utf-8')
          old = '#   Migrated from the retired the retired standalone domain registry. This block holds'
          new = '#   Consolidated into this registry. This block holds'
          if old not in text:
              raise SystemExit('EXPECTED_DUPLICATED_COMMENT_NOT_FOUND')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit correction to working branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diligence-artifact-backend/references/registry/Diligence_Field_Derivation_Registry.yml
          git commit -m 'Correct FDR registry consolidation comment'
          git push origin HEAD:domain-gate-v0-preflight
