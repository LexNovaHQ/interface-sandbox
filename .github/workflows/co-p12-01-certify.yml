name: CO P12 01 Certify

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - diligence-artifact-backend/**
      - .github/workflows/co-p12-01-certify.yml
      - co-p12-01-validation-trigger.txt

permissions:
  contents: write

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Execute CO-P12-01 acceptance
        id: acceptance
        shell: bash
        run: |
          set +e
          npm run check:p12:co1 > co-p12-01-certification.log 2>&1
          code=$?
          cat co-p12-01-certification.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write certified receipt to target branch
        if: steps.acceptance.outputs.exit_code == '0'
        uses: actions/github-script@v7
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const receipt = {
              schema_version: 'co_p12_01_certified_receipt.v1',
              status: 'PASS',
              exit_code: 0,
              workflow: process.env.GITHUB_WORKFLOW,
              run_id: process.env.GITHUB_RUN_ID,
              base_sha: process.env.BASE_SHA,
              tested_head_sha: process.env.HEAD_SHA,
              target_branch: 'domain-gate-v0-preflight',
              command: 'npm run check:p12:co1',
              certified_at: new Date().toISOString()
            };
            const path = 'diligence-artifact-backend/receipts/CO_P12_01_CERTIFIED.json';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'domain-gate-v0-preflight'
              });
              sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'Certify CO-P12-01 acceptance',
              content: Buffer.from(JSON.stringify(receipt, null, 2) + '\n').toString('base64'),
              branch: 'domain-gate-v0-preflight',
              ...(sha ? { sha } : {})
            });

      - name: Enforce acceptance
        shell: bash
        run: |
          exit "${{ steps.acceptance.outputs.exit_code }}"
