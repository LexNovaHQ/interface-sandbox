name: Artifact Backend Deploy

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths:
      - "diligence-artifact-backend/**"
      - ".github/workflows/artifact-backend-deploy.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy

permissions:
  contents: read

concurrency:
  group: artifact-backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'diligence-reviewer-worker' }}

jobs:
  bootstrap_wif:
    name: Scoped WIF certification bootstrap
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      CERT_BRANCH: co-e2e-01-03-critical-authority
      CERT_WORKFLOW: CO-FINAL Live Matrix
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Authenticate with trusted deploy workflow identity
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply exact branch and workflow trust
        shell: bash
        run: |
          set -euo pipefail
          PROVIDER_RESOURCE="$GCP_WORKLOAD_IDENTITY_PROVIDER"
          PROVIDER_RESOURCE="${PROVIDER_RESOURCE#https://iam.googleapis.com/}"
          PROVIDER_RESOURCE="${PROVIDER_RESOURCE#//iam.googleapis.com/}"
          PROJECT_NUMBER=$(printf '%s' "$PROVIDER_RESOURCE" | sed -n 's#projects/\([^/]*\)/locations/.*#\1#p')
          POOL_ID=$(printf '%s' "$PROVIDER_RESOURCE" | sed -n 's#.*workloadIdentityPools/\([^/]*\)/providers/.*#\1#p')
          PROVIDER_ID=$(printf '%s' "$PROVIDER_RESOURCE" | sed -n 's#.*providers/\([^/]*\)$#\1#p')
          test -n "$PROJECT_NUMBER"
          test -n "$POOL_ID"
          test -n "$PROVIDER_ID"

          gcloud iam workload-identity-pools providers describe "$PROVIDER_ID" \
            --workload-identity-pool="$POOL_ID" \
            --location=global \
            --project="$GCP_PROJECT_ID" \
            --format=json > /tmp/provider-before.json

          python - <<'PY2'
          import json, os
          provider = json.load(open('/tmp/provider-before.json', encoding='utf-8'))
          current = (provider.get('attributeCondition') or '').strip()
          branch = os.environ['CERT_BRANCH']
          workflow = os.environ['CERT_WORKFLOW']
          clause = (
              "assertion.repository=='LexNovaHQ/interface-sandbox' && "
              f"assertion.ref=='refs/heads/{branch}' && "
              f"assertion.workflow=='{workflow}'"
          )
          updated = current if clause in current else (f"({current}) || ({clause})" if current else clause)
          json.dump({'before': current, 'after': updated, 'changed': updated != current}, open('/tmp/wif-plan.json','w',encoding='utf-8'), indent=2)
          PY2

          NEW_CONDITION=$(python -c "import json; print(json.load(open('/tmp/wif-plan.json'))['after'])")
          CHANGED=$(python -c "import json; print(str(json.load(open('/tmp/wif-plan.json'))['changed']).lower())")
          if [ "$CHANGED" = "true" ]; then
            gcloud iam workload-identity-pools providers update-oidc "$PROVIDER_ID" \
              --workload-identity-pool="$POOL_ID" \
              --location=global \
              --project="$GCP_PROJECT_ID" \
              --attribute-condition="$NEW_CONDITION"
          fi

          SUBJECT="repo:LexNovaHQ/interface-sandbox:ref:refs/heads/$CERT_BRANCH"
          MEMBER="principal://iam.googleapis.com/projects/$PROJECT_NUMBER/locations/global/workloadIdentityPools/$POOL_ID/subject/$SUBJECT"
          gcloud iam service-accounts add-iam-policy-binding "$GCP_DEPLOY_SERVICE_ACCOUNT" \
            --project="$GCP_PROJECT_ID" \
            --member="$MEMBER" \
            --role="roles/iam.workloadIdentityUser" \
            --quiet

          python - <<'PY2'
          import json, os
          plan=json.load(open('/tmp/wif-plan.json',encoding='utf-8'))
          receipt={
            'artifact_type':'co_final_wif_bootstrap_receipt',
            'target_branch':os.environ['CERT_BRANCH'],
            'target_workflow':os.environ['CERT_WORKFLOW'],
            'trusted_main_workflow':'Artifact Backend Deploy',
            'provider_condition_changed':plan['changed'],
            'exact_subject_binding_added':True,
            'scope':'exact repository + exact branch + exact workflow provider clause; exact branch subject binding'
          }
          json.dump(receipt,open('/tmp/co-final-wif-bootstrap.json','w',encoding='utf-8'),indent=2,sort_keys=True)
          PY2

      - name: Publish bootstrap result to PR 95
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/co-final-wif-bootstrap.json ]; then
            python - <<'PY2' > /tmp/comment.md
          import json
          r=json.load(open('/tmp/co-final-wif-bootstrap.json',encoding='utf-8'))
          print('## CO-FINAL scoped WIF bootstrap: PASS')
          print()
          print(f"- Trusted workflow: `{r['trusted_main_workflow']}`")
          print(f"- Target branch: `{r['target_branch']}`")
          print(f"- Target workflow: `{r['target_workflow']}`")
          print(f"- Provider condition changed: `{r['provider_condition_changed']}`")
          print(f"- Exact subject binding added: `{r['exact_subject_binding_added']}`")
          print(f"- Scope: {r['scope']}")
          PY2
          else
            printf '%s\n' '## CO-FINAL scoped WIF bootstrap: FAILED' '' 'The trusted deploy workflow could not apply the scoped grant.' > /tmp/comment.md
          fi
          gh api repos/LexNovaHQ/interface-sandbox/issues/95/comments -f body="$(cat /tmp/comment.md)"

  check:
    if: github.event_name != 'schedule'
    name: Build and syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: diligence-artifact-backend
        run: npm install

      - name: Syntax check
        working-directory: diligence-artifact-backend
        run: npm run check

  deploy:
    name: Deploy Cloud Run artifact backend
    needs: check
    if: github.event_name != 'schedule' && (github.event_name == 'push' || inputs.mode == 'deploy')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify deploy context
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_CLOUD_RUN_SERVICE"
          test -n "$GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT"
          gcloud config set project "$GCP_PROJECT_ID"
          gcloud config set run/region "$GCP_REGION"
          gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Ensure Cloud Tasks queue
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'diligence-reviewer-worker' }}
        run: |
          set -euo pipefail

          gcloud services enable cloudresourcemanager.googleapis.com \
            --project "$GCP_PROJECT_ID" \
            --quiet

          gcloud services enable cloudtasks.googleapis.com \
            --project "$GCP_PROJECT_ID" \
            --quiet

          if gcloud tasks queues describe "$CLOUD_TASKS_QUEUE" \
            --location "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" >/dev/null 2>&1; then
            gcloud tasks queues update "$CLOUD_TASKS_QUEUE" \
              --location "$GCP_REGION" \
              --project "$GCP_PROJECT_ID" \
              --max-dispatches-per-second=1 \
              --max-concurrent-dispatches=1 \
              --max-attempts=3 \
              --min-backoff=30s \
              --max-backoff=300s \
              --max-retry-duration=1800s
          else
            gcloud tasks queues create "$CLOUD_TASKS_QUEUE" \
              --location "$GCP_REGION" \
              --project "$GCP_PROJECT_ID" \
              --max-dispatches-per-second=1 \
              --max-concurrent-dispatches=1 \
              --max-attempts=3 \
              --min-backoff=30s \
              --max-backoff=300s \
              --max-retry-duration=1800s
          fi

          gcloud projects add-iam-policy-binding "$GCP_PROJECT_ID" \
            --member="serviceAccount:$GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT" \
            --role="roles/cloudtasks.enqueuer" \
            --quiet

          echo "Cloud Tasks queue ready: $CLOUD_TASKS_QUEUE"

      - name: Deploy source to Cloud Run
        working-directory: diligence-artifact-backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT }}
          GPT_ACTION_API_KEY: ${{ secrets.GPT_ACTION_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_MODELS: ${{ secrets.GEMINI_MODELS }}
          DRIVE_PARENT_FOLDER_ID: ${{ secrets.DRIVE_PARENT_FOLDER_ID }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          PUBLIC_RENDERER_BASE_URL: ${{ secrets.PUBLIC_RENDERER_BASE_URL }}
          REVIEWER_PUBLIC_BASE_URL: ${{ secrets.REVIEWER_PUBLIC_BASE_URL }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'diligence-reviewer-worker' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          def quote_yaml(value):
              value = "" if value is None else str(value)
              return "'" + value.replace("'", "''") + "'"

          primary_model = os.environ.get("GEMINI_MODEL") or "gemini-2.5-flash"
          model_chain = os.environ.get("GEMINI_MODELS") or primary_model
          region = os.environ.get("GCP_REGION", "asia-south1")

          env = {
              "GCP_PROJECT_ID": os.environ.get("GCP_PROJECT_ID", ""),
              "GCP_REGION": region,
              "GCP_CLOUD_RUN_SERVICE": os.environ.get("GCP_ARTIFACT_CLOUD_RUN_SERVICE", "interface-diligence-artifacts"),
              "FIRESTORE_DATABASE_ID": "(default)",
              "DRIVE_PARENT_FOLDER_ID": os.environ.get("DRIVE_PARENT_FOLDER_ID", ""),
              "SHEETS_SPREADSHEET_ID": os.environ.get("SHEETS_SPREADSHEET_ID", ""),
              "RUNS_SHEET_NAME": "runs",
              "GPT_ACTION_API_KEY": os.environ.get("GPT_ACTION_API_KEY", ""),
              "GEMINI_API_KEYS": os.environ.get("GEMINI_API_KEYS", ""),
              "GEMINI_MODEL": primary_model,
              "GEMINI_MODELS": model_chain,
              "GEMINI_RETRY_ROUNDS": os.environ.get("GEMINI_RETRY_ROUNDS", "2"),
              "GEMINI_KEYS_PER_MODEL_PER_ROUND": os.environ.get("GEMINI_KEYS_PER_MODEL_PER_ROUND", "2"),
              "GEMINI_RETRY_BASE_DELAY_MS": os.environ.get("GEMINI_RETRY_BASE_DELAY_MS", "750"),
              "GEMINI_RETRY_MAX_DELAY_MS": os.environ.get("GEMINI_RETRY_MAX_DELAY_MS", "5000"),
              "ALLOWED_ORIGIN": os.environ.get("ALLOWED_ORIGIN") or "https://sandbox.lexnovahq.com",
              "PUBLIC_RENDERER_BASE_URL": os.environ.get("PUBLIC_RENDERER_BASE_URL", ""),
              "REVIEWER_PUBLIC_BASE_URL": os.environ.get("REVIEWER_PUBLIC_BASE_URL") or "https://sandbox.lexnovahq.com",
              "PUBLIC_REVIEWER_ENABLED": "true",
              "EXPRESS_JSON_LIMIT": "50mb",
              "USE_M9_HYBRID": "true",
              "CLOUD_TASKS_QUEUE": os.environ.get("CLOUD_TASKS_QUEUE") or "diligence-reviewer-worker",
              "CLOUD_TASKS_LOCATION": region,
              "CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS": "1800",
              "EARLY_PHASE_STALE_MS": "300000",
              "WORKER_STALE_MS": "1200000",
          }

          missing = [key for key in [
              "GCP_PROJECT_ID",
              "GCP_REGION",
              "GCP_CLOUD_RUN_SERVICE",
              "DRIVE_PARENT_FOLDER_ID",
              "SHEETS_SPREADSHEET_ID",
              "GPT_ACTION_API_KEY",
              "GEMINI_API_KEYS",
              "GEMINI_MODEL",
              "GEMINI_MODELS",
              "CLOUD_TASKS_QUEUE",
          ] if not env.get(key)]
          if missing:
              raise SystemExit("Missing artifact backend deploy secret/value(s): " + ", ".join(missing))

          path = Path("/tmp/interface-artifact-backend-env.yaml")
          path.write_text("\n".join(f"{key}: {quote_yaml(value)}" for key, value in env.items()) + "\n", encoding="utf-8")
          PY

          gcloud run deploy "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --service-account "$GCP_ARTIFACT_RUNTIME_SERVICE_ACCOUNT" \
            --no-invoker-iam-check \
            --timeout=1800s \
            --env-vars-file /tmp/interface-artifact-backend-env.yaml \
            --quiet

      - name: Resolve deployed URL
        id: artifact_backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE || 'diligence-reviewer-worker' }}
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "worker_url=${URL%/}/v1/reviewer/jobs/{run_id}/worker" >> "$GITHUB_OUTPUT"
          echo "Deployed artifact backend URL: $URL"
          echo "Cloud Tasks queue: $CLOUD_TASKS_QUEUE"
          echo "Cloud Tasks worker URL pinned to Cloud Run origin."

      - name: Pin Cloud Tasks worker URL
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
          CLOUD_TASKS_WORKER_URL: ${{ steps.artifact_backend.outputs.worker_url }}
        run: |
          set -euo pipefail
          test -n "$CLOUD_TASKS_WORKER_URL"
          gcloud run services update "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --update-env-vars "CLOUD_TASKS_WORKER_URL=$CLOUD_TASKS_WORKER_URL" \
            --quiet
          echo "Pinned Cloud Tasks worker URL to Cloud Run origin."

      - name: Smoke deployed backend
        working-directory: diligence-artifact-backend
        env:
          ARTIFACT_BACKEND_URL: ${{ steps.artifact_backend.outputs.url }}
        run: npm run smoke:health
