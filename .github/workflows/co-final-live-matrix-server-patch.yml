name: CO-FINAL Live Matrix Server Patch

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - ".github/workflows/co-final-live-matrix-server-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Patch Cloud Tasks callback scheme exactly once
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('diligence-artifact-backend/co-final-live-matrix-server.mjs')
          s=p.read_text(encoding='utf-8')
          old='const origin = `${req.protocol}://${req.get("host")}`;'
          new='const origin = `https://${req.get("host")}`;'
          if s.count(old) != 1:
              raise SystemExit(f'exact callback marker mismatch: {s.count(old)}')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
          node --check diligence-artifact-backend/co-final-live-matrix-server.mjs

      - name: Commit HTTPS callback correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "LexNovaHQ Automation"
          git config user.email "automation@lexnovahq.invalid"
          git add diligence-artifact-backend/co-final-live-matrix-server.mjs
          git diff --cached --check
          git commit -m "Use HTTPS for isolated Cloud Tasks callbacks"
          git pull --rebase origin co-e2e-01-03-critical-authority
          git push origin HEAD:co-e2e-01-03-critical-authority
