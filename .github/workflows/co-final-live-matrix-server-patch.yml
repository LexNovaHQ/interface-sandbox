name: CO-FINAL Live Matrix Server Patch

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - ".github/workflows/co-final-live-matrix-server-patch.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0

      - name: Verify exact HTTPS callback correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p=Path('diligence-artifact-backend/co-final-live-matrix-server.mjs')
          s=p.read_text(encoding='utf-8')
          marker='const origin = `https://${req.get("host")}`;'
          if s.count(marker) != 1:
              raise SystemExit(f'exact HTTPS callback marker mismatch: {s.count(marker)}')
          if 'const origin = `${req.protocol}://${req.get("host")}`;' in s:
              raise SystemExit('legacy proxy-derived callback still present')
          PY
          node --check diligence-artifact-backend/co-final-live-matrix-server.mjs
          git merge-base --is-ancestor f144d49d80f806aae7aa71727e88d3e0e97720fc HEAD

      - name: Dispatch trusted isolated matrix workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            repos/LexNovaHQ/interface-sandbox/actions/workflows/artifact-backend-deploy.yml/dispatches \
            -f ref=main
