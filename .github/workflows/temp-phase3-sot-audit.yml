name: Temporary Phase 3 Source of Truth Audit

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: domain-gate-v0-preflight
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Install backend dependencies
        working-directory: diligence-artifact-backend
        run: npm ci
      - name: Build Phase 3 source-of-truth audit
        shell: bash
        run: |
          set -euo pipefail
          cd diligence-artifact-backend
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import yaml from 'js-yaml';

          const root = process.cwd();
          const read = (rel) => fs.readFileSync(path.join(root, rel), 'utf8');
          const loadYaml = (rel) => yaml.load(read(rel));

          const files = {
            fdr: 'references/registry/Diligence_Field_Derivation_Registry.yml',
            ai: 'references/registry/AI_Registry_Key.yml',
            fintech: 'references/registry/FinTech_Registry_Key.yml',
            m7: 'references/registry/M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml',
            addendum: 'references/registry/TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml',
            domainKey: 'references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md',
            catalog: 'references/domain-packages/package-catalog.v0.json',
            targetContract: 'src/phases/03-target-profile-review/target-profile-review.contract.js',
            domainContract: 'src/phases/03-domain-derivation/domain-derivation.contract.js'
          };

          const fdr = loadYaml(files.fdr);
          const ai = loadYaml(files.ai);
          const fintech = loadYaml(files.fintech);
          const m7 = loadYaml(files.m7);
          const addendum = loadYaml(files.addendum);
          const catalog = JSON.parse(read(files.catalog));
          const targetContract = read(files.targetContract);
          const domainContract = read(files.domainContract);
          const targetText = [read(files.fdr), read(files.ai), read(files.fintech), read(files.catalog), targetContract, domainContract].join('\n');

          function collectFieldIds(node, out = new Set()) {
            if (Array.isArray(node)) {
              for (const item of node) collectFieldIds(item, out);
              return out;
            }
            if (!node || typeof node !== 'object') return out;
            if (typeof node.field_id === 'string') out.add(node.field_id);
            if (Array.isArray(node.field_ids)) for (const id of node.field_ids) if (typeof id === 'string') out.add(id);
            for (const value of Object.values(node)) collectFieldIds(value, out);
            return out;
          }

          function findFieldRows(node, rows = []) {
            if (Array.isArray(node)) {
              for (const item of node) findFieldRows(item, rows);
              return rows;
            }
            if (!node || typeof node !== 'object') return rows;
            if (typeof node.field_id === 'string') rows.push(node);
            for (const value of Object.values(node)) findFieldRows(value, rows);
            return rows;
          }

          const fdrIds = [...collectFieldIds(fdr)].sort();
          const m7Ids = [...collectFieldIds(m7)].sort();
          const addendumIds = [...collectFieldIds(addendum)].sort();
          const legacyIds = [...new Set([...m7Ids, ...addendumIds])].sort();
          const missingLegacyIds = legacyIds.filter((id) => !fdrIds.includes(id));
          const addendumMissing = addendumIds.filter((id) => !fdrIds.includes(id));
          const fdrRows = findFieldRows(fdr);
          const fdrRowsById = Object.fromEntries(fdrRows.map((row) => [row.field_id, row]));

          const selectedFieldCoverage = [];
          for (const [outputPath, spec] of Object.entries(m7?.selected_fields || {})) {
            const ids = [];
            if (typeof spec?.field_id === 'string') ids.push(spec.field_id);
            if (Array.isArray(spec?.field_ids)) ids.push(...spec.field_ids.filter((id) => typeof id === 'string'));
            selectedFieldCoverage.push({ output_path: outputPath, field_ids: ids, all_in_fdr: ids.every((id) => fdrIds.includes(id)), missing: ids.filter((id) => !fdrIds.includes(id)) });
          }

          const activeRoots = [
            'src/phases/02-cartography-index',
            'src/phases/02-legal-cartography-index',
            'src/phases/03-target-profile-review',
            'src/phases/03-domain-derivation',
            'src/runtime/contracts',
            'src/runtime/services',
            'agent-packages/agent_3_target_feature',
            'agent-packages/phase_2a_target_profile_source_index',
            'agent-packages/phase_2b_domain_derivation_source_index',
            'scripts'
          ];
          const legacyNames = [
            'M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml',
            'TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM.yaml',
            'DOMAIN_PACKAGE_KEY_v0.md'
          ];
          const dependencyHits = [];
          for (const base of activeRoots) {
            const abs = path.join(root, base);
            if (!fs.existsSync(abs)) continue;
            const candidates = fs.statSync(abs).isDirectory() ? walk(abs) : [abs];
            for (const file of candidates) {
              if (!/\.(js|mjs|cjs|md|ya?ml|json)$/i.test(file)) continue;
              const text = fs.readFileSync(file, 'utf8');
              const lines = text.split(/\r?\n/);
              for (const name of legacyNames) {
                lines.forEach((line, index) => {
                  if (line.includes(name)) dependencyHits.push({ file: path.relative(root, file).replaceAll('\\', '/'), line: index + 1, legacy_name: name, text: line.trim() });
                });
              }
            }
          }

          function walk(dir) {
            const out = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) out.push(...walk(p)); else out.push(p);
            }
            return out;
          }

          const domainKeyText = read(files.domainKey);
          const packageKeyConcepts = {
            package_types: ['primary_domain_package', 'capability_overlay', 'regulatory_overlay', 'review_overlay'],
            selection_statuses: ['NOT_EVALUATED', 'PROVISIONAL', 'CANDIDATE', 'LOCKED', 'LIMITED', 'REVIEW_REQUIRED', 'REJECTED', 'SUPERSEDED'],
            evidence_classes: ['official_homepage_positioning', 'official_product_page', 'official_pricing_or_plan_page', 'official_docs_or_api_reference', 'official_terms_privacy_security_page', 'official_app_or_workflow_description', 'official_case_study', 'public_regulatory_or_license_signal', 'credible_third_party_profile', 'user_intake_declaration'],
            forbidden_auto_lock_basis: ['generic_marketing_adjective', 'blog_only_signal', 'news_only_signal', 'customer_logo_only', 'job_posting_only', 'investor_deck_language_only', 'model_guess_without_source', 'industry_assumption'],
            runtime_flags: ['dynamic_routing_enabled', 'dynamic_prompt_routing_enabled', 'field_registry_compile_enabled', 'qr_matrix_routing_enabled', 'report_template_routing_enabled', 'assembly_template_routing_enabled']
          };
          const conceptCoverage = {};
          for (const [group, terms] of Object.entries(packageKeyConcepts)) {
            conceptCoverage[group] = terms.map((term) => ({ term, represented_in_intended_sot_or_contracts: targetText.includes(term), represented_in_catalog: JSON.stringify(catalog).includes(term) }));
          }

          const policyMarkers = {
            source_boundary: ['target_profile_source_index', 'phase_routing_manifest', 'legal_signal_derivation_profile'],
            lane_policy: ['company_level_lane_forbidden', 'primary_domain_package_derivation_forbidden', 'ai_overlay_mount_derivation_forbidden'],
            regulatory_grievance_policy: ['regulatory_grievance_fields_factual_only', 'license_validity_requirement_applicability_forbidden', 'grievance_sufficiency_ombudsman_requirement_forbidden'],
            direct_legal_signal_policy: ['direct_legal_signal_intake', 'allowed_field_rows', 'legal_signal_derivation_profile'],
            controlled_statuses: ['FIELD_LIMITED', 'FIELD_NOT_PUBLIC', 'FIELD_CONFLICTED', 'FIELD_NOT_FOUND', 'NO_PUBLIC_SIGNAL_FOUND']
          };
          const policyCoverage = Object.fromEntries(Object.entries(policyMarkers).map(([group, markers]) => [group, markers.map((marker) => ({ marker, in_target_contract: targetContract.includes(marker), in_fdr: read(files.fdr).includes(marker) }))]));

          const report = {
            branch: 'domain-gate-v0-preflight',
            intended_sources_of_truth: [files.fdr, files.ai, files.fintech],
            field_coverage: {
              fdr_field_id_count: fdrIds.length,
              m7_authority_field_ids: m7Ids,
              addendum_field_ids: addendumIds,
              legacy_union_count: legacyIds.length,
              missing_legacy_field_ids_from_fdr: missingLegacyIds,
              addendum_missing_field_ids_from_fdr: addendumMissing,
              selected_field_coverage: selectedFieldCoverage,
              tp_biz_009_fdr_row: fdrRowsById['TP.BIZ.009'] || null,
              tp_biz_010_fdr_row: fdrRowsById['TP.BIZ.010'] || null
            },
            active_dependency_hits: dependencyHits,
            domain_package_key: {
              phase3_reference_present: dependencyHits.some((hit) => hit.legacy_name === 'DOMAIN_PACKAGE_KEY_v0.md'),
              concept_coverage: conceptCoverage,
              note: 'Package catalog remains a separate mount inventory; this audit tests whether the Markdown key contributes unique Phase 3 semantics.'
            },
            m7_policy_coverage: policyCoverage,
            yaml_top_level_keys: {
              fdr: Object.keys(fdr || {}),
              ai: Object.keys(ai || {}),
              fintech: Object.keys(fintech || {}),
              m7: Object.keys(m7 || {}),
              addendum: Object.keys(addendum || {})
            }
          };

          fs.writeFileSync('../.phase3-sot-audit.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify({ status: 'PASS', legacy_field_count: legacyIds.length, missing_legacy_field_ids_from_fdr: missingLegacyIds, dependency_hits: dependencyHits.length }, null, 2));
          NODE
      - name: Commit audit report to trigger branch
        shell: bash
        run: |
          set -euo pipefail
          cp .phase3-sot-audit.json "$RUNNER_TEMP/"
          git fetch origin temp-phase3-sot-audit-trigger
          git checkout -B temp-phase3-sot-audit-trigger origin/temp-phase3-sot-audit-trigger
          cp "$RUNNER_TEMP/.phase3-sot-audit.json" .phase3-sot-audit.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .phase3-sot-audit.json
          git commit -m 'Temporary Phase 3 source-of-truth audit evidence'
          git push origin HEAD:temp-phase3-sot-audit-trigger
