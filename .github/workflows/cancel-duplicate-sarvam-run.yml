name: Cancel Duplicate Sarvam Run

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cancel-duplicate-sarvam-run.yml"

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel duplicate live-run attempt only
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = 29421555777;
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id
            });
            core.info(`Cancellation requested for duplicate workflow run ${run_id}.`);
