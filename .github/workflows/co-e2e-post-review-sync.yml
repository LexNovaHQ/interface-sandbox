name: Apply CO-E2E post-review synchronization

on:
  pull_request:
    branches: [domain-gate-v0-preflight]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply-and-certify:
    if: github.head_ref == 'co-e2e-01-03-critical-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0
      - name: Apply post-review synchronization
        working-directory: diligence-artifact-backend
        run: node scripts/apply-co-e2e-post-review-sync.mjs
      - name: Remove temporary applicator
        run: |
          rm diligence-artifact-backend/scripts/apply-co-e2e-post-review-sync.mjs
          rm .github/workflows/co-e2e-post-review-sync.yml
      - name: Commit production synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enforce report-only lifecycle and post-review outcome doctrine"
          git push origin HEAD:co-e2e-01-03-critical-authority
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - working-directory: diligence-artifact-backend
        run: npm ci
      - working-directory: diligence-artifact-backend
        run: npm run check:e2e-authority
      - working-directory: diligence-artifact-backend
        run: npm run check:phase13-production
      - working-directory: diligence-artifact-backend
        run: npm run check:phase1-16-production
