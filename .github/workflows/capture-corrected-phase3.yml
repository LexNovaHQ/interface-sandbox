name: Capture corrected Phase 3 diagnostics

on:
  pull_request:
    branches: [domain-gate-v0-preflight]
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'co-e2e-01-03-critical-authority'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - run: npm ci
      - name: Capture corrected authority fixture
        run: |
          set +e
          npm run check:e2e-authority > e2e-authority.log 2>&1
          echo "$?" > e2e-authority.exit
          cat e2e-authority.log
          exit 0
      - name: Capture Phase 3 suite
        run: |
          set +e
          npm run check:phase3-domain-derivation > phase3-suite.log 2>&1
          echo "$?" > phase3-suite.exit
          cat phase3-suite.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: corrected-phase3-diagnostics
          path: |
            diligence-artifact-backend/e2e-authority.log
            diligence-artifact-backend/e2e-authority.exit
            diligence-artifact-backend/phase3-suite.log
            diligence-artifact-backend/phase3-suite.exit
