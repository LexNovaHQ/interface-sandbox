name: CO P12 01 Validation

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - diligence-artifact-backend/**
      - .github/workflows/co-p12-01-validation.yml
      - co-p12-01-validation-trigger.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Phase 5 Behavior Class cutover
        run: npm run check:phase5:behavior-class-cutover

      - name: Phase 10 deterministic report-row custody
        run: npm run check:phase10:report-row-custody

      - name: Phase 11 exact compiler gate
        run: npm run check:phase11:compiler-exact-gate
