name: CO P12 01 Validation

on:
  pull_request:
    branches:
      - domain-gate-v0-preflight
    paths:
      - diligence-artifact-backend/**
      - .github/workflows/co-p12-01-validation.yml
      - co-p12-01-validation-trigger.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: diligence-artifact-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CO-P12-01 validation
        id: acceptance
        shell: bash
        run: |
          set +e
          npm run check:p12:co1 > co-p12-01-validation.log 2>&1
          code=$?
          cat co-p12-01-validation.log
          printf '%s\n' "$code" > co-p12-01-exit-code.txt
          exit "$code"

      - name: Upload CO-P12-01 validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: co-p12-01-validation-log
          path: |
            diligence-artifact-backend/co-p12-01-validation.log
            diligence-artifact-backend/co-p12-01-exit-code.txt
          if-no-files-found: error
          retention-days: 2
