name: Runtime Stage 4, Stage 5, and Stage 6 Audit

on:
  workflow_dispatch:
    inputs:
      runtime_url:
        description: "Existing runtime URL for audit mode"
        required: false
        default: "https://lexnova-runtime-api-24qnalslaa-uc.a.run.app"
        type: string

permissions:
  contents: read

jobs:
  stage4-stage5-stage6-audit:
    name: Stage 4 + Stage 5 + Stage 6 runtime audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Build runtime bundles
        run: npm run build:runtime

      - name: Package generated bundles for runtime-api
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Runtime syntax check
        working-directory: runtime-api
        run: npm run check

      - name: Clear runtime E2E cache and artifact directory
        run: |
          set -euo pipefail
          rm -rf runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts
          mkdir -p runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts/full-runtime-outputs

      - name: Smoke existing runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE4_COMPANY_MAX_OUTPUT_TOKENS: "24000"
          STAGE4_COMPANY_TIMEOUT_MS: "90000"
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE5_SOURCE_DISCOVERY_MODE: "sync_with_free_search"
          STAGE5_RUN_FREE_SEARCH: "true"
          STAGE5_ANCHOR_FETCH_MAX: "60"
          STAGE5_ANCHOR_LINK_LIMIT: "100000"
          STAGE5_FEATURE_MAX_OUTPUT_TOKENS: "28000"
          STAGE5_FEATURE_TIMEOUT_MS: "120000"
          STAGE5_MAX_INPUT_CHARS: "240000"
          STAGE5_MAX_ESTIMATED_TOKENS: "120000"
        run: npm run e2e:stage5:features

      - name: Run Stage 6 Canon Audit
        working-directory: runtime-api
        run: npm run audit:stage6:canon

      - name: Run Stage 6A Legal Cartography E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE6_DISABLE_SEMANTIC_MODEL: "false"
          STAGE6_MAX_LEGAL_UNITS: "40"
          STAGE6_TEXT_WINDOW_CHARS: "600"
          STAGE6_SEMANTIC_MAX_OUTPUT_TOKENS: "12000"
          STAGE6_SEMANTIC_TIMEOUT_MS: "90000"
          STAGE6_SEMANTIC_MAX_ATTEMPTS: "3"
        run: npm run e2e:stage6a:legal-cartography

      - name: Run Stage 6B Data Provenance E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE6_DISABLE_SEMANTIC_MODEL: "false"
          STAGE6_MAX_DATA_FLOWS: "40"
          STAGE6_TEXT_WINDOW_CHARS: "600"
          STAGE6B_SEMANTIC_MAX_OUTPUT_TOKENS: "12000"
          STAGE6B_SEMANTIC_TIMEOUT_MS: "90000"
          STAGE6_SEMANTIC_MAX_ATTEMPTS: "3"
        run: npm run e2e:stage6b:data-provenance

      - name: Run Stage 6 Integrated Handoff E2E
        working-directory: runtime-api
        run: npm run e2e:stage6:integrated-handoff

      - name: Prepare full runtime output artifact
        if: always()
        run: |
          set -euo pipefail
          rm -rf runtime-api/runtime-e2e-artifacts/full-runtime-outputs
          mkdir -p runtime-api/runtime-e2e-artifacts/full-runtime-outputs/cache
          echo "Cache directory:"
          ls -lah runtime-api/.runtime-e2e-cache || true
          cp -v runtime-api/.runtime-e2e-cache/*.json runtime-api/runtime-e2e-artifacts/full-runtime-outputs/cache/ 2>/dev/null || true
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const cacheDir = 'runtime-api/.runtime-e2e-cache';
          const outDir = 'runtime-api/runtime-e2e-artifacts/full-runtime-outputs';
          const expected = {
            stage1: ['stage1', 'source-discovery'],
            stage2: ['stage2', 'evidence-refiner'],
            stage3: ['stage3', 'evidence-junction'],
            stage4: ['stage4-company-profile.json'],
            stage5: ['stage5-target-feature-profile.json'],
            stage6a: ['stage6a-legal-cartography.json'],
            stage6b: ['stage6b-data-provenance.json'],
            stage6_integrated: ['stage6-integrated-handoff.json'],
            stage7: ['stage7'],
            stage8: ['stage8'],
            stage9: ['stage9'],
            stage10: ['stage10']
          };
          const files = fs.existsSync(cacheDir) ? fs.readdirSync(cacheDir).filter((f) => f.endsWith('.json')) : [];
          const stage_outputs = Object.fromEntries(Object.entries(expected).map(([stage, needles]) => {
            const matches = files.filter((file) => needles.some((needle) => file.includes(needle)));
            return [stage, { present: matches.length > 0, files: matches }];
          }));
          const manifest = { generated_at: new Date().toISOString(), commit_sha: process.env.GITHUB_SHA || null, stage_outputs, cache_files: files };
          fs.writeFileSync(path.join(outDir, 'artifact-manifest.json'), JSON.stringify(manifest, null, 2));
          NODE
          echo "Artifact directory:"
          find runtime-api/runtime-e2e-artifacts/full-runtime-outputs -maxdepth 3 -type f -print

      - name: Upload full runtime audit cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-stage1-stage10-audit-cache
          path: runtime-api/runtime-e2e-artifacts/full-runtime-outputs/
          if-no-files-found: warn
