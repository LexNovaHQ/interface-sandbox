name: Runtime Stage 4 and Stage 5 Audit

on:
  workflow_dispatch:
    inputs:
      runtime_url:
        description: "Existing runtime URL for audit mode"
        required: false
        default: "https://lexnova-runtime-api-24qnalslaa-uc.a.run.app"
        type: string

permissions:
  contents: read

jobs:
  stage4-stage5-audit:
    name: Stage 4 + Stage 5 runtime audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Build runtime bundles
        run: npm run build:runtime

      - name: Package generated bundles for runtime-api
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Verify Stage 5 discovery-first architecture
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const checks = [];
          const read = (p) => fs.readFileSync(p, 'utf8');
          const has = (p, needle) => read(p).includes(needle);
          const match = (p, pattern) => pattern.test(read(p));
          const check = (name, ok) => checks.push({ name, ok: Boolean(ok) });

          check('Stage 5 E2E imports shared builder',
            has('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', 'buildStage5TargetFeaturePackage'));
          check('Live runtime imports shared builder',
            has('runtime-api/src/live/liveDiligenceRunOrchestrator.js', 'buildStage5TargetFeaturePackage'));
          const obsoleteBucketNeedle = 'const ' + 'BUCKETS = ["' + 'product_' + 'profile_sources' + '"]';
          check('Stage 5 E2E does not own obsolete product-only BUCKETS truth',
            !has('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', obsoleteBucketNeedle));
          check('Shared builder has source role classification',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'primary_function_source') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'secondary_technical_source') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'supporting_commercial_source') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'supporting_context_source') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'duplicate_source') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'non_feature_context'));
          check('Shared builder enforces product-primary hierarchy',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'productPrimary') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'product_family_secondary_sources'));
          check('Shared builder has duplicate cluster logic',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'candidate_clusters') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'primary_source_id') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'supporting_source_ids') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'duplicate_source_ids'));
          check('Shared builder emits deterministic candidate index',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'target_feature_candidate_index'));
          check('Shared builder emits internal audit ledgers',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'target_feature_audit_ledger') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'stage5_audit_ledger'));
          check('Shared builder preserves broad discovery evidence',
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'product_family_discovery_sources') &&
            has('runtime-api/src/diligence/stage5TargetFeaturePackageBuilder.js', 'stage5_feature_discovery_full_product_packet'));

          check('Package Stage 5 E2E wires strict audit',
            match('runtime-api/package.json', /e2e:stage5:features[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));
          check('Package completeness audit wires strict audit',
            match('runtime-api/package.json', /audit:stage5:completeness[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));
          check('Package check covers strict audit syntax',
            match('runtime-api/package.json', /check[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));

          check('Stage 5 prompt is discovery-first',
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'Stage 5A Feature Discovery') &&
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'Stage 5B Feature Canonicalization') &&
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'post-discovery completeness checklist'));
          check('Stage 5 prompt does not make candidate index discovery driver',
            !has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'mandatory worklist'));
          check('Stage 5 prompt handles completion repair request',
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'completion_repair_request'));
          check('Stage 5 prompt forbids incompatible function collapse',
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'Do not collapse incompatible functions'));

          check('Stage 5 guardrail has semantic compatibility checks',
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js', 'evaluateCandidateFeatureCompatibility') &&
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js', 'incompatible_candidate_mappings'));
          check('Stage 5 guardrail has source coverage invariant checks',
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js', 'validateSourceCoverageRows') &&
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js', 'invalid_source_coverage_rows'));
          check('Stage 5 guardrail flags missed/incompatible accounting as repairable',
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js', 'rerun_missing_stage5_candidate_or_source_accounting'));
          check('Stage 5 guardrail normalizes URL evidence refs',
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsLocked.js', 'normalized_url_evidence_refs') &&
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'evidence_refs_url_pollution_count'));
          check('Stage 5 runner has one-time completion repair request',
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'completion_repair_request'));
          check('Stage 5 runner runs discovery before canonicalization',
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'runStage5FeatureDiscovery') &&
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'stage5b_canonicalization_from_stage5a_discovery'));
          check('Stage 5 runner has repair-loop skip guard',
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'skipTargetFeatureCompletenessRepair'));

          const forbiddenStrictAuditNeedles = ['strict_audit_keyword_' + 'fallback', 'detect' + 'Candidates'];
          check('Strict audit has no keyword fallback',
            forbiddenStrictAuditNeedles.every((needle) => !has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', needle)));
          check('Strict audit checks deterministic candidate index and audit ledger',
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'target_feature_candidate_index') &&
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'target_feature_audit_ledger'));
          check('Strict audit checks semantic compatibility and coverage invariants',
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'evaluateCandidateFeatureCompatibility') &&
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'sourceCoverageInvariantFailures'));
          check('Base audit fails missing source coverage when allow_partial=false',
            has('runtime-api/scripts/e2e-stage5-completeness-audit.mjs', 'allowPartial') &&
            has('runtime-api/scripts/e2e-stage5-completeness-audit.mjs', 'missingSourceCoverage.length && !allowPartial'));
          const liveRuntimeText = read('runtime-api/src/live/liveDiligenceRunOrchestrator.js');
          const forbiddenLiveNeedles = ['LIVE_' + 'CAPTURE_LIMIT', 'selected.length ' + '>= limit', 'sync_' + 'anchor_only', 'max_sources: ' + 'sources.length', 'product_' + 'capture_limit', 'company_' + 'capture_limit', 'legal_' + 'capture_limit', 'governance_' + 'capture_limit'];
          check('Old live caps/default quotas absent from base runtime',
            forbiddenLiveNeedles.every((needle) => !liveRuntimeText.includes(needle)));

          const failures = checks.filter((item) => !item.ok);
          console.log(JSON.stringify({ ok: failures.length === 0, checks }, null, 2));
          if (failures.length) {
            console.error('Stage 5 discovery-first architecture audit failed:');
            for (const failure of failures) console.error(`- ${failure.name}`);
            process.exit(1);
          }
          NODE

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Runtime syntax check
        working-directory: runtime-api
        run: npm run check

      - name: Clear runtime E2E cache and artifact directory
        run: |
          set -euo pipefail
          rm -rf runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts
          mkdir -p runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts/stage4-stage5

      - name: Smoke existing runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE4_COMPANY_MAX_OUTPUT_TOKENS: "24000"
          STAGE4_COMPANY_TIMEOUT_MS: "90000"
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE5_SOURCE_DISCOVERY_MODE: "sync_with_free_search"
          STAGE5_RUN_FREE_SEARCH: "true"
          STAGE5_ANCHOR_FETCH_MAX: "60"
          STAGE5_ANCHOR_LINK_LIMIT: "100000"
          STAGE5_FEATURE_MAX_OUTPUT_TOKENS: "28000"
          STAGE5_FEATURE_TIMEOUT_MS: "120000"
          STAGE5_MAX_INPUT_CHARS: "240000"
          STAGE5_MAX_ESTIMATED_TOKENS: "120000"
        run: npm run e2e:stage5:features

      - name: Run Stage 6 canonical audit
        working-directory: runtime-api
        run: npm run audit:stage6:canon

      - name: Run Stage 6B Data Provenance E2E
        working-directory: runtime-api
        env:
          STAGE6_DISABLE_SEMANTIC_MODEL: "true"
        run: npm run e2e:stage6b:data-provenance

      - name: Prepare Stage 4/5 audit artifact
        if: always()
        run: |
          set -euo pipefail
          rm -rf runtime-api/runtime-e2e-artifacts/stage4-stage5
          mkdir -p runtime-api/runtime-e2e-artifacts/stage4-stage5/stage4 runtime-api/runtime-e2e-artifacts/stage4-stage5/stage5
          echo "Cache directory:"
          ls -lah runtime-api/.runtime-e2e-cache || true
          cp -v runtime-api/.runtime-e2e-cache/stage4-company-profile.json runtime-api/runtime-e2e-artifacts/stage4-stage5/stage4/ 2>/dev/null || true
          cp -v runtime-api/.runtime-e2e-cache/stage5-target-feature-profile.json runtime-api/runtime-e2e-artifacts/stage4-stage5/stage5/ 2>/dev/null || true
          echo "{\"generated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"stage4_cache_present\":$(test -s runtime-api/.runtime-e2e-cache/stage4-company-profile.json && echo true || echo false),\"stage5_cache_present\":$(test -s runtime-api/.runtime-e2e-cache/stage5-target-feature-profile.json && echo true || echo false),\"stage6_canonical_audit_enabled\":true,\"stage6b_data_provenance_e2e_enabled\":true}" > runtime-api/runtime-e2e-artifacts/stage4-stage5/artifact-manifest.json
          echo "Artifact directory:"
          find runtime-api/runtime-e2e-artifacts/stage4-stage5 -maxdepth 2 -type f -print

      - name: Upload Stage 4/5 audit cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-stage4-stage5-audit-cache
          path: runtime-api/runtime-e2e-artifacts/stage4-stage5/
          if-no-files-found: warn
