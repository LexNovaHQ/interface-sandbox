name: Runtime Stage 4 and Stage 5 Audit

on:
  workflow_dispatch:
    inputs:
      runtime_url:
        description: "Existing runtime URL for audit mode"
        required: false
        default: "https://lexnova-runtime-api-24qnalslaa-uc.a.run.app"
        type: string

permissions:
  contents: read

jobs:
  stage4-stage5-audit:
    name: Stage 4 + Stage 5 runtime audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Build runtime bundles
        run: npm run build:runtime

      - name: Package generated bundles for runtime-api
        run: |
          set -euo pipefail
          mkdir -p runtime-api/functions/_generated
          cp functions/_generated/diligencePromptBundle.js runtime-api/functions/_generated/diligencePromptBundle.js
          cp functions/_generated/diligenceSchemaBundle.js runtime-api/functions/_generated/diligenceSchemaBundle.js
          cp functions/_generated/diligenceValidatorBundle.js runtime-api/functions/_generated/diligenceValidatorBundle.js
          test -s runtime-api/functions/_generated/diligencePromptBundle.js
          test -s runtime-api/functions/_generated/diligenceSchemaBundle.js
          test -s runtime-api/functions/_generated/diligenceValidatorBundle.js

      - name: Verify Stage 5 candidate-walk architecture
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const checks = [];
          const read = (p) => fs.readFileSync(p, 'utf8');
          const has = (p, needle) => read(p).includes(needle);
          const match = (p, pattern) => pattern.test(read(p));
          const check = (name, ok) => checks.push({ name, ok: Boolean(ok) });

          check('Stage 5 E2E uses product_profile_sources only',
            match('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', /const\s+BUCKETS\s*=\s*\[\s*["']product_profile_sources["']\s*\]/));
          check('Stage 5 E2E does not include company family bucket',
            !match('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', /const\s+BUCKETS\s*=\s*\[[\s\S]*company_profile_sources/));
          check('Stage 5 E2E does not include legal family bucket',
            !match('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', /const\s+BUCKETS\s*=\s*\[[\s\S]*legal_profile_sources/));
          check('Stage 5 E2E does not include governance family bucket',
            !match('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', /const\s+BUCKETS\s*=\s*\[[\s\S]*governance_profile_sources/));
          check('Stage 5 source policy says product-family packet',
            has('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', 'stage5_own_product_family_routed_packet_no_stage4_source_cache'));
          check('Stage 5 E2E logs deterministic candidate count',
            has('runtime-api/scripts/e2e-stage5-target-feature-profile.mjs', 'deterministic_candidate_count'));

          check('Package Stage 5 E2E wires strict audit',
            match('runtime-api/package.json', /e2e:stage5:features[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));
          check('Package completeness audit wires strict audit',
            match('runtime-api/package.json', /audit:stage5:completeness[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));
          check('Package check covers strict audit syntax',
            match('runtime-api/package.json', /check[\s\S]*e2e-stage5-strict-completeness-audit\.mjs/));

          check('Stage 5 adapter creates deterministic candidate index',
            has('runtime-api/src/diligence/adapters/targetFeatureProfileInputAdapterNonDropping.js', 'target_feature_candidate_index'));
          check('Stage 5 adapter labels index as high recall, not final judgment',
            has('runtime-api/src/diligence/adapters/targetFeatureProfileInputAdapterNonDropping.js', 'deterministic_high_recall_not_final_judgment'));

          check('Stage 5 prompt requires candidate ledger walk',
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'target_feature_candidate_index.candidates'));
          check('Stage 5 prompt handles completion repair request',
            has('functions/_prompts/diligence-v2/02_TARGET_FEATURE_PROFILE.prompt.md', 'completion_repair_request'));

          check('Stage 5 guardrail flags missed candidate/source accounting as repairable',
            has('runtime-api/src/diligence/targetFeatureProfileGuardrailsLocked.js', 'rerun_missing_stage5_candidate_or_source_accounting'));
          check('Stage 5 runner has one-time completion repair request',
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'completion_repair_request'));
          check('Stage 5 runner has repair-loop skip guard',
            has('runtime-api/src/diligence/stageRunnerLocked.js', 'skipTargetFeatureCompletenessRepair'));

          check('Strict Stage 5 audit script exists',
            fs.existsSync('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs'));
          check('Strict Stage 5 audit checks deterministic candidate index',
            has('runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs', 'target_feature_candidate_index'));

          const failures = checks.filter((item) => !item.ok);
          console.log(JSON.stringify({ ok: failures.length === 0, checks }, null, 2));
          if (failures.length) {
            console.error('Stage 5 candidate-walk architecture audit failed:');
            for (const failure of failures) console.error(`- ${failure.name}`);
            process.exit(1);
          }
          NODE

      - name: Install runtime dependencies
        working-directory: runtime-api
        run: npm install

      - name: Runtime syntax check
        working-directory: runtime-api
        run: npm run check

      - name: Stage 5 architecture audit
        run: |
          set -euo pipefail
          ! grep -R "strict_audit_keyword_fallback" runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs
          ! grep -R "detectCandidates" runtime-api/scripts/e2e-stage5-strict-completeness-audit.mjs
          grep -q "stage5TargetFeaturePackageBuilder" runtime-api/scripts/e2e-stage5-target-feature-profile.mjs
          grep -q "stage5TargetFeaturePackageBuilder" runtime-api/src/live/liveDiligenceRunOrchestrator.js
          grep -q "target_feature_candidate_index" runtime-api/scripts/e2e-stage5-target-feature-profile.mjs
          grep -q "target_feature_audit_ledger" runtime-api/scripts/e2e-stage5-target-feature-profile.mjs
          grep -q "rerun_missing_stage5_candidate_or_source_accounting" runtime-api/src/diligence/targetFeatureProfileGuardrailsCompleteness.js
          grep -q "completion_repair_request" runtime-api/src/diligence/stageRunnerLocked.js
          ! grep -E "LIVE_CAPTURE_LIMIT|selected.length >= limit|sync_anchor_only|max_sources: sources.length" runtime-api/src/live/liveDiligenceRunOrchestrator.js
          echo '{"ok":true,"step":"stage5_architecture_audit"}'

      - name: Clear runtime E2E cache and artifact directory
        run: |
          set -euo pipefail
          rm -rf runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts
          mkdir -p runtime-api/.runtime-e2e-cache runtime-api/runtime-e2e-artifacts/stage4-stage5

      - name: Smoke existing runtime
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
        run: npm run smoke:runtime

      - name: Run Stage 4 Company Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE4_COMPANY_MAX_OUTPUT_TOKENS: "24000"
          STAGE4_COMPANY_TIMEOUT_MS: "90000"
        run: npm run e2e:stage4:company

      - name: Run Stage 5 Target Feature Profile E2E
        working-directory: runtime-api
        env:
          RUNTIME_URL: ${{ inputs.runtime_url }}
          RUNTIME_ACCESS_TOKEN: ${{ secrets.RUNTIME_ACCESS_TOKEN }}
          STAGE5_SOURCE_DISCOVERY_MODE: "sync_with_free_search"
          STAGE5_RUN_FREE_SEARCH: "true"
          STAGE5_ANCHOR_FETCH_MAX: "60"
          STAGE5_ANCHOR_LINK_LIMIT: "100000"
          STAGE5_FEATURE_MAX_OUTPUT_TOKENS: "28000"
          STAGE5_FEATURE_TIMEOUT_MS: "120000"
          STAGE5_MAX_INPUT_CHARS: "240000"
          STAGE5_MAX_ESTIMATED_TOKENS: "120000"
        run: npm run e2e:stage5:features

      - name: Prepare Stage 4/5 audit artifact
        if: always()
        run: |
          set -euo pipefail
          echo "Cache directory:"
          ls -lah runtime-api/.runtime-e2e-cache || true
          test -s runtime-api/.runtime-e2e-cache/stage4-company-profile.json
          test -s runtime-api/.runtime-e2e-cache/stage5-target-feature-profile.json
          cp -v runtime-api/.runtime-e2e-cache/stage4-company-profile.json runtime-api/runtime-e2e-artifacts/stage4-stage5/
          cp -v runtime-api/.runtime-e2e-cache/stage5-target-feature-profile.json runtime-api/runtime-e2e-artifacts/stage4-stage5/
          echo "Artifact directory:"
          ls -lah runtime-api/runtime-e2e-artifacts/stage4-stage5

      - name: Upload Stage 4/5 audit cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-stage4-stage5-audit-cache
          path: runtime-api/runtime-e2e-artifacts/stage4-stage5/
          if-no-files-found: error
