name: Dispatch Artifact Deploy Once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Artifact Backend Deploy on main
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'artifact-backend-deploy.yml',
              ref: 'main',
              inputs: { mode: 'deploy' }
            });
            core.info('Artifact Backend Deploy dispatched on main.');
