name: Diagnose Artifact Deploy Failure
# Temporary diagnostic workflow for failed production deploy run 29407624819.
# Narrow extraction pass for the terminal Cloud Run source-deploy error.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch exact failed deploy error
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "87327285092"
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/deploy-job.log

          echo "===== FINAL 70 LINES ====="
          tail -n 70 /tmp/deploy-job.log
          echo "===== EXPLICIT GCLOUD / ERROR LINES ====="
          grep -nE "gcloud run deploy|ERROR:|Error:|Build failed|Deployment failed|PERMISSION_DENIED|Permission denied|denied|INVALID_ARGUMENT|failed to|Failure|exit code" /tmp/deploy-job.log | tail -n 60 || true
