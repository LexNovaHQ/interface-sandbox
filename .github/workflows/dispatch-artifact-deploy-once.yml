name: Diagnose Runtime Startup Failure
# Temporary Linux boot reproduction for the failed Cloud Run revision.
# Same-repository PR trigger for the exact production entrypoint.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install locked dependencies
        working-directory: diligence-artifact-backend
        run: npm ci

      - name: Boot central runtime with Cloud Run environment
        working-directory: diligence-artifact-backend
        env:
          PORT: "8080"
          GCP_PROJECT_ID: "startup-diagnostic"
          GCP_REGION: "asia-south1"
          GCP_CLOUD_RUN_SERVICE: "interface-diligence-artifacts"
          FIRESTORE_DATABASE_ID: "(default)"
          DRIVE_PARENT_FOLDER_ID: "diagnostic"
          SHEETS_SPREADSHEET_ID: "diagnostic"
          RUNS_SHEET_NAME: "runs"
          GPT_ACTION_API_KEY: "diagnostic"
          GEMINI_API_KEYS: "diagnostic"
          GEMINI_MODEL: "gemini-2.5-flash"
          GEMINI_MODELS: "gemini-2.5-flash"
          PUBLIC_REVIEWER_ENABLED: "true"
          EXPRESS_JSON_LIMIT: "50mb"
          CLOUD_TASKS_QUEUE: "diligence-reviewer-worker"
          CLOUD_TASKS_LOCATION: "asia-south1"
          CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS: "1800"
        shell: bash
        run: |
          set -uo pipefail
          npm start > /tmp/runtime-startup.log 2>&1 &
          PID=$!

          for attempt in $(seq 1 20); do
            if curl --fail --silent "http://127.0.0.1:8080/health" > /tmp/health.json 2>/dev/null; then
              cat /tmp/runtime-startup.log
              cat /tmp/health.json
              kill "$PID" || true
              wait "$PID" || true
              exit 0
            fi

            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Runtime process exited before binding to PORT=8080."
              cat /tmp/runtime-startup.log
              wait "$PID"
              exit $?
            fi

            sleep 1
          done

          echo "Runtime process remained alive but did not answer /health."
          cat /tmp/runtime-startup.log
          kill "$PID" || true
          wait "$PID" || true
          exit 1
