name: Diagnose Artifact Deploy Failure
# Temporary diagnostic workflow for failed production deploy run 29407624819.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and print failed deploy job tail
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "87327285092"
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/deploy-job.log

          echo "===== DEPLOY JOB LOG TAIL ====="
          tail -n 180 /tmp/deploy-job.log
          echo "===== ERROR MATCHES ====="
          grep -nEi "error|failed|failure|denied|permission|invalid|build|revision|container" /tmp/deploy-job.log | tail -n 120 || true
