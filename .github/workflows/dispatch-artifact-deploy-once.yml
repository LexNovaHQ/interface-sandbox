name: Extract Runtime Startup Exception
# Temporary read-only extractor for failed Linux startup job 87330348912.
# Same-repository PR trigger for final exception lines.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch startup exception
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "87330348912"
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/startup-job.log

          echo "===== FINAL STARTUP LINES ====="
          tail -n 55 /tmp/startup-job.log
          echo "===== NODE EXCEPTION ====="
          grep -nE "Runtime process exited|Error \[|Error:|ERR_|SyntaxError|ReferenceError|TypeError|Cannot find|MODULE_NOT_FOUND|ENOENT|at file:|node:internal|exit code" /tmp/startup-job.log | tail -n 45 || true
