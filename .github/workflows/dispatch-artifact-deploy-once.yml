name: Diagnose Cloud Run Revision Failure
# Temporary read-only diagnostic for the failed production revision.
# Same-repository PR trigger for Cloud Logging extraction.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  contents: read
  id-token: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Print failed revision conditions and startup logs
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_CLOUD_RUN_SERVICE: ${{ secrets.GCP_ARTIFACT_CLOUD_RUN_SERVICE }}
        shell: bash
        run: |
          set -euo pipefail
          gcloud config set project "$GCP_PROJECT_ID"
          gcloud config set run/region "$GCP_REGION"

          echo "===== RECENT REVISIONS ====="
          gcloud run revisions list \
            --service "$GCP_ARTIFACT_CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --limit=5 \
            --format="table(metadata.name,status.conditions[0].type,status.conditions[0].status,status.conditions[0].message,metadata.creationTimestamp)"

          echo "===== CLOUD RUN STARTUP ERRORS ====="
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=$GCP_ARTIFACT_CLOUD_RUN_SERVICE AND timestamp>=\"2026-07-15T10:20:00Z\"" \
            --project "$GCP_PROJECT_ID" \
            --limit=100 \
            --order=desc \
            --format="value(timestamp,severity,resource.labels.revision_name,textPayload,jsonPayload.message)" \
            | grep -v '^[[:space:]]*$' \
            | head -n 100
