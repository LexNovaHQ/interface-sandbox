name: Dispatch Artifact Deploy Once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  dispatch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Dispatch, poll and report Artifact Backend Deploy
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'artifact-backend-deploy.yml';
            const startedAt = Date.now();

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: 96,
              body: `## Production deploy controller started\n\n- Controller commit: \`${context.sha}\`\n- Target workflow: \`Artifact Backend Deploy\`\n- Target branch: \`main\`\n- Started at: \`${new Date(startedAt).toISOString()}\``
            });

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { mode: 'deploy' }
            });

            let run = null;
            for (let attempt = 0; attempt < 60; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 10000));
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                branch: 'main',
                event: 'workflow_dispatch',
                per_page: 20
              });
              run = response.data.workflow_runs.find(candidate =>
                Date.parse(candidate.created_at) >= startedAt - 15000
              ) || null;
              if (run) break;
            }

            if (!run) {
              throw new Error('Dispatched Artifact Backend Deploy run was not found.');
            }

            for (let attempt = 0; attempt < 180 && run.status !== 'completed'; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 10000));
              const response = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
              run = response.data;
            }

            if (run.status !== 'completed') {
              throw new Error(`Artifact Backend Deploy run ${run.id} did not complete within the polling window.`);
            }

            const result = run.conclusion === 'success' ? '**PASS**' : `**${String(run.conclusion).toUpperCase()}**`;
            const body = [
              '## Production deployment receipt',
              '',
              `- Result: ${result}`,
              `- Workflow: ${run.name}`,
              `- Run ID: ${run.id}`,
              `- Run URL: ${run.html_url}`,
              `- Source branch: \`${run.head_branch}\``,
              `- Source commit: \`${run.head_sha}\``,
              `- Event: \`${run.event}\``,
              `- Status: \`${run.status}\``,
              `- Conclusion: \`${run.conclusion}\``,
              `- Created at: \`${run.created_at}\``,
              `- Completed at: \`${run.updated_at}\``,
              `- Canonical backend authority: \`261d5dff92e1856ae9d23c8086b441e89dc63fbb\``
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: 96,
              body
            });

            if (run.conclusion !== 'success') {
              core.setFailed(`Artifact Backend Deploy run ${run.id} concluded with ${run.conclusion}.`);
            }
