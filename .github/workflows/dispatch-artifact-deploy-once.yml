name: Validate Runtime Startup Repair
# Temporary PR validator for the production startup repair.

on:
  pull_request:
    branches:
      - main
    paths:
      - "diligence-artifact-backend/**"
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install locked dependencies
        working-directory: diligence-artifact-backend
        run: npm ci

      - name: Verify production entrypoint boot
        working-directory: diligence-artifact-backend
        run: npm run check:runtime-startup

      - name: Run critical production gate
        working-directory: diligence-artifact-backend
        run: npm run check:critical
