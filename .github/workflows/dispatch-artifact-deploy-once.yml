name: Diagnose Artifact Deploy Failure
# Temporary diagnostic workflow for failed production deploy run 29407624819.
# Final extraction pass for the post-build Cloud Run error.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dispatch-artifact-deploy-once.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch final post-build error
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "87327285092"
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/deploy-job.log

          echo "===== FINAL 25 LINES ====="
          tail -n 25 /tmp/deploy-job.log
          echo "===== TERMINAL ERROR ONLY ====="
          grep -nE "ERROR:|Error:|Deployment failed|failed to|Revision|revision|Container failed|container failed|does not have permission|Permission denied|PERMISSION_DENIED|INVALID_ARGUMENT|exit code" /tmp/deploy-job.log | tail -n 25 || true
