name: Restore Phase 8 handoff fixture

on:
  pull_request:
    branches: [domain-gate-v0-preflight]
    types: [synchronize]

permissions:
  contents: write

jobs:
  restore-and-test:
    if: github.head_ref == 'co-e2e-01-03-critical-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: co-e2e-01-03-critical-authority
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore original fixture and update only critical status expectation
        run: |
          git fetch origin domain-gate-v0-preflight
          git checkout origin/domain-gate-v0-preflight -- diligence-artifact-backend/scripts/check-phase8-domain-control-obligation-downstream-handoff.mjs
          python - <<'PY'
          from pathlib import Path
          path = Path('diligence-artifact-backend/scripts/check-phase8-domain-control-obligation-downstream-handoff.mjs')
          text = path.read_text(encoding='utf-8')
          old = 'assert.equal(overlayChallenge.status, "' + 'REPAIR' + '_REQUIRED");'
          new = 'assert.equal(overlayChallenge.status, "CONTROLLED_FAILURE");'
          if old not in text:
              raise SystemExit('PHASE8_OLD_EXPECTATION_MISSING')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f .github/workflows/restore-phase8-handoff-fixture.yml
      - name: Commit restored fixture
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore Phase 8 handoff fixture with critical-only status"
          git push origin HEAD:co-e2e-01-03-critical-authority
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json
      - run: npm ci
        working-directory: diligence-artifact-backend
      - run: npm run check:phase8-domain-control-obligation
        working-directory: diligence-artifact-backend
      - run: npm run check:repair-required-retirement
        working-directory: diligence-artifact-backend
      - run: npm run check:phase1-16-production
        working-directory: diligence-artifact-backend
