name: Apply White-Label AI Templates

on:
  push:
    branches:
      - white-label-ai-template-cutover
    paths:
      - "diligence-artifact-backend/scripts/apply-white-label-ai-templates.py"
      - "diligence-artifact-backend/scripts/neutral-ai-governance-banner.png"
      - ".github/workflows/apply-white-label-ai-templates.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-white-label:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout cutover branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply neutral template presentation
        run: python diligence-artifact-backend/scripts/apply-white-label-ai-templates.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diligence-artifact-backend/package-lock.json

      - name: Install locked dependencies
        working-directory: diligence-artifact-backend
        run: npm ci

      - name: Validate Phase 16 assembly against all templates
        working-directory: diligence-artifact-backend
        run: npm run check:phase16-assembly

      - name: Commit white-label templates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diligence-artifact-backend/references/document-templates/ai/v2_1
          if git diff --cached --quiet; then
            echo "No template changes produced."
            exit 0
          fi
          git commit -m "Remove LexNova branding from AI document templates"
          git push origin HEAD:${GITHUB_REF_NAME}
