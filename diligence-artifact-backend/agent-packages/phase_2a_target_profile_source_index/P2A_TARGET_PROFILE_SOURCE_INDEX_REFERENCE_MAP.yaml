hard_rules:
  - Phase 2A emits locators only.
  - Phase 2A must not emit or infer Target Profile Review values.
  - Phase 2A must not summarize, quote, excerpt, or copy source text.
  - Phase 2A must not determine legal, regulatory, compliance, license, ombudsman, or grievance sufficiency conclusions.
  - Phase 2A must not derive governing law or courts/venue from regulatory, grievance, complaints, support, or contact pages.
  - Target Profile Review derives material values later from scoped source artifacts and active derivation authority.
