reference_map_name: P2A_TARGET_PROFILE_SOURCE_INDEX_REFERENCE_MAP
version: v2_phase1_v5_field_aware_locator_reference_map
phase: P2A_TARGET_PROFILE_SOURCE_INDEX
public_label: Target Profile Source Index
package_status: FIELD_AWARE_REFERENCE_MAP_LOCKED
lock_status: LOCKED

purpose: >-
  Package-local reference map for Phase 2A Target Profile Source Index. This
  file maps Target Profile Review material fields to external derivation
  authorities, allowed source scopes, and locator families. It is a locator
  reference map only. It does not define derivation rules, does not authorize
  value derivation, and does not replace the Target Profile Review derivation
  authority.

authority_sources:
  backend_contract: src/phases/02-cartography-index/target-profile-source-index.contract.js
  deterministic_builder: src/phases/02-cartography-index/services/target-profile-deterministic-map.builder.js
  semantic_validator: src/phases/02-cartography-index/validators/target-profile-semantic-profile.validator.js
  target_profile_derivation_authority: references/registry/Diligence_Field_Derivation_Registry.yml
  base_field_registry: references/registry/Diligence_Field_Derivation_Registry.yml
  regulatory_grievance_field_addendum: references/registry/Diligence_Field_Derivation_Registry.yml

source_contract:
  phase1_contract: PHASE1_V5_17_ROOT_MULTI_DOMAIN_UNION_PROBE
  allowed_control_artifacts:
    - source_discovery_handoff
    - post_phase_1_domain_gate_handoff
    - source_discovery_matrix_manifest
    - neutral_evidence_bucket_manifest
    - adapter_expansion_log
    - source_family_index
    - legal_doc_inventory
    - legal_doc_extraction_index
    - legal_doc_lossless_validation_manifest
    - legal_doc_{DOC_TYPE}
  allowed_target_roots:
    - lossless_root__homepage_landing
    - lossless_root__company_identity
    - lossless_root__contact_notice
    - lossless_root__pricing_commercial_availability
    - lossless_root__regulatory_licensing_status
    - lossless_root__grievance_complaints
  dynamic_reads:
    - legal_doc_{DOC_TYPE}
  retired_roots_forbidden:
    - lossless_root__about_company
    - lossless_root__legal_identity_notice
    - lossless_root__operator_entity_signals
    - lossless_root__supporting_company_signals
    - lossless_root__security_trust
    - lossless_root__trust_compliance
    - lossless_root__support_help
    - lossless_root__blog_resources
    - lossless_root__careers_hiring
    - lossless_root__public_repository_developer_assets
    - lossless_root__third_party_profiles
    - lossless_root__technical_docs_api_developer

execution_boundary:
  phase_2a_action: LOCATE_ONLY
  derived_values_forbidden: true
  target_profile_output_forbidden: true
  domain_derivation_forbidden: true
  lane_derivation_forbidden: true
  activity_derivation_forbidden: true
  data_privacy_navigation_forbidden: true
  full_legal_cartography_reserved_for_2e: true
  target_profile_review_derives_values_later: true
  source_artifacts_remain_source_of_truth: true
  full_text_copied: false
  summaries_allowed: false
  excerpts_allowed: false

phase_boundaries:
  p2a_owns: target-profile source locators and target-profile legal signal locators
  p3a_owns: target_profile material value derivation
  p2e_m9_owns: full legal/governance cartography
  legal_signal_derivation_profile_status: COMPATIBILITY_ONLY_UNTIL_DOWNSTREAM_CUTOVER

