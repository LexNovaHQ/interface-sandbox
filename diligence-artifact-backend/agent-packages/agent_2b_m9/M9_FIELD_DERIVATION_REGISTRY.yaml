registry_name: M9_FIELD_DERIVATION_REGISTRY
version: v2_semantic_label_queue
owner_agent: agent_2b_m9
phase: M9
purpose: >-
  Defines how M9 semantic labels are derived from the deterministic
  semantic_label_queue and loaded legal/governance corpus. This registry is
  reference material for the canonical M9 package. It is not a separate agent.

source_of_truth:
  deterministic_structure: legal_cartography_deterministic_map
  semantic_queue: legal_cartography_deterministic_map.semantic_label_queue
  legal_text: lossless_family__L1_CORE_TERMS_PRIVACY through lossless_family__L6_ENTITY_NOTICE
  final_output: legal_cartography_index

boundary_rules:
  deterministic_layer:
    owns:
      - document identity
      - document class
      - section and subsection structure
      - clause-group structure
      - annexure schedule appendix addendum exhibit notice detection
      - source URL and source family
      - source status
      - line and character pointers
      - parent-child unit relationship
      - missing or limited source status
      - semantic_label_queue creation
      - semantic_label_queue priority assignment
      - page-furniture and sentence-fragment exclusion before semantic labeling
    forbidden:
      - registry row status
      - product archetype decision
      - surface gate decision
      - exposure finding
      - final legal conclusion
  semantic_layer:
    owns:
      - registry_subcat_relevance for queued units
      - control_language_family for queued controls
      - semantic_function
      - semantic confidence
      - semantic limitation
    forbidden:
      - new deterministic IDs
      - new source URLs
      - source status changes
      - document structure changes
      - registry row status
      - final exposure finding
      - post-M9 action routing

queue_rules:
  semantic_label_queue_is_authoritative: true
  required_priorities:
    - P0
    - P1
  optional_priorities:
    - P2
  excluded_priorities:
    - P3
  required_coverage_threshold: 0.80
  ideal_coverage_threshold: 0.90
  instruction: >-
    Semantic must label every queue row with priority P0 or P1 unless the row is
    malformed. P2 rows may be labeled if model budget allows. Raw macro_unit_map
    is not the semantic coverage source.

allowed_values:
  registry_subcat_relevance: [CNS, LIA, HAL, INF, PRV, BIO, DEC, HRM, FRD, TRD]
  control_language_family: [FORMATION_CONTRACT, ACTIVITY_SPECIFIC_DISCLOSURE, DATA_PRIVACY, VENDORS_TRANSFER, SECURITY, USE_SAFETY, AGENT_AUTHORITY, IP_CONTENT, COMMERCIAL_LEGAL_ALLOCATION, CONTACT_ROUTES, INDEMNITY, UNKNOWN_CONTROL_LANGUAGE]
  confidence: [CLEAR, PARTIAL, UNCLEAR, THIN, REINVESTIGATE]
  unit_semantic_status: [LOCKED, LOCKED_WITH_LIMITATIONS, REPAIR_REQUIRED]
  downstream_treatment: [USE_AS_NAVIGATION, REVIEW_WITH_LIMITATION, DO_NOT_USE_WITHOUT_REPAIR]

field_derivations:
  document_labels:
    rows_required_from: legal_cartography_deterministic_map.document_map
    pointer_required: document_id
    rule: Copy deterministic document identifiers and class labels exactly. Add only short role label, confidence, status, and downstream_treatment.

  unit_subcat_labels:
    rows_required_from: legal_cartography_deterministic_map.semantic_label_queue where priority is P0 or P1
    pointer_required: unit_id
    rule: Copy unit_id, section_id, document_id, unit_type, and heading_label from the queue. Add only registry_subcat_relevance, control_language_family, confidence, unit_semantic_status, downstream_treatment, and boundary_note.

  control_family_labels:
    rows_required_from: legal_cartography_deterministic_map.control_language_candidate_map whose unit_id appears in required semantic_label_queue
    pointer_required: control_candidate_id
    rule: Copy control_candidate_id, unit_id, section_id, and document_id exactly. Confirm or narrow the control_language_family using the queued unit and source pointer. Do not invent new control_candidate_id values.

  indemnity_labels:
    rows_required_from: legal_cartography_deterministic_map.indemnity_candidate_map whose unit_id appears in required semantic_label_queue
    pointer_required: indemnity_candidate_id
    rule: Label only location and confidence. Do not assess adequacy.

  cross_reference_labels:
    rows_required_from: legal_cartography_deterministic_map.cross_document_reference_map
    pointer_required: cross_reference_id
    rule: Label relationship and loaded/unloaded status only. Do not fetch or assume unloaded content.

  missing_source_labels:
    rows_required_from: legal_cartography_deterministic_map.missing_source_map
    pointer_required: missing_id
    rule: Treat missing/limited source rows as cartography limitations only.

semantic_integrity_summary_required_fields:
  - semantic_queue_total
  - semantic_queue_required_total
  - semantic_required_units_labeled
  - semantic_required_controls_total
  - semantic_required_controls_labeled
  - semantic_required_coverage_ratio
  - semantic_rows_total
  - semantic_rows_attached_to_deterministic_ids
  - semantic_rows_repaired_or_omitted
  - full_text_copied
  - new_sources_created
  - ready_for_compiler

subcat_derivation_rules:
  CNS: contract formation, user assent, consumer notice, account terms, cancellation, billing disclosure.
  LIA: liability allocation, warranty, disclaimer, indemnity, damages, governing law, jurisdiction, dispute terms.
  HAL: output accuracy, reliance, generated-content limitations, no-advice wording, user responsibility for outputs.
  INF: ownership, IP rights, copyright, licenses, user content, output rights, training use, scraping, takedown.
  PRV: personal data, privacy notice, retention, deletion, processing purpose, transfer, subprocessors, security, data requests.
  BIO: biometric or identity-specific audio/visual identifier governance.
  DEC: automated decisioning, human review, impact assessment, eligibility or material decision workflow.
  HRM: minors, wellbeing, vulnerable-user, safety escalation, or harmful-interaction governance.
  FRD: authenticity, misrepresentation, impersonation, deceptive use, AI-generated content disclosure.
  TRD: trading, pricing, investment, financial transactions, market manipulation, order execution.

validation_rules:
  - Semantic rows must attach to deterministic IDs.
  - Semantic layer must not create source URLs or source statuses.
  - Semantic layer must not output post-M9 action routing fields.
  - Empty subcat array is allowed only when no subcat is supported for a queued material unit.
  - Missing or limited source rows must remain limitations, not exposure findings.
  - Final row status remains owned by M11, not M9.
  - ready_for_compiler may be true only when semantic_required_coverage_ratio is at least 0.80.
