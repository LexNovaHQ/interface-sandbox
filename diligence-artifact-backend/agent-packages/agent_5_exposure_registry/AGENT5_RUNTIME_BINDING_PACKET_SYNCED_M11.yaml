<RUNTIME_BINDING_PACKET>
runtime_contract: AGENT5_PHASE9_EXPOSURE_PHASE2G
runtime_contract_version: v14_auto_selector_execution_identity
active_agent_id: agent_5_exposure_registry
active_agent_name: Interface Exposure Registry Agent
active_phase_scope: M11_EXPOSURE_REGISTRY
run_mode: BATCHED_AGENT
run_id_required: true
run_id: "{{run_id}}"

routing_authority:
  authority: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
  route_id: ROUTE.PHASE10.EXPOSURE_PROFILE
  bucket_id: 2F_BUCKET_LEGAL_CARTOGRAPHY_LEGAL_SIGNALS
  delivery_mode: SOURCE_BUCKET_PROFILE
  lossless_evidence_role: PRIMARY_EVIDENCE
  index_role: MANDATORY_NAVIGATION_MAP_INTO_PRIMARY_EVIDENCE
  direct_lossless_as_fallback_allowed: false
  free_corpus_read_allowed: false
  profile_forensics_inputs_allowed: false
  phase2f_forward_owner: M11
  m9_is_index_builder_not_route_owner: true

allowed_phases:
  - M11_EXPOSURE_REGISTRY

read_artifacts:
  - phase_routing_manifest
  - phase_route_runtime_packet
  - legal_cartography_index
  - legal_signal_derivation_profile
  - admitted_2f_lossless_legal_governance_bucket
  - admitted_legal_doc_dynamic_artifacts
  - target_profile
  - domain_derivation_profile
  - feature_candidate_inventory
  - target_feature_profile
  - dap_registry_manifest
  - dap_strategic_derivation_matrix
  - dap_semantic_batch_route_manifest
  - dap_semantic_batch_exec_artifact
  - dap_semantic_batch_lim_artifact
  - dap_semantic_batch_party_artifact
  - dap_semantic_batch_role_artifact
  - dap_semantic_batch_flow_artifact
  - dap_semantic_batch_obj_artifact
  - dap_semantic_batch_auth_artifact
  - dap_semantic_batch_ctrl_artifact
  - dap_semantic_batch_contact_cm_artifact
  - dap_semantic_batch_vend_artifact
  - dap_semantic_batch_loc_artifact
  - dap_semantic_batch_ret_artifact
  - dap_semantic_batch_sec_artifact
  - dap_semantic_batch_sens_artifact
  - dap_semantic_batch_dom_artifact
  - dap_semantic_batch_ready_artifact
  - dap_semantic_batch_req_artifact
  - dap_semantic_batch_validation_manifest
  - data_provenance_profile_semantic_batch_gate
  - domain_selection_profile
  - active_run_package_manifest

forbidden_read_artifacts:
  - target_profile_forensics
  - target_feature_profile_forensics
  - dap_forensics_profile
  - retired_data_provenance_profile
  - retired_data_provenance_profile_forensics
  - extended_dap_india_readiness_profile
  - integrated_dap_report
  - lossless_family__*
  - source_outside_active_2f_packet

shared_reference_files:
  - 03_REGISTRY_EVALUATION_RULES.yaml
  - Diligence_Field_Derivation_Registry.yml
  - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml

registry_binding_authority:
  file: references/registry/THREAT_REGISTRY_BINDINGS_v1.yaml
  authority_role: SOLE_EXECUTABLE_THREAT_REGISTRY_BINDING_AUTHORITY
  runtime_auto_selection: ACTIVE
  selector_authority: domain_derivation_profile
  active_run_package_manifest_role: CONSISTENCY_CHECK_ONLY
  selected_reference_loading:
    - package_key_file_from_binding_authority
    - threat_registry_file_from_binding_authority

execution_identity_contract:
  version: PHASE10_EXECUTION_IDENTITY_v2
  global_identity_field: registry_row_key
  format: <package_id>::<Threat_ID>
  canonical_threat_id_preserved: true
  silent_namespacing_forbidden: true
  model_may_emit_registry_row_key: false

checkpoint_fingerprint_contract:
  registry_set_fingerprint_required: true
  phase5_classification_fingerprint_required: true
  phase10_execution_fingerprint_required: true
  stale_checkpoint_reuse_forbidden: true

active_prompt_files:
  - PHASE10_AUTO_SELECTOR_AND_FINGERPRINT_ADDENDUM.md
  - M11_EXPOSURE_REGISTRY.md
  - 00_M11_RUNTIME_CONTROLLER.md
  - M11_A_DETERMINISTIC_ROUTING_PREFILL.md
  - M11_B_BATCH_PACKET_ASSEMBLY.md
  - M11_C_BATCH_EVALUATION.md
  - M11_D_BATCH_REINVESTIGATION_REPAIR.md

m11_three_layer_contract:
  layer_1_backend:
    - resolve_phase3_primary_and_ai_mount
    - load_selected_registry_bindings
    - validate_registry_union_identity
    - build_active_threat_registry_manifest
    - calculate_registry_and_execution_fingerprints
    - persist_active_threat_registry_manifest_before_route_plan
    - build_route_plan
    - build_batch_plan
    - resolve_2f_navigation_and_primary_evidence
    - prefill_registry_spine
  layer_2_model:
    - apply_hunter_trigger_to_active_batch_evidence
    - return_semantic_status_inputs
    - return_basis_and_limitation_fields
  layer_3_backend:
    - deterministic_batch_validation
    - deterministic_final_material_status
    - save_accepted_batch
    - merge_workpad_98
    - project_controlled_and_triggered_profiles
    - assemble_m11_forensics_side_output

model_forbidden_actions:
  - create_or_rewrite_active_threat_registry_manifest
  - select_or_mount_threat_registry
  - create_or_rewrite_registry_row_key
  - create_or_rewrite_execution_fingerprint
  - create_or_rewrite_route_plan
  - choose_batch_membership
  - rewrite_registry_spine
  - choose_final_material_status
  - save_artifacts
  - merge_workpad
  - project_material_profiles
  - assemble_forensics
  - emit_challenge_gate
  - perform_global_m12_challenge
  - compile_or_render

write_artifacts_in_order:
  - active_threat_registry_manifest
  - exposure_registry_route_plan
  - exposure_registry_batch_validation__GROUP__NNN
  - exposure_registry_batch__GROUP__NNN
  - exposure_registry_workpad_98
  - exposure_registry_controlled_profile
  - exposure_registry_triggered_profile
  - exposure_registry_profile_forensics

m12_boundary:
  owner: agent_7_m12
  delivery_mode: DERIVED_ONLY
  exposure_forensics_required: false
  preceding_forensics_required: false
  challenge_gate_written_by_agent5: false

terminal_rule:
  stop_after_m11_lock: true
</RUNTIME_BINDING_PACKET>
