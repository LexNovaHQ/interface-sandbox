<RUNTIME_BINDING_PACKET>
runtime_contract: AGENT5_PHASE10_EXPOSURE_PHASE2G
runtime_contract_version: v17_domain_agnostic_layer2_layer3_forensics
active_agent_id: agent_5_exposure_registry
active_phase_scope: M11_EXPOSURE_REGISTRY
run_mode: PACKAGE_SCOPED_BATCHED_AGENT

routing_authority:
  authority: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
  route_id: ROUTE.PHASE10.EXPOSURE_PROFILE
  bucket_id: 2F_BUCKET_LEGAL_CARTOGRAPHY_LEGAL_SIGNALS
  delivery_mode: SOURCE_BUCKET_PROFILE
  lossless_evidence_role: PRIMARY_EVIDENCE
  index_role: MANDATORY_NAVIGATION_MAP_INTO_PRIMARY_EVIDENCE
  index_gap_navigation_role: SAME_BUCKET_PRIMARY_EVIDENCE_NAVIGATION_NOT_FALLBACK
  profile_forensics_inputs_allowed: false

registry_binding_authority:
  file: references/registry/THREAT_REGISTRY_BINDINGS_v1.yaml
  authority_role: SOLE_EXECUTABLE_THREAT_REGISTRY_BINDING_AUTHORITY
  selector_authority: domain_derivation_profile
  active_run_package_manifest_role: CONSISTENCY_CHECK_ONLY

execution_identity_contract:
  version: PHASE10_EXECUTION_IDENTITY_v2
  global_identity_field: registry_row_key
  format: <package_id>::<Threat_ID>
  canonical_threat_id_preserved: true
  raw_threat_id_may_repeat_across_package_streams: true
  raw_threat_id_unique_inside_one_batch: true
  model_may_read_registry_row_key: true
  model_may_emit_registry_row_key: false
  model_output_identity_field: Threat_ID

phase5_classification_inventory_contract:
  schema_version: phase5_classification_inventory.v1
  source_authority: target_feature_profile
  phase10_projects_only: true
  primary_source_path: activities[].primary_classification
  overlay_source_path: activities[].overlay_classifications[]
  missing_mounted_stream_classification_result: CONTROLLED_FAILURE
  global_cross_package_archetype_union_forbidden: true

package_scoped_route_contract:
  version: M11_PACKAGE_SCOPED_ROUTE_RULES_v1
  primary_and_overlay_streams_separate: true
  uni_always_run: true
  non_uni_requires_matching_package_archetype: true
  surface_only_routing_forbidden: true
  registry_row_key_reconciliation_required: true

batch_planner_contract:
  version: M11_MAX_15_PACKAGE_SCOPED_BATCH_PLANNER_v1
  max_rows: 15
  packet_ceiling_chars: 180000
  one_package_per_batch: true
  one_stream_per_batch: true
  one_archetype_group_per_batch: true
  evidence_or_registry_truncation_forbidden: true

semantic_packet_contract:
  version: M11_PACKAGE_SCOPED_SEMANTIC_PACKET_v1
  exact_batch_identity_required: true
  model_may_change_packet: false

semantic_output_contract:
  version: M11_PACKAGE_SCOPED_SEMANTIC_LEDGER_v1
  only_root: m11_batch_registry_ledger
  model_identity_field: Threat_ID
  exact_expected_coverage_required: true
  preserve_expected_order: true
  partial_ledger_forbidden: true
  deterministic_fields_forbidden: true
  final_status_forbidden: true

semantic_repair_contract:
  version: M11_PACKAGE_SCOPED_SEMANTIC_REPAIR_v1
  maximum_attempts: 1
  same_packet_required: true
  complete_ledger_return_required: true
  immutable_batch_identity_required: true

layer3_contract:
  version: M11_DYNAMIC_LAYER3_v1
  final_status_authority: DETERMINISTIC_BACKEND
  final_status_order:
    - CONTROLLED_BY_EXCLUSION
    - CONTROLLED_BY_PUBLIC_EVIDENCE_LIMITATION
    - CONTROLLED_BY_VISIBLE_CONTROL
    - TRIGGERED
  allowed_final_statuses:
    - TRIGGERED
    - CONTROLLED_BY_VISIBLE_CONTROL
    - CONTROLLED_BY_EXCLUSION
    - CONTROLLED_BY_PUBLIC_EVIDENCE_LIMITATION
  not_applicable_route_status: NOT_TRIGGERED_NOT_APPLICABLE
  workpad_row_count: DYNAMIC_FROM_ACTIVE_MANIFEST
  stable_workpad_artifact_token: exposure_registry_workpad_98
  compound_identity_reconciliation_required: true

forensics_contract:
  version: M11_DOMAIN_AGNOSTIC_FORENSICS_v1
  expected_count_authority: active_threat_registry_manifest
  fixed_98_row_assumption: false
  fixed_ai_subcategory_assumption: false
  primary_overlay_trace_separate: true
  registry_row_key_trace_required: true
  batch_validation_custody_required: true
  route_workpad_profile_reconciliation_required: true

checkpoint_contract:
  phase10_execution_fingerprint_required: true
  stale_checkpoint_reuse_forbidden: true
  accepted_batch_schema: m11_batch_registry_ledger.v3.package_scoped.accepted
  workpad_schema: exposure_registry_workpad.v3.dynamic
  controlled_schema: exposure_registry_controlled_profile.v3.dynamic
  triggered_schema: exposure_registry_triggered_profile.v3.dynamic
  forensics_schema: M11_DOMAIN_AGNOSTIC_FORENSICS_v1

semantic_prompt_files:
  - AGENT5_RUNTIME_BINDING_PACKET_SYNCED_M11.yaml
  - 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED_AGENT5_SYNCED.md
  - 00_M11_RUNTIME_CONTROLLER.md
  - M11_EXPOSURE_REGISTRY.md
  - M11_B_BATCH_PACKET_ASSEMBLY.md
  - M11_DOMAIN_CONTROL_OBLIGATION_HANDOFF.md
  - M11_C_BATCH_EVALUATION.md
  - 00_VALIDATOR_RULES_INTEGRATED_AGENT5_SYNCED.md
  - BACKEND_CANONICAL_OUTPUT_ADAPTER.md

semantic_repair_prompt_files:
  - AGENT5_RUNTIME_BINDING_PACKET_SYNCED_M11.yaml
  - 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED_AGENT5_SYNCED.md
  - 00_M11_RUNTIME_CONTROLLER.md
  - M11_EXPOSURE_REGISTRY.md
  - M11_B_BATCH_PACKET_ASSEMBLY.md
  - M11_DOMAIN_CONTROL_OBLIGATION_HANDOFF.md
  - M11_D_BATCH_REINVESTIGATION_REPAIR.md
  - 00_VALIDATOR_RULES_INTEGRATED_AGENT5_SYNCED.md
  - BACKEND_CANONICAL_OUTPUT_ADAPTER.md

m11_three_layer_contract:
  layer_1_backend:
    status: ACTIVE
  layer_2_model:
    status: CO_8_DOMAIN_AGNOSTIC_RUNTIME_ACTIVE
    current_runtime_may_call_model: true
  layer_3_backend:
    status: CO_9_DYNAMIC_FINALIZATION_ACTIVE
  forensics:
    status: CO_10_DOMAIN_AGNOSTIC_TRACE_ACTIVE

model_forbidden_actions:
  - select_or_mount_threat_registry
  - create_or_rewrite_registry_row_key
  - reclassify_phase5_activity
  - create_or_rewrite_route_plan
  - choose_stream_membership
  - choose_batch_membership
  - rewrite_registry_spine
  - choose_final_material_status
  - save_artifacts
  - merge_workpad
  - project_material_profiles
  - assemble_forensics
  - emit_challenge_gate
  - compile_or_render

write_artifacts_in_order:
  - active_threat_registry_manifest
  - exposure_registry_route_plan
  - exposure_registry_batch_validation__{batch_id}
  - exposure_registry_batch__{batch_id}
  - exposure_registry_workpad_98
  - exposure_registry_controlled_profile
  - exposure_registry_triggered_profile
  - exposure_registry_profile_forensics

m12_boundary:
  owner: agent_7_m12
  delivery_mode: DERIVED_ONLY
  exposure_forensics_required: false
  challenge_gate_written_by_agent5: false
  current_handoff_allowed: true
</RUNTIME_BINDING_PACKET>
