backend_permission_profile: agent_3_target_feature
validator_profile: agent_3_m7_then_m8_sequential_validator
phase_packet_contract: agent_3_m7_then_m8_phase_packet_contract
terminal_receipt_profile: agent_3_same_chat_receipt
next_agent_command: "@Interface Data Privacy Agent Continue run {{run_id}}."
stop_condition: "Stop after separate M7 and M8 completion."
</RUNTIME_BINDING_PACKET>
