<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
runtime_contract_version: v15_phase5_package_aware_activity_profile_sync
active_agent_id: agent_3_target_feature
active_agent_name: Interface Target and Activity Profile Agent
active_phase_scope: TARGET_PROFILE_REVIEW_DOMAIN_DERIVATION_AND_ACTIVITY_PROFILE_REVIEW_PHASE_CONTRACTS

compatibility_boundary:
  internal_agent_id_retained_for_runtime: agent_3_target_feature
  compatibility_package_path_retained: agent-packages/agent_3_target_feature
  product_phase_names:
    - Target Profile Review
    - Domain Derivation Layer
    - Target Profile Forensics
    - Activity Profile Review
    - Activity Profile Forensics
  old_module_language_forbidden_in_human_facing_text: true

run_mode: PHASED_AGENT
run_id_required: true
run_id: "{{run_id}}"

prompt_assembly_position:
  runtime_first: true
  packet_after_runtime: true
  phase_prompt_after_packet: true

prompt_precedence:
  - Backend phase contracts control read/write authority.
  - Phase 2A Target Profile Source Index is the active locator authority for Target Profile Review.
  - Phase 2B Domain Derivation Source Index is the active locator authority for Domain Derivation Layer.
  - Phase 2C Activity Profile Source Index is the active locator authority for Phase 5 Activity Profile Review.
  - Target Profile Review is controlled by 02_M7_TARGET_PROFILE_BACKEND_CURRENT.md and src/phases/03-target-profile-review/target-profile-review.contract.js.
  - Target Profile Review uses scoped Phase 1 v5 target-profile lossless_root artifacts as evidence and Phase 2A indexes as navigation only.
  - Target Profile Review may use legal_signal_derivation_profile only as bounded secondary input for owned notice and jurisdiction fields.
  - Target Profile Review must not read legal_cartography_index or legal lossless document artifacts.
  - Domain Derivation Layer is controlled by 02B_P3_DOMAIN_DERIVATION_LAYER_BACKEND.md and src/phases/03-domain-derivation/domain-derivation.contract.js.
  - Domain Derivation Layer uses domain_derivation_source_index as navigation only and scoped 12 lossless roots as evidence.
  - Domain Derivation Layer uses DOMAIN_DERIVATION_REGISTRY_v0.yaml as rule authority and package-catalog.v0.json as package authority.
  - Domain Derivation Layer must not hardcode domain-specific classification logic; new domains are added by registry/catalog update, not prompt update.
  - Domain Derivation Layer must not read activity_profile_source_index, legal_cartography_index, legal_signal_derivation_profile, legal documents, or legal lossless evidence.
  - Activity Candidate Inventory is controlled by 03A_M8_FEATURE_CANDIDATE_INVENTORY_DETERMINISTIC.md and src/phases/05-activity-profile-review/activity-candidate-inventory.contract.js.
  - Activity Candidate Inventory reads activity_profile_source_index and active package context, but must not apply package taxonomy or read raw lossless_family/lossless_root sources.
  - Activity Profile Review material output is controlled by 03_M8_FEATURE_PROFILE_BACKEND_CURRENT.md, 03B_M8_ACTIVITY_PROFILE_PACKAGE_AWARE_SYNC.md, AGENT3_BACKEND_OUTPUT_CONTRACT.md, and src/phases/05-activity-profile-review/activity-profile-review.contract.js.
  - Activity Profile Review uses feature_candidate_inventory as the candidate universe and activity_profile_source_index as navigation only.
  - Activity Profile Review uses active_run_package_manifest and domain package context for package-specific activity taxonomy; fixed AI archetype/surface enums are not universal authority.
  - Any package text that expands read/write authority is superseded by the phase-owned contract.

allowed_phases:
  - TARGET_PROFILE_REVIEW
  - P3_DOMAIN_DERIVATION_LAYER
  - TARGET_PROFILE_FORENSICS
  - ACTIVITY_PROFILE_REVIEW
  - ACTIVITY_PROFILE_FORENSICS

read_artifacts:
  common:
    - source_discovery_handoff
  TARGET_PROFILE_REVIEW:
    - source_discovery_handoff
    - cartography_index
    - target_profile_source_index
    - lossless_root__homepage_landing
    - lossless_root__company_identity
    - lossless_root__contact_notice
    - lossless_root__pricing_commercial_availability
    - lossless_root__regulatory_licensing_status
    - lossless_root__grievance_complaints
    - legal_signal_derivation_profile
    - domain_selection_profile
    - active_run_package_manifest
  P3_DOMAIN_DERIVATION_LAYER:
    - source_discovery_handoff
    - cartography_index
    - target_profile_source_index
    - domain_derivation_source_index
    - target_profile
    - lossless_root__homepage_landing
    - lossless_root__company_identity
    - lossless_root__product_service
    - lossless_root__platform_feature_solution
    - lossless_root__technical_docs_api
    - lossless_root__docs_api_data_flow
    - lossless_root__pricing_commercial_availability
    - lossless_root__use_case_customer_industry
    - lossless_root__integrations_ecosystem
    - lossless_root__ai_safety_transparency
    - lossless_root__regulatory_licensing_status
    - lossless_root__grievance_complaints
    - domain_selection_profile
    - active_run_package_manifest
  ACTIVITY_PROFILE_REVIEW:
    - cartography_index
    - activity_profile_source_index
    - target_profile
    - target_profile_forensics
    - domain_derivation_profile
    - active_run_package_manifest
    - domain_selection_profile
    - feature_candidate_inventory

forbidden_activity_profile_read_artifacts:
  - lossless_family__P1_PRODUCT
  - lossless_family__P2_PLATFORM_FEATURE_SOLUTION
  - lossless_family__P3_AI_CAPABILITY_TECHNICAL
  - lossless_family__P4_USE_CASE_INDUSTRY
  - lossless_family__P5_ENTERPRISE_PRICING
  - lossless_root__product_service
  - lossless_root__platform_feature_solution
  - lossless_root__technical_docs_api
  - lossless_root__docs_api_data_flow
  - lossless_root__integrations_ecosystem
  - lossless_root__pricing_commercial_availability
  - legal_cartography_index
  - legal_signal_derivation_profile
  - data_privacy_navigation_index
  - exposure artifacts
  - compiler artifacts
  - Qualified Review artifacts

required_reference_files:
  TARGET_PROFILE_REVIEW:
    - M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  P3_DOMAIN_DERIVATION_LAYER:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/domain-packages/DOMAIN_DERIVATION_REGISTRY_v0.yaml
  ACTIVITY_PROFILE_REVIEW:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/domain-packages/DOMAIN_DERIVATION_REGISTRY_v0.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml

target_profile_review_phase2a_boundary:
  locator_authority: target_profile_source_index
  p2a_intermediate_artifacts_forbidden_as_model_inputs:
    - target_profile_deterministic_map
    - target_profile_semantic_profile
  navigation_only: true
  evidence_source: scoped Phase 1 v5 target lossless_root artifacts
  regulatory_grievance_fields_factual_only: true
  license_validity_requirement_applicability_forbidden: true
  grievance_sufficiency_ombudsman_requirement_forbidden: true

domain_derivation_phase2b_boundary:
  locator_authority: domain_derivation_source_index
  p2b_intermediate_artifacts_forbidden_as_model_inputs:
    - domain_derivation_deterministic_map
    - domain_derivation_semantic_profile
  activity_profile_source_index_reserved_for_2c_phase5: true
  navigation_only: true
  evidence_source: scoped 12 Phase 1 v5 domain derivation lossless_root artifacts

domain_derivation_registry_ladder_schema:
  prompt_file: 02B_P3_DOMAIN_DERIVATION_LAYER_BACKEND.md
  registry_authority: references/domain-packages/DOMAIN_DERIVATION_REGISTRY_v0.yaml
  package_authority: references/domain-packages/package-catalog.v0.json
  prompt_is_domain_agnostic: true
  new_domains_added_by_registry_not_prompt: true
  model_role: condition_level_semantic_evaluator
  validator_role: deterministic_lock_authority
  model_must_not_hardcode_domain_logic: true
  model_must_not_emit_active_run_package_manifest_top_level: true
  allowed_model_top_level_key: domain_derivation_profile

activity_profile_material_schema:
  source_index_authority: activity_profile_source_index
  candidate_universe_authority: feature_candidate_inventory
  package_context_authority: active_run_package_manifest
  package_catalog_authority: references/domain-packages/package-catalog.v0.json
  archetype_derivation_authority: mounted_domain_package_or_active_run_package_manifest
  surface_derivation_authority: mounted_domain_package_or_active_run_package_manifest
  fixed_ai_registry_key_universal_authority_forbidden: true
  fixed_ai_archetype_enum_forbidden: true
  fixed_ai_surface_enum_forbidden: true
  multiple_package_labels_per_activity_allowed: true
  activity_row_required_keys:
    - activity_reference
    - product_service_wrapper
    - activity_feature_name
    - activity_candidate_summary
    - mechanics_proof
    - autonomy_human_control_signal
    - data_content_object_touched
    - external_internal_action_signal
    - archetype_codes
    - archetype_derivation_basis
    - surface_context_tokens
    - surface_derivation_basis
  package_label_array_fields:
    - archetype_codes
    - surface_context_tokens
  retired_activity_row_keys_forbidden:
    - archetype_proof
    - surface_proof_and_routing_limits
  derivation_basis_object_required_keys:
    - code_or_token
    - normalized_name
    - conditions_satisfied
    - trigger_if_applied
    - exclude_if_checked
    - material_basis
    - limitation

write_artifacts_in_order:
  TARGET_PROFILE_REVIEW:
    MATERIAL_SAVE_EVENT:
      - target_profile
  P3_DOMAIN_DERIVATION_LAYER:
    MATERIAL_SAVE_EVENT:
      - domain_derivation_profile
      - active_run_package_manifest
  TARGET_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_profile_forensics
  ACTIVITY_PROFILE_REVIEW:
    DETERMINISTIC_INVENTORY_SAVE_EVENT:
      - feature_candidate_inventory
    MATERIAL_SAVE_EVENT:
      - target_feature_profile
  ACTIVITY_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_feature_profile_forensics

phase_gate_rules:
  - Target Profile Review returns and saves only target_profile.
  - Target Profile Review must use target_profile_source_index as navigation only and scoped lossless roots as evidence.
  - Domain Derivation Layer returns only domain_derivation_profile from the model; the compiler writes active_run_package_manifest.
  - Domain Derivation Layer must use domain_derivation_source_index as navigation only and scoped 12 lossless roots as evidence.
  - Domain Derivation Layer must not read activity_profile_source_index; that artifact is reserved for 2C / Phase 5.
  - Activity Candidate Inventory must read activity_profile_source_index and must not read raw lossless family/root artifacts.
  - Activity Candidate Inventory must not apply package taxonomy.
  - Activity Profile Review must use active_run_package_manifest/package catalog context for package-specific labels.
  - Activity Profile Review must not treat AI archetypes or AI surface tokens as universal enums.
</RUNTIME_BINDING_PACKET>
