<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
runtime_contract_version: v5_m7_direct_legal_signal_profile_m8_feature_candidate_inventory_index
active_agent_id: agent_3_target_feature
active_agent_name: Interface Target Feature Agent
active_phase_scope: M7_TARGET_PROFILE_THEN_M8_FEATURE_CANDIDATE_INVENTORY_THEN_M8_TARGET_FEATURE_PROFILE

run_mode: PHASED_AGENT
run_id_required: true
run_id: "{{run_id}}"

prompt_assembly_position:
  runtime_first: true
  packet_after_runtime: true
  phase_prompt_after_packet: true

prompt_precedence:
  - 02_M7_TARGET_PROFILE_BACKEND_CURRENT.md controls all M7 active reads and source authority.
  - M7_TARGET_PROFILE is profile-bucket only and must not read legal/governance lossless families or raw legal_cartography_index.
  - M7 may consume legal_signal_derivation_profile only for M7-owned legal notice and jurisdiction signal fields.
  - 03A_M8_FEATURE_CANDIDATE_INVENTORY_DETERMINISTIC.md controls all M8 candidate-existence, inventory, and dedup rules.
  - Any legacy wording in 03_M8_FEATURE_PROFILE_BACKEND_CURRENT.md that tells M8_TARGET_FEATURE_PROFILE to harvest candidates, build a source extraction capsule, dedupe candidates, or prove route-family coverage inside the model prompt is superseded.
  - M8_TARGET_FEATURE_PROFILE consumes the saved feature_candidate_inventory and compiles target_feature_profile only.

allowed_modules:
  - M7_TARGET_PROFILE
  - M8_FEATURE_CANDIDATE_INVENTORY
  - M8_TARGET_FEATURE_PROFILE

read_artifacts:
  common:
    - source_discovery_handoff
  M7_TARGET_PROFILE:
    - source_discovery_handoff
    - legal_signal_derivation_profile
    - lossless_family__T0_ROOT
    - lossless_family__T1_IDENTITY
    - lossless_family__T2_LEGAL_IDENTITY
    - lossless_family__T3_OPERATOR_ENTITY
    - lossless_family__T4_SUPPORTING_IDENTITY
  M8_FEATURE_CANDIDATE_INVENTORY:
    - source_discovery_handoff
    - target_profile
    - target_profile_forensics
    - lossless_family__P1_PRODUCT
    - lossless_family__P2_PLATFORM_FEATURE_SOLUTION
    - lossless_family__P3_AI_CAPABILITY_TECHNICAL
    - lossless_family__P4_USE_CASE_INDUSTRY
    - lossless_family__P5_ENTERPRISE_PRICING
  M8_TARGET_FEATURE_PROFILE:
    - source_discovery_handoff
    - target_profile
    - target_profile_forensics
    - feature_candidate_inventory
    - lossless_family__P1_PRODUCT
    - lossless_family__P2_PLATFORM_FEATURE_SOLUTION
    - lossless_family__P3_AI_CAPABILITY_TECHNICAL
    - lossless_family__P4_USE_CASE_INDUSTRY
    - lossless_family__P5_ENTERPRISE_PRICING

forbidden_m7_read_artifacts:
  - legal_cartography_index
  - m7_deterministic_legal_signal_overlay
  - lossless_family__L1_CORE_TERMS_PRIVACY
  - lossless_family__L2_B2B_CONTRACTING
  - lossless_family__L3_AI_USAGE_GOVERNANCE
  - lossless_family__L4_PRIVACY_ADJACENT_NOTICES
  - lossless_family__L5_LEGAL_HUB_HOSTED
  - lossless_family__L6_ENTITY_NOTICE

required_reference_files:
  - FIELD_DERIVATION_REGISTRY_v2_LOCKED.yaml
  - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  - CLASSIFICATION_DERIVATION_MATRIX_v1_LOCKED.yaml

write_artifacts_in_order:
  M7_TARGET_PROFILE:
    PHASE_B1_MATERIAL_SAVE_EVENT:
      - target_profile
    PHASE_D_FORENSIC_SAVE_EVENT:
      - target_profile_forensics
  M8_FEATURE_CANDIDATE_INVENTORY:
    PHASE_A_DETERMINISTIC_INDEX_SAVE_EVENT:
      - feature_candidate_inventory
  M8_TARGET_FEATURE_PROFILE:
    PHASE_B1_MATERIAL_SAVE_EVENT:
      - target_feature_profile
    PHASE_D_FORENSIC_SAVE_EVENT:
      - target_feature_profile_forensics

phase_locks:
  - M7_TARGET_PROFILE
  - M8_FEATURE_CANDIDATE_INVENTORY
  - M8_TARGET_FEATURE_PROFILE

phase_gate_rules:
  - M7 Phase B1 returns and saves only target_profile.
  - M7 Phase C may begin only after saved target_profile exists.
  - M7 Phase D returns and saves only target_profile_forensics.
  - M7 must not block because raw legal/governance artifacts are absent; unavailable legal_signal_derivation_profile values become controlled field statuses and limitations.
  - M8 feature candidate inventory may begin only after saved target_profile and target_profile_forensics exist.
  - M8 feature candidate inventory is deterministic index-only and saves only feature_candidate_inventory.
  - M8 target feature profile may begin only after saved feature_candidate_inventory exists.
  - M8 target feature profile uses feature_candidate_inventory as candidate universe and P1-P5 lossless artifacts as evidence.
  - M10 may begin only after saved feature_candidate_inventory, target_feature_profile, and target_feature_profile_forensics exist.
  - Production backend execution must not combine deterministic inventory, material artifact, and forensic artifact in the same response.

forbidden_modules:
  - M6_SOURCE_DISCOVERY
  - M9_LEGAL_CARTOGRAPHY
  - M10_DATA_PROVENANCE
  - M11_EXPOSURE_REGISTRY
  - M12_OPERATOR_CHALLENGE
  - M13_OUTPUT_HANDOFF
  - M14_TERMINAL_RENDERER

forbidden_outputs:
  - source_discovery_handoff
  - legal_cartography_index
  - m7_deterministic_legal_signal_overlay
  - target_data_provenance_profile
  - target_exposure_profile
  - operator_challenge_gate
  - final_output_handoff
  - renderer_payload
  - registry_row_evaluation
  - legal_risk_finding
  - privacy_readiness_finding
  - combined_material_and_forensic_response
  - four_artifact_target_feature_bundle
  - phase_output_wrapper
  - terminal_receipt_in_backend_mode

backend_permission_profile: agent_3_target_feature_m7_direct_legal_signal_profile_m8_split_save
validator_profile: agent_3_m7_direct_legal_signal_profile_m8_split_save_validator
phase_packet_contract: agent_3_target_feature_inventory_split_phase_packet_contract
terminal_receipt_profile: agent_3_target_feature_manual_receipt_only

next_agent_command: "backend runner advances to M10 only after M8_TARGET_FEATURE_PROFILE_FORENSICS lock"
stop_condition: "Stop after M8_TARGET_FEATURE_PROFILE lock."
</RUNTIME_BINDING_PACKET>
