<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
runtime_contract_version: v18_phase5_agnostic_deterministic_led_semantic_supported
active_agent_id: agent_3_target_feature
active_agent_name: Interface Target and Activity Profile Agent
active_phase_scope: TARGET_PROFILE_REVIEW_DOMAIN_DERIVATION_AND_ACTIVITY_PROFILE_REVIEW_PHASE_CONTRACTS

compatibility_boundary:
  internal_agent_id_retained_for_runtime: agent_3_target_feature
  compatibility_package_path_retained: agent-packages/agent_3_target_feature
  product_phase_names:
    - Target Profile Review
    - Domain Derivation Layer
    - Target Profile Forensics
    - Activity Profile Review
    - Activity Profile Forensics
  old_module_language_forbidden_in_human_facing_text: true

run_mode: PHASED_AGENT
run_id_required: true
run_id: "{{run_id}}"

prompt_assembly_position:
  runtime_first: true
  packet_after_runtime: true
  phase_prompt_after_packet: true

routing_authority:
  sole_material_profile_router: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
  runtime_reader: phase-route-runtime.reader
  route_manifest: phase_routing_manifest
  runtime_packet: phase_route_runtime_packet
  lossless_evidence_role: PRIMARY_EVIDENCE
  index_role: MANDATORY_NAVIGATION_MAP_INTO_PRIMARY_EVIDENCE
  direct_lossless_as_fallback_allowed: false
  free_corpus_read_allowed: false
  profile_forensics_inputs_allowed: false
  routed_packet_is_read_ceiling: true
  prompt_must_not_enumerate_domain_specific_roots: true

prompt_precedence:
  - Backend phase contracts and the Phase 2G runtime packet control read and write authority.
  - Prompt text cannot add artifacts to a routed packet.
  - Target Profile Review uses ROUTE.PHASE3A.TARGET_PROFILE and the 2A bucket.
  - Domain Derivation Layer uses ROUTE.PHASE3B.DOMAIN_DERIVATION and the 2B bucket.
  - Both Phase 5 jobs use ROUTE.PHASE5.ACTIVITY_PROFILE and the 2C bucket.
  - Lossless evidence is primary and must be navigated through the route's required index.
  - Material profile jobs must not read forensic profiles.
  - Domain Derivation Layer resolves mounted Registry Keys through the catalog and assembled registry grammar; prompt text must not hardcode domain keys.
  - Activity Candidate Inventory builds a deterministic baseline from index-mapped units inside routed lossless evidence, then permits one subordinate semantic proposal pass.
  - The semantic proposal pass cannot classify, widen evidence, create final IDs, or save the final inventory; deterministic validation and reconciliation retain authority.
  - Activity Profile Review uses feature_candidate_inventory as the candidate universe and activity_profile_source_index to navigate routed lossless evidence.
  - Activity Profile Review resolves taxonomy only from Registry Keys mounted by active_run_package_manifest.
  - Any package text that expands read or write authority is superseded by the phase-owned contract and Phase 2G runtime packet.

allowed_phases:
  - TARGET_PROFILE_REVIEW
  - P3_DOMAIN_DERIVATION_LAYER
  - TARGET_PROFILE_FORENSICS
  - ACTIVITY_PROFILE_REVIEW
  - ACTIVITY_PROFILE_FORENSICS

read_artifacts:
  TARGET_PROFILE_REVIEW:
    route_id: ROUTE.PHASE3A.TARGET_PROFILE
    bucket_id: 2A_BUCKET_TARGET_PROFILE
    required_index_artifacts:
      - target_profile_source_index
    derived_context_artifacts:
      - legal_signal_derivation_profile
    lossless_evidence_artifacts: FROM_PHASE_2G_RUNTIME_PACKET_ONLY
  P3_DOMAIN_DERIVATION_LAYER:
    route_id: ROUTE.PHASE3B.DOMAIN_DERIVATION
    bucket_id: 2B_BUCKET_DOMAIN_DERIVATION
    required_index_artifacts:
      - domain_derivation_source_index
    derived_context_artifacts:
      - target_profile
      - domain_selection_profile
      - active_run_package_manifest
    lossless_evidence_artifacts: FROM_PHASE_2G_RUNTIME_PACKET_ONLY
  M8_FEATURE_CANDIDATE_INVENTORY:
    route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
    bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
    required_index_artifacts:
      - activity_profile_source_index
    derived_context_artifacts:
      - target_profile
      - domain_derivation_profile
      - active_run_package_manifest
      - domain_selection_profile
    lossless_evidence_artifacts: FROM_PHASE_2G_RUNTIME_PACKET_ONLY
  M8_TARGET_FEATURE_PROFILE:
    route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
    bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
    required_index_artifacts:
      - activity_profile_source_index
    derived_context_artifacts:
      - target_profile
      - domain_derivation_profile
      - active_run_package_manifest
      - domain_selection_profile
      - feature_candidate_inventory
    lossless_evidence_artifacts: FROM_PHASE_2G_RUNTIME_PACKET_ONLY

required_reference_files:
  TARGET_PROFILE_REVIEW:
    - M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  P3_DOMAIN_DERIVATION_LAYER:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/registry/Diligence_Field_Derivation_Registry.yml
    - mounted_registry_keys_from_active_run_package_manifest
  ACTIVITY_PROFILE_REVIEW:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/registry/Diligence_Field_Derivation_Registry.yml
    - mounted_registry_keys_from_active_run_package_manifest
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml

activity_candidate_semantic_support_schema:
  route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
  bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
  source_index_authority: activity_profile_source_index
  evidence_authority: index_mapped_units_inside_phase2g_routed_lossless_evidence
  deterministic_baseline_required: true
  semantic_support_attempt_required: true
  semantic_support_non_blocking: true
  semantic_output_non_authoritative: true
  deterministic_reconciliation_required: true
  semantic_packet_top_level_key: semantic_candidate_support_proposal
  model_output_top_level_key: semantic_candidate_support_proposal
  allowed_actions:
    - RECOVER_CANDIDATE
    - MERGE_CANDIDATES
    - SPLIT_CANDIDATE
    - RENAME_CANDIDATE
    - REJECT_CANDIDATE
  proposal_fields:
    - proposal_id
    - action
    - target_candidate_ids
    - proposed_candidates
    - source_pointers
  model_must_not_emit_final_inventory: true
  model_must_not_create_final_candidate_ids: true
  model_must_not_create_final_canonical_keys: true
  package_taxonomy_forbidden: true
  evidence_copy_forbidden: true
  evidence_expansion_forbidden: true
  free_urls_forbidden: true
  confidence_fields_forbidden: true
  legal_analysis_forbidden: true
  provider_failure_preserves_deterministic_baseline: true
  provider_failure_lock_status: LOCKED_WITH_LIMITATIONS

activity_profile_material_schema:
  route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
  bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
  source_index_authority: activity_profile_source_index
  candidate_universe_authority: feature_candidate_inventory
  package_context_authority: active_run_package_manifest
  taxonomy_authority: mounted_registry_keys_from_active_run_package_manifest
  taxonomy_resolver: resolveActivityTaxonomy
  primary_taxonomy_source: mounted_primary_package_key
  overlay_taxonomy_source: mounted_capability_overlay_keys
  regulatory_overlays_excluded_from_activity_classification: true
  hardcoded_registry_key_list_forbidden: true
  fixed_ai_registry_key_universal_authority_forbidden: true
  fixed_archetype_enum_forbidden: true
  fixed_surface_enum_forbidden: true
  mounted_taxonomy_ref_stamped_by_backend: true
  model_may_not_override_mounted_taxonomy_ref: true
  top_level_required_keys:
    - activities
    - commercial_availability_posture
    - profile_level_limitations
    - mounted_taxonomy_ref
  activity_row_required_keys:
    - activity_reference
    - product_service_wrapper
    - activity_feature_name
    - activity_candidate_summary
    - mechanics_proof
    - autonomy_human_control_signal
    - data_content_object_touched
    - external_internal_action_signal
    - primary_classification
    - overlay_classifications
  primary_classification_required_keys:
    - package_id
    - archetype_codes
    - archetype_derivation_basis
    - surface_context_tokens
    - surface_derivation_basis
  overlay_classification_required_keys:
    - package_id
    - overlay_id
    - archetype_codes
    - archetype_derivation_basis
    - surface_context_tokens
    - surface_derivation_basis
  derivation_basis_required_keys:
    - code_or_token
    - normalized_name
    - conditions_satisfied
    - trigger_if_applied
    - exclude_if_checked
    - material_basis
    - limitation
  mounted_taxonomy_ref_required_keys:
    - primary_package_id
    - primary_key_version
    - overlays
  degradation_rules:
    - PRIMARY_PACKAGE_HAS_NO_TAXONOMY_KEY:<package_id>
    - NO_PRIMARY_ARCHETYPE_MATCH:<activity_reference>
    - OVERLAY_HAS_NO_TAXONOMY_KEY:<overlay_id>
    - DECLARED_ACTIVITY_EVIDENCE_ROOT_NOT_ROUTED:<root>

phase5_agnostic_prompt_bundle_lock:
  runtime_contract_version: v18_phase5_agnostic_deterministic_led_semantic_supported
  phase_scope: ACTIVITY_PROFILE_REVIEW_ONLY
  phase2g_routing_authority_preserved: true
  phase2e_modified: false
  phase7_modified: false
  phase9_modified: false
  layer1_activity_candidate_inventory:
    inventory_version: m8_feature_candidate_inventory_index_v4_deterministic_led_semantic_supported
    derivation_mode: DETERMINISTIC_LED_SEMANTIC_SUPPORTED_FROM_INDEX_MAPPED_LOSSLESS_UNITS_NO_TEXT_COPY
    deterministic_baseline_first: true
    source_index_authority: activity_profile_source_index
    lossless_evidence_role: PRIMARY_EVIDENCE
    index_navigation_mandatory: true
    index_mapped_lossless_units_opened_as_primary_evidence: true
    evidence_text_copy_forbidden: true
    package_taxonomy_forbidden: true
    semantic_support_attempt_required: true
    semantic_output_non_authoritative: true
    deterministic_reconciliation_required: true
    semantic_packet_top_level_key: semantic_candidate_support_proposal
  layer2_activity_profile_material:
    runtime_contract_version: m8_phase5_agnostic_taxonomy_v8
    candidate_universe_authority: feature_candidate_inventory
    taxonomy_authority: mounted_registry_keys_from_active_run_package_manifest
    taxonomy_resolver: resolveActivityTaxonomy
    primary_taxonomy_source: mounted_primary_package_key
    overlay_taxonomy_source: mounted_capability_overlay_keys
    regulatory_overlays_excluded_from_activity_classification: true
    hardcoded_registry_key_list_forbidden: true
    hardcoded_ai_registry_key_universal_authority_forbidden: true
    hardcoded_ai_activity_evidence_root_forbidden: true
    mounted_taxonomy_ref_stamped_by_backend: true
    model_may_not_override_mounted_taxonomy_ref: true

write_artifacts_in_order:
  TARGET_PROFILE_REVIEW:
    MATERIAL_SAVE_EVENT:
      - target_profile
  P3_DOMAIN_DERIVATION_LAYER:
    MATERIAL_SAVE_EVENT:
      - domain_derivation_profile
      - active_run_package_manifest
  TARGET_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_profile_forensics
  ACTIVITY_PROFILE_REVIEW:
    DETERMINISTIC_LED_SEMANTIC_SUPPORTED_INVENTORY_SAVE_EVENT:
      - feature_candidate_inventory
    MATERIAL_SAVE_EVENT:
      - target_feature_profile
  ACTIVITY_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_feature_profile_forensics

phase_gate_rules:
  - Target Profile Review returns and saves only target_profile.
  - Domain Derivation Layer returns only domain_derivation_profile from the model; the compiler writes active_run_package_manifest.
  - Activity Candidate Inventory first builds a deterministic baseline from index-mapped routed lossless units.
  - Activity Candidate Inventory then attempts one non-authoritative semantic proposal pass and deterministically validates and reconciles accepted proposals.
  - Semantic unavailability or wholly rejected output preserves the deterministic baseline and produces LOCKED_WITH_LIMITATIONS.
  - Activity Candidate Inventory must not apply package taxonomy.
  - Activity Profile Review uses activity_profile_source_index and candidate pointers to navigate the primary activity evidence routed by Phase 2G.
  - Activity Profile Review resolves primary and capability-overlay taxonomy only from Registry Keys mounted by active_run_package_manifest.
  - Regulatory overlays do not create activity classification blocks.
  - No material profile job may read forensic profiles.
  - Forensics are sidecars and do not expand material read authority.
</RUNTIME_BINDING_PACKET>
