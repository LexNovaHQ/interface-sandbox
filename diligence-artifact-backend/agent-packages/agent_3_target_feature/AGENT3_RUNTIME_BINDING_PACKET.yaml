<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
runtime_contract_version: v10_activity_profile_v4_basis_coverage
active_agent_id: agent_3_target_feature
active_agent_name: Interface Target and Activity Profile Agent
active_phase_scope: TARGET_PROFILE_REVIEW_AND_ACTIVITY_PROFILE_REVIEW_PHASE_CONTRACTS

compatibility_boundary:
  internal_agent_id_retained_for_runtime: agent_3_target_feature
  compatibility_package_path_retained: agent-packages/agent_3_target_feature
  product_phase_names:
    - Target Profile Review
    - Target Profile Forensics
    - Activity Profile Review
    - Activity Profile Forensics
  old_module_language_forbidden_in_human_facing_text: true

run_mode: PHASED_AGENT
run_id_required: true
run_id: "{{run_id}}"

prompt_assembly_position:
  runtime_first: true
  packet_after_runtime: true
  phase_prompt_after_packet: true

prompt_precedence:
  - Backend phase contracts control read/write authority.
  - AI_REGISTRY_KEY.md is the base registry derivation reference for Target Profile Review and Activity Profile Review.
  - Target Profile Review may use AI_REGISTRY_KEY.md only for §6 Lane derivation into business_context.lane.
  - Activity Profile Review must use AI_REGISTRY_KEY.md directly as the active archetype and surface derivation authority.
  - CLASSIFICATION_DERIVATION_MATRIX_v1_LOCKED.yaml is superseded for Activity Profile material derivation and must not be treated as an active M8 reference.
  - Activity Profile Review must support multiple archetypes per activity when each selected archetype has independent AI_REGISTRY_KEY.md §4 trigger support.
  - Activity Profile Review must emit archetype_derivation_basis and surface_derivation_basis as material basis arrays.
  - Activity Profile Review must not emit retired material fields archetype_proof or surface_proof_and_routing_limits.
  - Activity Profile Review must emit exactly one matching derivation-basis object per selected archetype code and per selected surface token using code_or_token.
  - Activity Profile Review must not emit derivation-basis objects for unselected archetype codes or unselected surface tokens.
  - Target Profile Review is controlled by 02_M7_TARGET_PROFILE_BACKEND_CURRENT.md and src/phases/03-target-profile-review/target-profile-review.contract.js.
  - Target Profile Forensics is controlled by src/phases/04-target-profile-forensics/target-profile-forensics.contract.js.
  - Activity Candidate Inventory is controlled by 03A_M8_FEATURE_CANDIDATE_INVENTORY_DETERMINISTIC.md and src/phases/05-activity-profile-review/activity-candidate-inventory.contract.js.
  - Activity Profile Review material output is controlled by 03_M8_FEATURE_PROFILE_BACKEND_CURRENT.md, AGENT3_BACKEND_OUTPUT_CONTRACT.md, and src/phases/05-activity-profile-review/activity-profile-review.contract.js.
  - Activity Profile Review uses feature_candidate_inventory as the candidate universe and P1-P5 lossless artifacts as evidence.
  - P4 may support Activity Profile Review context but must not create candidate existence outside feature_candidate_inventory.
  - Any package text that expands Target Profile Review, Target Profile Forensics, Activity Candidate Inventory, or Activity Profile Review material read/write authority is superseded by the phase-owned contract.

allowed_phases:
  - TARGET_PROFILE_REVIEW
  - TARGET_PROFILE_FORENSICS
  - ACTIVITY_PROFILE_REVIEW
  - ACTIVITY_PROFILE_FORENSICS

read_artifacts:
  common:
    - source_discovery_handoff
  TARGET_PROFILE_REVIEW:
    - source_discovery_handoff
    - lossless_family__T0_ROOT
    - lossless_family__T1_IDENTITY
    - lossless_family__T2_LEGAL_IDENTITY
    - lossless_family__T3_OPERATOR_ENTITY
    - lossless_family__T4_SUPPORTING_IDENTITY
    - legal_signal_derivation_profile
  ACTIVITY_PROFILE_REVIEW:
    - source_discovery_handoff
    - target_profile
    - target_profile_forensics
    - feature_candidate_inventory
    - lossless_family__P1_PRODUCT
    - lossless_family__P2_PLATFORM_FEATURE_SOLUTION
    - lossless_family__P3_AI_CAPABILITY_TECHNICAL
    - lossless_family__P4_USE_CASE_INDUSTRY
    - lossless_family__P5_ENTERPRISE_PRICING

forbidden_target_profile_review_read_artifacts:
  - legal_cartography_index
  - m7_deterministic_legal_signal_overlay
  - lossless_family__L1_CORE_TERMS_PRIVACY
  - lossless_family__L2_B2B_CONTRACTING
  - lossless_family__L3_AI_USAGE_GOVERNANCE
  - lossless_family__L4_PRIVACY_ADJACENT_NOTICES
  - lossless_family__L5_LEGAL_HUB_HOSTED
  - lossless_family__L6_ENTITY_NOTICE
  - lossless_family__P1_PRODUCT
  - lossless_family__P2_PLATFORM_FEATURE_SOLUTION
  - lossless_family__P3_AI_CAPABILITY_TECHNICAL
  - lossless_family__P4_USE_CASE_INDUSTRY
  - lossless_family__P5_ENTERPRISE_PRICING
  - lossless_family__D1_SECURITY_TRUST
  - lossless_family__D2_SUBPROCESSOR_PRIVACY_CENTER
  - lossless_family__D3_DATA_GOVERNANCE_CONTROLS
  - lossless_family__D4_DOCS_API_DATA_FLOW
  - lossless_family__D5_AI_SAFETY_TRANSPARENCY

required_reference_files:
  TARGET_PROFILE_REVIEW:
    - AI_REGISTRY_KEY.md
    - M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  ACTIVITY_PROFILE_REVIEW:
    - AI_REGISTRY_KEY.md
    - FIELD_DERIVATION_REGISTRY_v2_LOCKED.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml

activity_profile_material_schema:
  archetype_derivation_authority: AI_REGISTRY_KEY.md §4
  surface_derivation_authority: AI_REGISTRY_KEY.md §7
  classification_matrix_active_for_material_derivation: false
  multiple_archetypes_per_activity_allowed: true
  allowed_archetype_codes:
    - UNI
    - DOE
    - JDG
    - CMP
    - CRT
    - RDR
    - ORC
    - TRN
    - SHD
    - OPT
    - MOV
    - CUR
    - MOD
    - ORA
  allowed_surface_context_tokens:
    - Consumer-Public
    - Enterprise-Private
    - PII
    - Employment
    - Sensitive/Biometric
    - Financial
    - Content&IP
    - Safety&Physical
    - Infrastructure
    - Minors
  activity_row_required_keys:
    - activity_reference
    - product_service_wrapper
    - activity_feature_name
    - activity_candidate_summary
    - mechanics_proof
    - autonomy_human_control_signal
    - data_content_object_touched
    - external_internal_action_signal
    - archetype_codes
    - archetype_derivation_basis
    - surface_context_tokens
    - surface_derivation_basis
  retired_activity_row_keys_forbidden:
    - archetype_proof
    - surface_proof_and_routing_limits
  derivation_basis_object_required_keys:
    - code_or_token
    - normalized_name
    - conditions_satisfied
    - trigger_if_applied
    - exclude_if_checked
    - material_basis
    - limitation
  basis_coverage_rules:
    - Every selected archetype code must have exactly one matching archetype_derivation_basis object whose code_or_token equals the selected archetype code.
    - No archetype_derivation_basis object may exist for an unselected archetype code.
    - Every selected surface token must have exactly one matching surface_derivation_basis object whose code_or_token equals the selected surface token.
    - No surface_derivation_basis object may exist for an unselected surface token.
    - Duplicate archetype_codes, surface_context_tokens, or derivation-basis code_or_token values are forbidden.
  downstream_boundary:
    - Activity Profile Review must not derive Subcat, Authority, Compliance_Framework, Pain_Tier, Pain_Category, Pain_Depth, Status, Effective_Date, Velocity, Threat_Trigger, registry rows, legal risk, or exposure findings.
    - Activity Profile Review material must not include source URLs, source IDs, source pointers, candidate IDs, copied excerpts, confidence fields, forensic ledgers, validation status, lock status, or runtime trace.

write_artifacts_in_order:
  TARGET_PROFILE_REVIEW:
    MATERIAL_SAVE_EVENT:
      - target_profile
  TARGET_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_profile_forensics
  ACTIVITY_PROFILE_REVIEW:
    DETERMINISTIC_INVENTORY_SAVE_EVENT:
      - feature_candidate_inventory
    MATERIAL_SAVE_EVENT:
      - target_feature_profile
  ACTIVITY_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_feature_profile_forensics

phase_gate_rules:
  - Target Profile Review returns and saves only target_profile.
  - Target Profile Review must derive business_context.lane as A, B, Both, or controlled fallback using AI_REGISTRY_KEY.md §6.
  - Target Profile Review must not turn Lane into a legal risk, exposure, compliance framework, or threat-trigger conclusion.
  - Target Profile Review must not block because raw legal/governance artifacts are absent; unavailable legal_signal_derivation_profile rows become controlled field statuses and limitations.
  - Target Profile Forensics may begin only after saved target_profile exists.
  - Activity Candidate Inventory may begin only after saved target_profile and target_profile_forensics exist.
  - Activity Profile Review material may begin only after saved feature_candidate_inventory exists and is locked.
  - Activity Profile Review material uses feature_candidate_inventory as candidate universe and P1-P5 lossless artifacts as evidence.
  - Activity Profile Review archetype/surface derivation must read AI_REGISTRY_KEY.md directly, not CLASSIFICATION_DERIVATION_MATRIX_v1_LOCKED.yaml.
  - Activity Profile Review material must allow multiple archetypes per activity when each selected archetype has independent trigger support.
  - Activity Profile Review material must emit archetype_derivation_basis and surface_derivation_basis, not archetype_proof or surface_proof_and_routing_limits.
  - Activity Profile Review material must emit exactly one derivation-basis object per selected archetype code and per selected surface token.
  - Activity Profile Review material must reject derivation-basis objects for unselected archetype codes or unselected surface tokens.
  - Data Provenance Profile may begin only after feature_candidate_inventory, target_feature_profile, and target_feature_profile_forensics lock.
  - Production backend execution must not combine deterministic inventory, material artifact, and forensic artifact in the same response.

forbidden_phases:
  - SOURCE_DISCOVERY
  - LEGAL_CARTOGRAPHY_AND_INDEX
  - DATA_PROVENANCE_PROFILE
  - EXPOSURE_PROFILE
  - OPERATOR_CHALLENGE
  - COMPILER
  - NORMALIZED_REPORT_RENDERER
  - QUALIFIED_REVIEW

forbidden_outputs:
  - source_discovery_handoff
  - legal_cartography_index
  - legal_signal_derivation_profile
  - m7_deterministic_legal_signal_overlay
  - data_provenance_profile
  - exposure_registry_profile
  - challenge_gate
  - final_output_handoff
  - renderer_payload
  - registry_row_evaluation
  - legal_risk_finding
  - privacy_readiness_finding
  - combined_material_and_forensic_response
  - four_artifact_target_feature_bundle
  - phase_output_wrapper
  - terminal_receipt_in_backend_mode

backend_permission_profile: target_activity_phase_contract_locked
validator_profile: target_activity_profile_material_contract_validator
phase_packet_contract: target_lane_activity_profile_review_material_contract_locked
terminal_receipt_profile: target_activity_profile_manual_receipt_only

next_phase_command: "backend runner advances through Target Profile Review, Target Profile Forensics, Activity Candidate Inventory, Activity Profile Review material, then Activity Profile Forensics after each artifact locks."
stop_condition: "Stop after the active backend phase artifact is saved and validated."
</RUNTIME_BINDING_PACKET>
