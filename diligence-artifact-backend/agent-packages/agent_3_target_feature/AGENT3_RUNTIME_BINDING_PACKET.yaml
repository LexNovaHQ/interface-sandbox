<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
runtime_contract_version: v16_phase2g_route_scoped_cutover_through_phase5
active_agent_id: agent_3_target_feature
active_agent_name: Interface Target and Activity Profile Agent
active_phase_scope: TARGET_PROFILE_REVIEW_DOMAIN_DERIVATION_AND_ACTIVITY_PROFILE_REVIEW_PHASE_CONTRACTS

compatibility_boundary:
  internal_agent_id_retained_for_runtime: agent_3_target_feature
  compatibility_package_path_retained: agent-packages/agent_3_target_feature
  product_phase_names:
    - Target Profile Review
    - Domain Derivation Layer
    - Target Profile Forensics
    - Activity Profile Review
    - Activity Profile Forensics
  old_module_language_forbidden_in_human_facing_text: true

run_mode: PHASED_AGENT
run_id_required: true
run_id: "{{run_id}}"

prompt_assembly_position:
  runtime_first: true
  packet_after_runtime: true
  phase_prompt_after_packet: true

routing_authority:
  sole_material_profile_router: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
  runtime_reader: phase-route-runtime.reader
  route_manifest: phase_routing_manifest
  runtime_packet: phase_route_runtime_packet
  lossless_evidence_role: PRIMARY_EVIDENCE
  index_role: MANDATORY_NAVIGATION_MAP_INTO_PRIMARY_EVIDENCE
  direct_lossless_as_fallback_allowed: false
  free_corpus_read_allowed: false
  profile_forensics_inputs_allowed: false

prompt_precedence:
  - Backend phase contracts and the Phase 2G runtime packet control read/write authority.
  - Prompt text cannot add artifacts to a routed packet.
  - Target Profile Review uses ROUTE.PHASE3A.TARGET_PROFILE and the 2A bucket.
  - Domain Derivation Layer uses ROUTE.PHASE3B.DOMAIN_DERIVATION and the 2B bucket.
  - Both Phase 5 jobs use ROUTE.PHASE5.ACTIVITY_PROFILE and the 2C bucket.
  - Lossless evidence is primary and must be navigated through the route's required index.
  - Material profile jobs must not read forensic profiles.
  - Target Profile Review may use legal_signal_derivation_profile only as a bounded 2G-routed dependency for owned notice and jurisdiction fields.
  - Domain Derivation Layer uses the mounted Registry Keys (domain_derivation_rules) plus Diligence_Field_Derivation_Registry.yml grammar as rule authority and package-catalog.v0.json as package authority.
  - Domain Derivation Layer must not hardcode domain-specific classification logic; new domains are added by dropping a new Registry Key and updating the catalog, not by prompt update.
  - Activity Candidate Inventory creates candidates only from activity_profile_source_index locators and does not independently scan the routed lossless evidence.
  - Activity Profile Review uses feature_candidate_inventory as the candidate universe and activity_profile_source_index to navigate its routed lossless evidence.
  - Activity Profile Review uses active_run_package_manifest and domain package context for package-specific activity taxonomy.
  - Any package text that expands read/write authority is superseded by the phase-owned contract and Phase 2G packet.

allowed_phases:
  - TARGET_PROFILE_REVIEW
  - P3_DOMAIN_DERIVATION_LAYER
  - TARGET_PROFILE_FORENSICS
  - ACTIVITY_PROFILE_REVIEW
  - ACTIVITY_PROFILE_FORENSICS

read_artifacts:
  TARGET_PROFILE_REVIEW:
    route_id: ROUTE.PHASE3A.TARGET_PROFILE
    bucket_id: 2A_BUCKET_TARGET_PROFILE
    artifacts:
      - phase_routing_manifest
      - phase_route_runtime_packet
      - target_profile_source_index
      - lossless_root__homepage_landing
      - lossless_root__company_identity
      - lossless_root__contact_notice
      - lossless_root__pricing_commercial_availability
      - lossless_root__regulatory_licensing_status
      - lossless_root__grievance_complaints
      - legal_signal_derivation_profile
  P3_DOMAIN_DERIVATION_LAYER:
    route_id: ROUTE.PHASE3B.DOMAIN_DERIVATION
    bucket_id: 2B_BUCKET_DOMAIN_DERIVATION
    artifacts:
      - phase_routing_manifest
      - phase_route_runtime_packet
      - domain_derivation_source_index
      - target_profile
      - lossless_root__homepage_landing
      - lossless_root__company_identity
      - lossless_root__product_service
      - lossless_root__platform_feature_solution
      - lossless_root__technical_docs_api
      - lossless_root__docs_api_data_flow
      - lossless_root__pricing_commercial_availability
      - lossless_root__use_case_customer_industry
      - lossless_root__integrations_ecosystem
      - lossless_root__ai_safety_transparency
      - lossless_root__regulatory_licensing_status
      - lossless_root__grievance_complaints
      - domain_selection_profile
      - active_run_package_manifest
  M8_FEATURE_CANDIDATE_INVENTORY:
    route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
    bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
    artifacts:
      - phase_routing_manifest
      - phase_route_runtime_packet
      - activity_profile_source_index
      - target_profile
      - domain_derivation_profile
      - active_run_package_manifest
      - domain_selection_profile
      - lossless_root__product_service
      - lossless_root__platform_feature_solution
      - lossless_root__technical_docs_api
      - lossless_root__docs_api_data_flow
      - lossless_root__integrations_ecosystem
      - lossless_root__pricing_commercial_availability
      - lossless_root__use_case_customer_industry
      - lossless_root__support_help_resources
      - lossless_root__ai_safety_transparency
  M8_TARGET_FEATURE_PROFILE:
    route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
    bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
    artifacts:
      - phase_routing_manifest
      - phase_route_runtime_packet
      - activity_profile_source_index
      - target_profile
      - domain_derivation_profile
      - active_run_package_manifest
      - domain_selection_profile
      - feature_candidate_inventory
      - lossless_root__product_service
      - lossless_root__platform_feature_solution
      - lossless_root__technical_docs_api
      - lossless_root__docs_api_data_flow
      - lossless_root__integrations_ecosystem
      - lossless_root__pricing_commercial_availability
      - lossless_root__use_case_customer_industry
      - lossless_root__support_help_resources
      - lossless_root__ai_safety_transparency

forbidden_material_profile_read_artifacts:
  - source_discovery_handoff
  - cartography_index
  - target_profile_forensics
  - target_feature_profile_forensics
  - legal_cartography_index
  - legal_doc_inventory
  - legal_doc_extraction_index
  - legal_doc_{DOC_TYPE}
  - data_privacy_navigation_index
  - dap_forensics_profile
  - exposure artifacts
  - compiler artifacts
  - Qualified Review artifacts
  - retired_family_artifact_taxonomy

required_reference_files:
  TARGET_PROFILE_REVIEW:
    - M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  P3_DOMAIN_DERIVATION_LAYER:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/registry/Diligence_Field_Derivation_Registry.yml
    - references/registry/AI_Registry_Key.yml
    - references/registry/FinTech_Registry_Key.yml
  ACTIVITY_PROFILE_REVIEW:
    - references/domain-packages/DOMAIN_PACKAGE_KEY_v0.md
    - references/domain-packages/package-catalog.v0.json
    - references/registry/Diligence_Field_Derivation_Registry.yml
    - references/registry/AI_Registry_Key.yml
    - references/registry/FinTech_Registry_Key.yml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml

target_profile_review_phase2a_boundary:
  route_id: ROUTE.PHASE3A.TARGET_PROFILE
  bucket_id: 2A_BUCKET_TARGET_PROFILE
  locator_authority: target_profile_source_index
  navigation_only: true
  evidence_source: routed scoped target lossless_root artifacts
  legal_dependency: legal_signal_derivation_profile
  regulatory_grievance_fields_factual_only: true
  license_validity_requirement_applicability_forbidden: true
  grievance_sufficiency_ombudsman_requirement_forbidden: true

domain_derivation_phase2b_boundary:
  route_id: ROUTE.PHASE3B.DOMAIN_DERIVATION
  bucket_id: 2B_BUCKET_DOMAIN_DERIVATION
  locator_authority: domain_derivation_source_index
  activity_profile_source_index_reserved_for_2c_phase5: true
  navigation_only: true
  evidence_source: routed scoped 12 domain derivation lossless_root artifacts
  target_profile_is_context_not_proof: true

domain_derivation_registry_ladder_schema:
  prompt_file: 02B_P3_DOMAIN_DERIVATION_LAYER_BACKEND.md
  assembled_registry_id: DILIGENCE_DOMAIN_REGISTRY_v1
  registry_grammar_authority: references/registry/Diligence_Field_Derivation_Registry.yml
  package_key_authorities:
    - references/registry/AI_Registry_Key.yml
    - references/registry/FinTech_Registry_Key.yml
  package_authority: references/domain-packages/package-catalog.v0.json
  prompt_is_domain_agnostic: true
  new_domains_added_by_registry_not_prompt: true
  model_role: condition_level_semantic_evaluator
  validator_role: deterministic_lock_authority
  model_must_not_hardcode_domain_logic: true
  model_must_not_emit_active_run_package_manifest_top_level: true
  allowed_model_top_level_key: domain_derivation_profile

activity_profile_material_schema:
  route_id: ROUTE.PHASE5.ACTIVITY_PROFILE
  bucket_id: 2C_BUCKET_ACTIVITY_PROFILE
  source_index_authority: activity_profile_source_index
  candidate_universe_authority: feature_candidate_inventory
  package_context_authority: active_run_package_manifest
  package_catalog_authority: references/domain-packages/package-catalog.v0.json
  archetype_derivation_authority: AI_Registry_Key.yml behavior_class
  surface_derivation_authority: AI_Registry_Key.yml surface
  fixed_ai_registry_key_universal_authority_forbidden: true
  fixed_ai_archetype_enum_forbidden: true
  fixed_ai_surface_enum_forbidden: true
  multiple_package_labels_per_activity_allowed: true
  activity_row_required_keys:
    - activity_reference
    - product_service_wrapper
    - activity_feature_name
    - activity_candidate_summary
    - mechanics_proof
    - autonomy_human_control_signal
    - data_content_object_touched
    - external_internal_action_signal
    - archetype_codes
    - archetype_derivation_basis
    - surface_context_tokens
    - surface_derivation_basis
  retired_activity_row_keys_forbidden:
    - archetype_proof
    - surface_proof_and_routing_limits

write_artifacts_in_order:
  TARGET_PROFILE_REVIEW:
    MATERIAL_SAVE_EVENT:
      - target_profile
  P3_DOMAIN_DERIVATION_LAYER:
    MATERIAL_SAVE_EVENT:
      - domain_derivation_profile
      - active_run_package_manifest
  TARGET_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_profile_forensics
  ACTIVITY_PROFILE_REVIEW:
    DETERMINISTIC_INVENTORY_SAVE_EVENT:
      - feature_candidate_inventory
    MATERIAL_SAVE_EVENT:
      - target_feature_profile
  ACTIVITY_PROFILE_FORENSICS:
    FORENSIC_SAVE_EVENT:
      - target_feature_profile_forensics

phase_gate_rules:
  - Target Profile Review returns and saves only target_profile.
  - Target Profile Review uses target_profile_source_index to navigate the primary target lossless evidence routed by 2G.
  - Domain Derivation Layer returns only domain_derivation_profile from the model; the compiler writes active_run_package_manifest.
  - Domain Derivation Layer uses domain_derivation_source_index to navigate the primary 12-root evidence routed by 2G.
  - Activity Candidate Inventory creates candidates only from activity_profile_source_index locator rows and must not independently scan source evidence.
  - Activity Candidate Inventory must not apply package taxonomy.
  - Activity Profile Review uses activity_profile_source_index and candidate pointers to navigate the primary activity evidence routed by 2G.
  - Activity Profile Review must use active_run_package_manifest/package catalog context for package-specific labels.
  - No material profile job may consume a forensic profile.
</RUNTIME_BINDING_PACKET>
