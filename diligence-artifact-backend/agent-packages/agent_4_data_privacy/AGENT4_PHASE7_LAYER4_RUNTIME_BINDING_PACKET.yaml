runtime_contract: PHASE7_LAYER4_DAP_SEMANTIC_BATCH_RUNTIME
active_agent_id: agent_4_data_privacy
active_agent_name: Interface Data Privacy Agent
active_phase_scope: PHASE7_DAP_SEMANTIC_BATCH_RUNNER
run_mode: SEMANTIC_BATCH_AGENT
active_batch_required: true
routing_authority: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
route_id: ROUTE.PHASE7.DATA_PROVENANCE_PROFILE
bucket_id: 2D_BUCKET_DATA_PRIVACY
route_scoped_runtime_reader: phase-route-runtime.reader
lossless_evidence_role: PRIMARY_EVIDENCE
index_role: MANDATORY_NAVIGATION_MAP_INTO_PRIMARY_EVIDENCE
profile_forensics_inputs_forbidden: true
allowed_modules:
  - PHASE7_LAYER4_SEMANTIC_BATCH_RUNNER
read_artifacts:
  - phase_routing_manifest
  - phase_route_runtime_packet
  - data_privacy_navigation_index
  - legal_cartography_index
  - legal_signal_derivation_profile
  - domain_selection_profile
  - active_run_package_manifest
  - target_profile
  - domain_derivation_profile
  - feature_candidate_inventory
  - target_feature_profile
  - lossless_root__privacy_data_processing
  - lossless_root__security_trust_compliance
  - lossless_root__data_governance_controls
  - lossless_root__technical_docs_api
  - lossless_root__docs_api_data_flow
  - lossless_root__integrations_ecosystem
  - lossless_root__ai_safety_transparency
  - lossless_root__regulatory_licensing_status
  - lossless_root__grievance_complaints
forbidden_read_artifacts:
  - source_discovery_handoff
  - cartography_index
  - target_profile_forensics
  - target_feature_profile_forensics
  - dap_forensics_profile
  - exposure_registry_route_plan
  - lossless_family__D1_SECURITY_TRUST
  - lossless_family__D2_SUBPROCESSOR_PRIVACY_CENTER
  - lossless_family__D3_DATA_GOVERNANCE_CONTROLS
  - lossless_family__D4_DOCS_API_DATA_FLOW
  - lossless_family__D5_AI_SAFETY_TRANSPARENCY
layer4_use_rules:
  - Execute exactly one active semantic batch per model call.
  - Phase 2G is the sole authority for the Phase 7 source and profile input packet.
  - The Phase 2G runtime packet fixes the allowed data/privacy bucket, legal dependencies, preceding derived profiles, and runtime context.
  - The active DAP batch route packet controls families, expected field IDs, expected root, reading priorities, schema requirements, and validation requirements inside the already authorized Phase 2G packet.
  - Lossless evidence is primary evidence and must be navigated through data_privacy_navigation_index.
  - Use legal material only through Legal Cartography locator routes selected by the active DAP batch route packet.
  - Do not read any target, activity, DAP, or exposure forensic profile.
  - Emit only the active batch artifact root.
  - Do not emit old M10 material, old M10 forensics, compiler material, report material, final profile material, or another batch artifact.
  - Do not mutate upstream artifacts, the Phase 2G route packet, or DAP batch route manifests.
write_artifact_rule:
  emits_exactly_one_active_batch_artifact: true
  root_must_equal: active_dap_semantic_batch_route_packet.expected_artifact_name
  returned_field_ids_must_equal: active_dap_semantic_batch_route_packet.expected_field_ids
  one_row_per_field_id: true
allowed_batch_artifacts:
  - dap_semantic_batch_exec_artifact
  - dap_semantic_batch_lim_artifact
  - dap_semantic_batch_party_artifact
  - dap_semantic_batch_role_artifact
  - dap_semantic_batch_flow_artifact
  - dap_semantic_batch_obj_artifact
  - dap_semantic_batch_auth_artifact
  - dap_semantic_batch_ctrl_artifact
  - dap_semantic_batch_contact_cm_artifact
  - dap_semantic_batch_vend_artifact
  - dap_semantic_batch_loc_artifact
  - dap_semantic_batch_ret_artifact
  - dap_semantic_batch_sec_artifact
  - dap_semantic_batch_sens_artifact
  - dap_semantic_batch_dom_artifact
  - dap_semantic_batch_ready_artifact
  - dap_semantic_batch_req_artifact
phase_save_contract:
  emits_only:
    - active_batch_artifact_root
  backend_must_validate_with: layer4_semantic_batch_artifact_validator
  must_stop_after_active_batch_emit: true
