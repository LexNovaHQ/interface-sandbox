<RUNTIME_BINDING_PACKET>
runtime_contract: 00_RUNTIME_CONTROLLER_M1_M5_INTEGRATED
active_agent_id: agent_4_data_privacy
active_agent_name: Interface Data Privacy Agent
active_phase_scope: M10_DATA_PROVENANCE

run_mode: PHASED_AGENT
run_id_required: true

allowed_modules:
  - M10_DATA_PROVENANCE

read_artifacts:
  - source_discovery_handoff
  - legal_cartography_index
  - target_feature_profile
  - lossless_family__D1_SECURITY_TRUST
  - lossless_family__D2_SUBPROCESSOR_PRIVACY_CENTER
  - lossless_family__D3_DATA_GOVERNANCE_CONTROLS
  - lossless_family__D4_DOCS_API_DATA_FLOW
  - lossless_family__D5_AI_SAFETY_TRANSPARENCY
  - m10_selected_legal_support_packet

m10_source_order:
  primary:
    - D1-D5 data-control families
  activity_spine:
    - target_feature_profile
  navigation:
    - legal_cartography_index
  secondary_support:
    - m10_selected_legal_support_packet

m10_use_rules:
  - D1-D5 are the primary field-derivation source for M10.
  - target_feature_profile supplies the activity and product spine.
  - legal_cartography_index supplies navigation and locator context.
  - m10_selected_legal_support_packet is secondary support only when D-family material cannot support a M10 field.
  - M10 must not use whole L-family artifacts.
  - M10 must not use target_profile, target_profile_forensics, feature_candidate_inventory, or target_feature_profile_forensics.
  - M10_QR_CONTACT_CONSENT_MANAGER_ADDENDUM.md controls nested QR contact_routes and consent_manager_readiness derivation without expanding the 34 top-level material field lock.

m10_material_nested_derivation_addenda:
  - M10_QR_CONTACT_CONSENT_MANAGER_ADDENDUM.md

write_artifacts_in_order:
  - data_provenance_profile
  - data_provenance_profile_forensics

phase_lock:
  - M10_DATA_PROVENANCE

forbidden_modules:
  - M6_SOURCE_DISCOVERY
  - M7_TARGET_PROFILE
  - M8_TARGET_FEATURE_PROFILE
  - M9_LEGAL_CARTOGRAPHY
  - AGENT_4B_EXTENDED_DAP_INDIA_READINESS
  - AGENT_4C_INTEGRATED_DAP_REPORT
  - M11_EXPOSURE_REGISTRY
  - M12_OPERATOR_CHALLENGE
  - M13_OUTPUT_HANDOFF
  - M14_TERMINAL_RENDERER

forbidden_outputs:
  - source_discovery_handoff
  - legal_cartography_index
  - target_profile
  - target_profile_forensics
  - feature_candidate_inventory
  - target_feature_profile
  - target_feature_profile_forensics
  - exposure_registry_profile
  - challenge_gate
  - final_output_handoff
  - REGISTRY_ROW lines
  - threat_id assignments
  - exposure statuses
  - control statuses
  - risk levels
  - compliance conclusions
  - legal applicability conclusions
  - report prose

backend_permission_profile: agent_4_read_d_primary_selected_l_support_m10_lock
validator_profile: agent_4_m10_validator
backend_output_contract: BACKEND_CANONICAL_OUTPUT_ADAPTER.md
terminal_receipt_profile: agent_4_manual_receipt_only

phase_save_contract:
  M10_MATERIAL_SAVE_EVENT:
    backend_phase: M10
    emits_only:
      - data_provenance_profile
    must_stop_after_emit: true
    backend_must_save_before_m10_forensics: true
  M10_FORENSIC_SAVE_EVENT:
    backend_phase: M10_FORENSICS
    reads_required:
      - data_provenance_profile
    emits_only:
      - data_provenance_profile_forensics
    must_stop_after_emit: true
    backend_must_save_before_m11: true

next_agent_command: backend advances to deterministic 4B only after M10 material and M10 forensics are both locked; manual mode may show next-step text only after lock
stop_condition: stop after M10_DATA_PROVENANCE lock
</RUNTIME_BINDING_PACKET>
