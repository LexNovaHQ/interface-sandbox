openapi: 3.1.0
info:
  title: Interface Diligence Agent 1 Artifact Actions
  version: 0.1.1-agent1
  description: Narrow Custom GPT Action schema for Agent 1 only. Agent 1 may create a run, save explicit M6/M9 artifacts, lock M6_M9, and check backend health.
servers:
  - url: https://interface-diligence-artifacts-461673097382.asia-south1.run.app
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-ln-api-key
  schemas:
    Agent1CreateRunRequest:
      type: object
      required:
        - target
        - root_url
        - source_mode
      properties:
        target:
          type: string
          description: Human-readable target name or domain slug.
        root_url:
          type: string
          description: Root URL or source identifier supplied by the operator.
        source_mode:
          type: string
          enum:
            - url
            - text
            - url_plus_text
            - synthetic_demo
        created_by:
          type: string
          enum:
            - agent_1_source_legal
          default: agent_1_source_legal
        notes:
          type: string
          description: Optional operator notes for the run record.

    SourceDiscoveryHandoffObject:
      type: object
      required:
        - source_discovery_handoff
      properties:
        source_discovery_handoff:
          type: object
          description: Full Agent 1 source_discovery_handoff JSON object.
          properties:
            run_id:
              type: string
            target:
              type: string
            test_marker:
              type: string
            target_boundary:
              type: object
              additionalProperties: true
            source_search_rule_applied:
              type: object
              additionalProperties: true
            four_bucket_url_handoff:
              type: object
              additionalProperties: true
            missing_limited_primary_sources:
              type: array
              items:
                type: object
                additionalProperties: true
            downstream_routing:
              type: object
              additionalProperties: true
          additionalProperties: true

    LegalCartographyIndexObject:
      type: object
      required:
        - legal_cartography_index
      properties:
        legal_cartography_index:
          type: object
          description: Full Agent 1 legal_cartography_index JSON object.
          properties:
            run_id:
              type: string
            target:
              type: string
            test_marker:
              type: string
            document_coverage_index:
              type: array
              items:
                type: object
                additionalProperties: true
            document_structure_index:
              type: array
              items:
                type: object
                additionalProperties: true
            incorporated_linked_document_map:
              type: array
              items:
                type: object
                additionalProperties: true
            control_language_locator:
              type: array
              items:
                type: object
                additionalProperties: true
            missing_limited_legal_governance_items:
              type: array
              items:
                type: object
                additionalProperties: true
            downstream_rules:
              type: object
              additionalProperties: true
            lock_status:
              type: string
          additionalProperties: true

    Agent1SaveSourceDiscoveryRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - artifact_name
        - lock_status
        - artifact
      properties:
        run_id:
          type: string
          description: Exact run_id for this isolated diligence run.
        phase:
          type: string
          enum:
            - M6_M9
        agent_id:
          type: string
          enum:
            - agent_1_source_legal
        artifact_name:
          type: string
          enum:
            - source_discovery_handoff
        lock_status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        artifact:
          $ref: '#/components/schemas/SourceDiscoveryHandoffObject'

    Agent1SaveLegalCartographyRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - artifact_name
        - lock_status
        - artifact
      properties:
        run_id:
          type: string
          description: Exact run_id for this isolated diligence run.
        phase:
          type: string
          enum:
            - M6_M9
        agent_id:
          type: string
          enum:
            - agent_1_source_legal
        artifact_name:
          type: string
          enum:
            - legal_cartography_index
        lock_status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        artifact:
          $ref: '#/components/schemas/LegalCartographyIndexObject'

    Agent1LockPhaseRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - status
      properties:
        run_id:
          type: string
        phase:
          type: string
          enum:
            - M6_M9
        agent_id:
          type: string
          enum:
            - agent_1_source_legal
        status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        next_phase:
          type: string
          enum:
            - M7_M8
          default: M7_M8
        final_report_url:
          type: string
          default: ""
paths:
  /health:
    get:
      operationId: agent1Health
      summary: Check artifact backend health
      security: []
      responses:
        '200':
          description: Health status
  /v1/runs/create:
    post:
      operationId: agent1CreateRun
      summary: Create a new isolated diligence run for Agent 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1CreateRunRequest'
      responses:
        '201':
          description: Run created
  /v1/artifacts/save:
    post:
      operationId: agent1SaveSourceDiscoveryHandoff
      summary: Save Agent 1 source_discovery_handoff under an exact run_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1SaveSourceDiscoveryRequest'
      responses:
        '201':
          description: Source discovery artifact saved
  /v1/artifacts/save-legal-cartography:
    post:
      operationId: agent1SaveLegalCartographyIndex
      summary: Save Agent 1 legal_cartography_index under an exact run_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1SaveLegalCartographyRequest'
      responses:
        '201':
          description: Legal cartography artifact saved
  /v1/phases/lock:
    post:
      operationId: agent1LockM6M9
      summary: Lock the Agent 1 M6_M9 phase and route to Agent 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1LockPhaseRequest'
      responses:
        '200':
          description: Phase locked
