openapi: 3.1.0
info:
  title: Interface Diligence Agent 1 Artifact Actions
  version: 0.1.0-agent1
  description: Narrow Custom GPT Action schema for Agent 1 only. Agent 1 may create a run, save M6/M9 artifacts, lock M6_M9, and check backend health.
servers:
  - url: https://interface-diligence-artifacts-461673097382.asia-south1.run.app
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-ln-api-key
  schemas:
    Agent1CreateRunRequest:
      type: object
      required: [target, root_url, source_mode]
      properties:
        target:
          type: string
          description: Human-readable target name or domain slug.
        root_url:
          type: string
          description: Root URL or source identifier supplied by the operator.
        source_mode:
          type: string
          enum: [url, text, url_plus_text, synthetic_demo]
        created_by:
          type: string
          enum: [agent_1_source_legal]
          default: agent_1_source_legal
        notes:
          type: string
          description: Optional operator notes for the run record.
    Agent1SaveArtifactRequest:
      type: object
      required: [run_id, phase, agent_id, artifact_name, lock_status, artifact]
      properties:
        run_id:
          type: string
          description: Exact run_id for this isolated diligence run.
        phase:
          type: string
          enum: [M6_M9]
        agent_id:
          type: string
          enum: [agent_1_source_legal]
        artifact_name:
          type: string
          enum: [source_discovery_handoff, legal_cartography_index]
        lock_status:
          type: string
          enum: [LOCKED, LOCKED_WITH_LIMITATIONS, REPAIR_REQUIRED, CONTROLLED_FAILURE]
        artifact:
          type: object
          additionalProperties: true
          description: Full JSON artifact produced by Agent 1 for the selected artifact_name.
    Agent1LockPhaseRequest:
      type: object
      required: [run_id, phase, agent_id, status]
      properties:
        run_id:
          type: string
        phase:
          type: string
          enum: [M6_M9]
        agent_id:
          type: string
          enum: [agent_1_source_legal]
        status:
          type: string
          enum: [LOCKED, LOCKED_WITH_LIMITATIONS, REPAIR_REQUIRED, CONTROLLED_FAILURE]
        next_phase:
          type: string
          nullable: true
          enum: [M7_M8]
          default: M7_M8
        final_report_url:
          type: string
          default: ""
paths:
  /health:
    get:
      operationId: agent1Health
      summary: Check artifact backend health
      security: []
      responses:
        '200':
          description: Health status
  /v1/runs/create:
    post:
      operationId: agent1CreateRun
      summary: Create a new isolated diligence run for Agent 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1CreateRunRequest'
      responses:
        '201':
          description: Run created
  /v1/artifacts/save:
    post:
      operationId: agent1SaveArtifact
      summary: Save one Agent 1 artifact under an exact run_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1SaveArtifactRequest'
      responses:
        '201':
          description: Artifact saved
  /v1/phases/lock:
    post:
      operationId: agent1LockM6M9
      summary: Lock the Agent 1 M6_M9 phase and route to Agent 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent1LockPhaseRequest'
      responses:
        '200':
          description: Phase locked
