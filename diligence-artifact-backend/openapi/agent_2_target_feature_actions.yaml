openapi: 3.1.0
info:
  title: Interface Diligence Agent 2 Artifact Actions
  version: 0.1.0-agent2
  description: Narrow Custom GPT Action schema for Agent 2 only. Agent 2 may read Agent 1 M6/M9 artifacts, save M7/M8 artifacts, lock M7_M8, and check backend health.
servers:
  - url: https://interface-diligence-artifacts-461673097382.asia-south1.run.app
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-ln-api-key
  schemas:
    Agent2ReadAgentId:
      type: string
      enum:
        - agent_2_target_feature
      default: agent_2_target_feature
    TargetProfileObject:
      type: object
      required:
        - target_profile
      properties:
        target_profile:
          type: object
          description: Full M7 target_profile JSON object.
          properties:
            run_id:
              type: string
            target:
              type: string
            entity_type:
              type: string
            target_identity:
              type: object
              additionalProperties: true
            business_context:
              type: object
              additionalProperties: true
            source_limitations:
              type: array
              items:
                type: object
                additionalProperties: true
            lock_status:
              type: string
          additionalProperties: true
    TargetFeatureProfileObject:
      type: object
      required:
        - target_feature_profile
      properties:
        target_feature_profile:
          type: object
          description: Full M8 target_feature_profile JSON object.
          properties:
            run_id:
              type: string
            target:
              type: string
            archetype_derivation:
              type: object
              additionalProperties: true
            features:
              type: array
              items:
                type: object
                additionalProperties: true
            source_limitations:
              type: array
              items:
                type: object
                additionalProperties: true
            lock_status:
              type: string
          additionalProperties: true
    Agent2SaveTargetProfileRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - artifact_name
        - lock_status
        - artifact
      properties:
        run_id:
          type: string
        phase:
          type: string
          enum:
            - M7_M8
        agent_id:
          type: string
          enum:
            - agent_2_target_feature
        artifact_name:
          type: string
          enum:
            - target_profile
        lock_status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        artifact:
          $ref: '#/components/schemas/TargetProfileObject'
    Agent2SaveTargetFeatureProfileRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - artifact_name
        - lock_status
        - artifact
      properties:
        run_id:
          type: string
        phase:
          type: string
          enum:
            - M7_M8
        agent_id:
          type: string
          enum:
            - agent_2_target_feature
        artifact_name:
          type: string
          enum:
            - target_feature_profile
        lock_status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        artifact:
          $ref: '#/components/schemas/TargetFeatureProfileObject'
    Agent2LockPhaseRequest:
      type: object
      required:
        - run_id
        - phase
        - agent_id
        - status
      properties:
        run_id:
          type: string
        phase:
          type: string
          enum:
            - M7_M8
        agent_id:
          type: string
          enum:
            - agent_2_target_feature
        status:
          type: string
          enum:
            - LOCKED
            - LOCKED_WITH_LIMITATIONS
            - REPAIR_REQUIRED
            - CONTROLLED_FAILURE
        next_phase:
          type: string
          enum:
            - M10
          default: M10
        final_report_url:
          type: string
          default: ""
paths:
  /health:
    get:
      operationId: agent2Health
      summary: Check artifact backend health
      security: []
      responses:
        '200':
          description: Health status
  /v1/artifacts/{run_id}/source_discovery_handoff:
    get:
      operationId: agent2GetSourceDiscoveryHandoff
      summary: Read Agent 1 source_discovery_handoff by exact run_id
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: agent_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Agent2ReadAgentId'
      responses:
        '200':
          description: Source discovery handoff artifact
  /v1/artifacts/{run_id}/legal_cartography_index:
    get:
      operationId: agent2GetLegalCartographyIndex
      summary: Read Agent 1 legal_cartography_index by exact run_id
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: agent_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Agent2ReadAgentId'
      responses:
        '200':
          description: Legal cartography index artifact
  /v1/artifacts/save-target-profile:
    post:
      operationId: agent2SaveTargetProfile
      summary: Save Agent 2 target_profile under an exact run_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent2SaveTargetProfileRequest'
      responses:
        '201':
          description: Target profile artifact saved
  /v1/artifacts/save-target-feature-profile:
    post:
      operationId: agent2SaveTargetFeatureProfile
      summary: Save Agent 2 target_feature_profile under an exact run_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent2SaveTargetFeatureProfileRequest'
      responses:
        '201':
          description: Target feature profile artifact saved
  /v1/phases/lock:
    post:
      operationId: agent2LockM7M8
      summary: Lock the Agent 2 M7_M8 phase and route to Agent 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent2LockPhaseRequest'
      responses:
        '200':
          description: Phase locked
