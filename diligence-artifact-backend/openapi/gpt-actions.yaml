openapi: 3.1.0
info:
  title: Interface Diligence Artifact Backend
  version: 0.2.0
  description: Current action contract for Agent 1A, Agent 1B, Agent 2A, Agent 2B, and Agent 3.
servers:
  - url: https://interface-diligence-artifacts-461673097382.asia-south1.run.app
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-ln-api-key
  schemas:
    CurrentPhase:
      type: string
      enum:
        - AGENT_1A_URL_MANIFEST
        - AGENT_1B_EXTRACT
        - M6_BUCKET_INDEX
        - M9
        - M7_TARGET_PROFILE
        - M8_TARGET_FEATURE_PROFILE
        - M7_M8
        - M10
        - M11
        - M12
        - COMPILER
        - RENDERER
        - COMPLETE
    CurrentAgentId:
      type: string
      enum:
        - agent_1a_url_manifest
        - agent_1b_extract
        - agent_2a_bucket_routing
        - agent_2b_m9
        - agent_3_target_feature
        - agent_5_m10
        - agent_6_m11
        - agent_7_m12
        - compiler
        - portfolio_renderer
        - operator
    LockStatus:
      type: string
      enum: [CREATED, RUNNING, LOCKED, LOCKED_WITH_LIMITATIONS, REPAIR_REQUIRED, CONTROLLED_FAILURE, COMPLETE]
    CreateReviewerJobRequest:
      type: object
      required: [target_url]
      properties:
        target_url:
          type: string
        target:
          type: string
        created_by:
          type: string
        notes:
          type: string
    AdvanceReviewerJobRequest:
      type: object
      properties:
        max_steps:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
paths:
  /health:
    get:
      operationId: health
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
  /v1/reviewer/jobs:
    post:
      operationId: createReviewerJob
      summary: Create reviewer job starting at Agent 1A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewerJobRequest'
      responses:
        '201':
          description: Created
  /v1/reviewer/jobs/{run_id}/advance:
    post:
      operationId: advanceReviewerJob
      summary: Advance reviewer job through current phase sequence
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceReviewerJobRequest'
      responses:
        '200':
          description: Advanced
  /v1/reviewer/jobs/{run_id}:
    get:
      operationId: getReviewerJob
      summary: Get reviewer job status
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status
  /v1/artifacts/{run_id}/{artifact_name}:
    get:
      operationId: getArtifact
      summary: Get artifact by run and artifact name
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: artifact_name
          in: path
          required: true
          schema:
            type: string
        - name: agent_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/CurrentAgentId'
      responses:
        '200':
          description: Artifact
  /agent3/health:
    get:
      operationId: agent3Health
      summary: Agent 3 health
      responses:
        '200':
          description: OK
