records:
- Rule_ID: HER_001
  Rule_Name: Universal EXCLUDE_IF First-Party Control Rule
  Engine_Instruction: For every threat row, Hunter must treat EXCLUDE_IF as a hard non-trigger rule only where first-party evidence shows legal, operational, product, UI, workflow, policy, or documentation controls sufficient to defeat the specific triggering conditions. Neutralizing evidence may be a clause, product control, UI flow, policy, trust-center artifact, DPA, ToS, AUP, privacy/security document, internal policy surfaced by the prospect, or a combination of these. Where the threat depends on legal allocation, a technical control alone is insufficient. Where the threat depends on product flow, consent, notice, or user assent, a clause alone is insufficient. Hunter must assess whether the evidence actually kills the row-specific conditions, not merely whether a generic control exists.
  Applies_To: All Hunter_Trigger rows
  Priority: Supreme runtime rule
  Status: ACTIVE
- Rule_ID: HER_001B
  Rule_Name: Risk Surface Is Insufficient Rule
  Engine_Instruction: A risk surface alone is insufficient. Hunter must trigger only when the risk surface exists AND the first-party public/legal/product evidence does not kill the relevant conditions. Row-specific EXCLUDE_IF language supplies examples, not the full universe of acceptable neutralizing evidence.
  Applies_To: All Hunter_Trigger rows
  Priority: Runtime gating rule
  Status: ACTIVE
- Rule_ID: HER_002
  Rule_Name: Controlled Evidence Output Rule
  Engine_Instruction: Hunter must evaluate CONDITION_N and TRIGGER_IF first, then apply EXCLUDE_IF. If EXCLUDE_IF evidence is present in first-party materials, output should mark the row as NOT_TRIGGERED or CONTROLLED, not TRUE_GAP.
  Applies_To: All Hunter_Trigger rows
  Priority: Output classification rule
  Status: ACTIVE
