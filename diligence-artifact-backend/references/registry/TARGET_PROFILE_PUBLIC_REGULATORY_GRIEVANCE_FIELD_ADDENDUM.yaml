schema: TARGET_PROFILE_PUBLIC_REGULATORY_GRIEVANCE_FIELD_ADDENDUM_v1
purpose: Add two Target Profile business-context material fields for Phase 1 v5 regulatory/licensing and grievance/complaints source roots without mutating the locked base field registry during authority sync.
base_registry: Diligence_Field_Derivation_Registry.yml
base_registry_status: ACTIVE_GOVERNING_REFERENCE
phase: TARGET_PROFILE_REVIEW
active_agent: agent_3_target_feature
lock_status: LOCKED
integration_rule: This addendum is a reference-authority extension read together with Diligence_Field_Derivation_Registry.yml and M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml.
columns:
  - field_id
  - profile_section
  - field_family
  - output_field
  - covers
  - mode
  - source_basis
  - conditions
  - trigger_outcome
  - exclude_fallback
  - forbidden_inference
  - lock_status
fields:
  - field_id: TP.BIZ.009
    profile_section: Target Profile
    field_family: Business Context
    output_field: Public regulatory / licensing signal
    covers: business_context.public_regulatory_licensing_signal
    mode: DERIVE
    source_basis: scoped target lossless evidence from regulatory_licensing_status OR company_identity OR pricing_commercial_availability OR legal/governance public disclosures
    conditions: C1 target-controlled public material shows regulatory disclosure, licensing/registration page, sponsor-bank/partner-bank signal, regulated activity disclosure, consumer disclosure, or similar public operating-context signal; C2 signal is tied to the reviewed target/operator/offering; C3 output remains factual route visibility or public operating-context signal only.
    trigger_outcome: DERIVED_IF C1 AND C2 AND NOT disqualified. DERIVED_WITH_LIMITATION_IF support is partial/thin. FALLBACK_IF no public signal found.
    exclude_fallback: EXCLUDE_IF source only implies regulation from industry, geography, customer type, payment words, or third-party commentary. FALLBACK_IF no target-controlled signal -> NO_PUBLIC_SIGNAL_FOUND or FIELD_LIMITED.
    forbidden_inference: Do not determine license validity, license requirement, applicable regulator, regulatory compliance, RBI/SEBI/FCA applicability, or whether the target is regulated.
    lock_status: LOCKED
  - field_id: TP.BIZ.010
    profile_section: Target Profile
    field_family: Business Context
    output_field: Public grievance / complaints signal
    covers: business_context.public_grievance_complaints_signal
    mode: DERIVE
    source_basis: scoped target lossless evidence from grievance_complaints OR contact_notice OR regulatory_licensing_status OR legal/governance public disclosures
    conditions: C1 target-controlled public material shows grievance, complaints, nodal officer, grievance officer, ombudsman, escalation, customer complaint, or complaint-route signal; C2 signal is tied to the reviewed target/operator/offering; C3 output remains factual route visibility only.
    trigger_outcome: DERIVED_IF C1 AND C2 AND NOT disqualified. DERIVED_WITH_LIMITATION_IF support is partial/thin. FALLBACK_IF no public signal found.
    exclude_fallback: EXCLUDE_IF source is generic support, marketing contact, third-party review site, or unclear help article without grievance/complaints route. FALLBACK_IF no target-controlled signal -> NO_PUBLIC_SIGNAL_FOUND or FIELD_LIMITED.
    forbidden_inference: Do not determine grievance mechanism sufficiency, legal compliance, ombudsman requirement, regulator applicability, or statutory complaint obligation.
    lock_status: LOCKED
hard_rules:
  - These fields are factual public operating-context and route-visibility signals only.
  - These fields do not authorize license validity, license requirement, applicable-regulator, compliance, grievance sufficiency, governing-law, court/venue, or legal-risk conclusions.
  - Phase 2A may map locators for these fields but must not derive their final values.
  - Target Profile Review may derive these fields only from scoped target lossless evidence and this reference authority.
