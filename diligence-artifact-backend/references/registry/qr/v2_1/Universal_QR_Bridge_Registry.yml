registry:
  registry_id: UNIVERSAL_QR_BRIDGE_REGISTRY
  registry_name: Universal Qualified Review Bridge Registry
  version: 2.1.0
  status: DOCUMENT_PLACEHOLDERS_INSERTED_AND_VALIDATED_RUNTIME_NOT_YET_WIRED
  phase_owner: PHASE_13_QUALIFIED_REVIEW
  record_count: 19
  atomic_value_count: 44
  lane_scope: ALWAYS_ACTIVE_SHARED
  contract:
    schema_id: QR_BRIDGE_REGISTRY_SCHEMA_v2
    doctrine: No QR field may exist independently. Every field must bridge Phase 12 or operator/default input to at least
      one document placeholder or document action.
    valid_routes:
    - PHASE12_FIELD_VALUE -> QR_FIELD -> REVIEWER_CONFIRMED_VALUE -> DOCUMENT_PLACEHOLDER_OR_ACTION
    - MARKET_BASED_DEMO_OR_OPERATOR_VALUE -> QR_FIELD -> REVIEWER_CONFIRMED_VALUE -> DOCUMENT_PLACEHOLDER_OR_ACTION
    phase12_authority: Phase 12 emitted material field IDs and values are the sole diligence-prefill authority.
    upstream_profiles_are_provenance_only: true
    phase12_mutation_forbidden: true
    document_consequence_required: true
    market_demo_policy:
      required_for_every_field: true
      visible_label: '{MARKET BASED}'
      used_only_when_phase12_value_or_component_is_unresolved: true
      not_evidence: true
      reviewer_confirmation_or_edit_required: true
      blank_prefill_forbidden: true
    hard_validation_rules:
    - EVERY_FIELD_HAS_DOCUMENT_BINDING
    - FULL_OR_PARTIAL_FIELD_HAS_PHASE12_BINDING
    - NONE_OR_DEFAULT_ONLY_FIELD_HAS_NO_PHASE12_BINDING
    - EVERY_DOCUMENT_BINDING_HAS_PLACEHOLDER_OR_ACTION_TOKEN
    - EVERY_ATOMIC_FIELD_HAS_NONEMPTY_MARKET_BASED_DEMO_VALUE
    - PHASE12_BINDINGS_REFERENCE_REPORT_ARTIFACTS_NOT_RAW_UPSTREAM_ARTIFACTS
    - FINAL_DOCUMENT_VALUE_COMES_FROM_REVIEWER_CONFIRMED_QR_VALUE
    review_ready_boundary:
      lex_nova_role: LEGAL_ARCHITECT
      review_ready_draft_only: true
      local_counsel_review_required: true
      not_legal_advice: true
  activation_contract:
    activate_when: PHASE_13_IS_INVOKED_FOR_ANY_DOCUMENT_ASSEMBLY
    load_order: 1
    canonical_ownership: Universal fields are defined once and consumed by every active domain registry.
    domain_registries_may_consume_but_may_not_redefine: true
  sections:
  - section_id: G01
    lane: SHARED
    title: Entity and public identity
    field_ids:
    - U01
    - U02
    - U03
    - U04
    operator_task: Review legal identity and complete the formal address.
    display_order: 1
  - section_id: G02
    lane: SHARED
    title: Notice and privacy contacts
    field_ids:
    - U05
    - U06
    operator_task: Confirm legal notice route and complete privacy contact details.
    display_order: 2
  - section_id: G03
    lane: SHARED
    title: Governed services
    field_ids:
    - U07
    - U08
    - U09
    - U10
    operator_task: Confirm the product set, intended use, outputs and delivery channels.
    display_order: 3
  - section_id: G04
    lane: SHARED
    title: Market and legal anchor
    field_ids:
    - U11
    - U12
    - U13
    operator_task: Confirm customer posture, governing law and dispute forum.
    display_order: 4
  - section_id: G05
    lane: SHARED
    title: Revenue, liability and pricing
    field_ids:
    - U14
    - U15
    operator_task: Complete private commercial figures and liability-floor basis.
    display_order: 5
  - section_id: G06
    lane: SHARED
    title: Term, refund and free-tier posture
    field_ids:
    - U16
    - U17
    operator_task: Complete renewal, grace, refund and free-tier terms.
    display_order: 6
  - section_id: G07
    lane: SHARED
    title: Output rights and SLA election
    field_ids:
    - U18
    - U19
    operator_task: Select output-rights posture and SLA package.
    display_order: 7
  fields:
  - qr_field_id: U01
    canonical_key: organization.legal_name
    label: Legal entity name
    registry_scope: UNIVERSAL
    lane: SHARED
    section_id: G01
    shape: SCALAR
    atomic_fields:
    - legal_entity_name
    atomic_value_count: 1
    required_for_assembly: true
    fillability: FULL
    coverage_status: PREFILLED_EXACT
    phase12_bridge:
      linked: true
      authoritative_source: PHASE12_MATERIAL_FIELD_VALUE
      source_is_immutable: true
      bindings:
      - binding_type: PHASE12_FIELD_ID
        field_id: TP.ID.002
        route_id: P12.ROUTE.TP.ID.002
        report_artifact: report_section__03_target_entity_sector_profile
        value_selector: findings[field_id="TP.ID.002"].value
        fills:
        - legal_entity_name
        transform: DIRECT_OR_MERGE
      resolved_value_policy: USE_PHASE12_VALUE_WHEN_RESOLVED
      unresolved_or_missing_component_policy: USE_MARKET_BASED_DEMO_FALLBACK
      reviewer_confirmation_required: false
    resolution:
      resolution_order:
      - PHASE12_RESOLVED_MATERIAL_VALUE
      - MARKET_BASED_DEMO_FALLBACK_FOR_ANY_UNRESOLVED_ATOMIC_COMPONENT
      - REVIEWER_CONFIRMED_OR_EDITED_VALUE
