registry:
  registry_id: AI_QR_BRIDGE_REGISTRY
  registry_name: AI Qualified Review Bridge Registry
  version: 2.1.0
  status: DOCUMENT_PLACEHOLDERS_INSERTED_AND_VALIDATED_RUNTIME_NOT_YET_WIRED
  phase_owner: PHASE_13_QUALIFIED_REVIEW
  record_count: 46
  lane_a_record_count: 28
  lane_b_record_count: 18
  atomic_value_count: 82
  lane_a_atomic_value_count: 57
  lane_b_atomic_value_count: 25
  contract:
    schema_id: QR_BRIDGE_REGISTRY_SCHEMA_v2
    doctrine: No QR field may exist independently. Every field must bridge Phase 12 or operator/default input to at least
      one document placeholder or document action.
    valid_routes:
    - PHASE12_FIELD_VALUE -> QR_FIELD -> REVIEWER_CONFIRMED_VALUE -> DOCUMENT_PLACEHOLDER_OR_ACTION
    - MARKET_BASED_DEMO_OR_OPERATOR_VALUE -> QR_FIELD -> REVIEWER_CONFIRMED_VALUE -> DOCUMENT_PLACEHOLDER_OR_ACTION
    phase12_authority: Phase 12 emitted material field IDs and values are the sole diligence-prefill authority.
    upstream_profiles_are_provenance_only: true
    phase12_mutation_forbidden: true
    document_consequence_required: true
    market_demo_policy:
      required_for_every_field: true
      visible_label: '{MARKET BASED}'
      used_only_when_phase12_value_or_component_is_unresolved: true
      not_evidence: true
      reviewer_confirmation_or_edit_required: true
      blank_prefill_forbidden: true
    hard_validation_rules:
    - EVERY_FIELD_HAS_DOCUMENT_BINDING
    - FULL_OR_PARTIAL_FIELD_HAS_PHASE12_BINDING
    - NONE_OR_DEFAULT_ONLY_FIELD_HAS_NO_PHASE12_BINDING
    - EVERY_DOCUMENT_BINDING_HAS_PLACEHOLDER_OR_ACTION_TOKEN
    - EVERY_ATOMIC_FIELD_HAS_NONEMPTY_MARKET_BASED_DEMO_VALUE
    - PHASE12_BINDINGS_REFERENCE_REPORT_ARTIFACTS_NOT_RAW_UPSTREAM_ARTIFACTS
    - FINAL_DOCUMENT_VALUE_COMES_FROM_REVIEWER_CONFIRMED_QR_VALUE
    review_ready_boundary:
      lex_nova_role: LEGAL_ARCHITECT
      review_ready_draft_only: true
      local_counsel_review_required: true
      not_legal_advice: true
  registry_activation_contract:
    activate_full_registry_when:
      any:
      - active_run_package_manifest.primary_domain_package == ai-governance
      - active_run_package_manifest.capability_overlays contains ai-native
    primary_domain_mode: FULL_REGISTRY
    overlay_mode: TAGGED_ROWS_ONLY
    load_order: 2
    universal_registry_required: true
  lane_resolution_contract:
    source_axis: AI_Registry_Key.v4.0.lane
    resolution_scope: PER_ACTIVITY_AND_PER_EXPOSURE_NOT_PER_COMPANY
    lane_a_trigger:
      all:
      - entity develops, sells, licenses, or makes an AI system available externally
      - document exposure arises from shipped product, customer terms, or outputs to third parties
    lane_b_trigger:
      all:
      - entity operates or deploys AI internally or uses AI in workforce, operations, or governance
      - document exposure arises from internal deployment or employer role
    both_lanes_may_be_active: true
    operator_lane_selection_forbidden: true
    upstream_evidence_resolves_lane: true
    phase13_may_ask_only_missing_operational_fact: true
    lane_b_unknown_rule: Do not infer INACTIVE from absent public evidence; render B01.
  document_activation_rules:
  - document_id: DOC_AI_A_TOS
    activate_when:
      all:
      - lane_a_active == true
  - document_id: DOC_AI_A_AUP
    activate_when:
      all:
      - lane_a_active == true
  - document_id: DOC_AI_A_AGT
    activate_when:
      all:
      - lane_a_active == true
      - A03 == true
  - document_id: DOC_AI_A_DPA
    activate_when:
      all:
      - lane_a_active == true
      - A26 includes PROCESSOR or SERVICE_PROVIDER or CONTRACTOR
  - document_id: DOC_AI_A_PP
    activate_when:
      all:
      - lane_a_active == true
      - A17 is not empty
  - document_id: DOC_AI_A_SLA
    activate_when:
      all:
      - lane_a_active == true
      - U19 == true
  - document_id: DOC_AI_A_PBK
    activate_when:
      all:
      - lane_a_active == true
    inherit_only: true
  - document_id: DOC_AI_B_HND
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
  - document_id: DOC_AI_B_SCAN
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
    blank_operational_instrument_only: true
  - document_id: DOC_AI_B_DPIA
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
      any:
      - B06 == true
      - B12 > 0
    blank_operational_instrument_only: true
  - document_id: DOC_AI_B_IP
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
      - B02 is not empty
  - document_id: DOC_AI_B_SOP
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
      any:
      - B05 == true
      - B06 == true
    blank_operational_instrument_only: true
  - document_id: DOC_AI_B_PBK
    activate_when:
      all:
      - lane_b_active == true
      - B01 == true
    inherit_only: true
  overlay_export_contract:
    whole_registry_mount_for_non_ai_primary_domain_forbidden: true
    supported_export_tags:
