  fields:
  - qr_field_id: A01
    canonical_key: ai.lane_a.model_stack
    label: Model stack
    registry_scope: LANE_A
    lane: A
    section_id: G08
    shape: REPEATABLE_OBJECT
    atomic_fields:
    - model_name
    - provider_name
    - hosting_posture
    - provider_processing_jurisdiction
    - provider_privacy_url
    atomic_value_count: 5
    required_for_assembly: true
    fillability: PARTIAL
    coverage_status: PARTIAL_INPUT
    phase12_bridge:
      linked: true
      authoritative_source: PHASE12_MATERIAL_FIELD_VALUE
      source_is_immutable: true
      bindings:
      - binding_type: PHASE12_STRUCTURED_FIELD
        report_artifact: report_section__04_product_activity_architecture
        value_selector: activity_register.rows[*].primary_classification + overlay_classifications
        filters:
          behavior_class_codes_any:
          - ORC
          - RDR
        fills:
        - model_name
        - provider_name
        - hosting_posture
        transform: DETERMINISTIC_PROJECT
      - binding_type: PHASE12_FIELD_FAMILY
        field_id_prefix: DAP.VEND.
        report_artifact: report_section__05_vendor_processor_chain
        value_selector: findings[field_id startsWith "DAP.VEND."].value
        canonical_label_query:
        - model provider
        - AI provider
        - subprocessor
        fills:
        - model_name
        - provider_name
        - hosting_posture
        transform: COLLECT_VALUES
        runtime_must_resolve_concrete_field_ids: true
      - binding_type: PHASE12_FIELD_FAMILY
        field_id_prefix: DAP.LOC.
        report_artifact: report_section__05_location_transfer_custody
        value_selector: findings[field_id startsWith "DAP.LOC."].value
        canonical_label_query:
        - processing location
        - transfer route
        fills:
        - provider_processing_jurisdiction
        - provider_privacy_url
        transform: COLLECT_VALUES
        runtime_must_resolve_concrete_field_ids: true
      resolved_value_policy: USE_PHASE12_VALUE_WHEN_RESOLVED
      unresolved_or_missing_component_policy: USE_MARKET_BASED_DEMO_FALLBACK
      reviewer_confirmation_required: true
    resolution:
      resolution_order:
      - PHASE12_RESOLVED_MATERIAL_VALUE
      - MARKET_BASED_DEMO_FALLBACK_FOR_ANY_UNRESOLVED_ATOMIC_COMPONENT
      - REVIEWER_CONFIRMED_OR_EDITED_VALUE
      reviewer_action: COMPLETE_CONFIRM_OR_EDIT
      final_value_path: assembly_payload.qr_values.A01
      final_value_is_document_authority: true
      phase12_writeback_forbidden: true
      notes: Phase 12 supplies one or more components; remaining components use the market-based demo fallback until reviewer
        confirmation or edit.
    demo_fallback:
      source_class: MARKET_BASED
      visible_label: '{MARKET BASED}'
      use_when: Phase 12 does not resolve the field or an atomic component.
      atomic_values:
        model_name: GPT-4.1
        provider_name: OpenAI
        hosting_posture: Third-party API
        provider_processing_jurisdiction: United States
        provider_privacy_url: https://openai.com/policies/privacy-policy
      display_value: 'model name: GPT-4.1 | provider name: OpenAI | hosting posture: Third-party API | provider processing
        jurisdiction: United States | provider privacy url: https://openai.com/policies/privacy-policy'
      not_diligence_evidence: true
      reviewer_may_confirm_or_edit: true
      must_never_render_blank: true
    document_bindings:
    - document_id: DOC_AI_A_TOS
      actions:
      - POPULATE
      - SELECT_CLAUSE
      document_target: TOS Schedule A and §§1.2/2.3/6; DPA Schedule C; PP §4.3
      value_placeholders:
        model_name: '{{QR.A01.MODEL_NAME}}'
        provider_name: '{{QR.A01.PROVIDER_NAME}}'
        hosting_posture: '{{QR.A01.HOSTING_POSTURE}}'
        provider_processing_jurisdiction: '{{QR.A01.PROVIDER_PROCESSING_JURISDICTION}}'
        provider_privacy_url: '{{QR.A01.PROVIDER_PRIVACY_URL}}'
      clause_selector_token: '{{QR.A01.CLAUSE_SELECTOR}}'
    - document_id: DOC_AI_A_DPA
