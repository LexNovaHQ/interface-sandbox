        provider_name: '{{QR.A01.PROVIDER_NAME}}'
        hosting_posture: '{{QR.A01.HOSTING_POSTURE}}'
        provider_processing_jurisdiction: '{{QR.A01.PROVIDER_PROCESSING_JURISDICTION}}'
        provider_privacy_url: '{{QR.A01.PROVIDER_PRIVACY_URL}}'
      clause_selector_token: '{{QR.A01.CLAUSE_SELECTOR}}'
    - document_id: DOC_AI_A_PP
