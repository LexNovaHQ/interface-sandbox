schema:
  id: qr_assembly_registry.v1
  version: v1.0
  status: LOCKED_FOR_PHASE_13_BUILD
  purpose: Shared contract for Universal and domain QR assembly registries.
  applies_to:
  - UNIVERSAL_QR_REGISTRY
  - AI_QR_REGISTRY
  doctrine:
    document_first: true
    document_consequence_required: true
    diligence_prefill_before_operator_question: true
    registry_is_not_questionnaire: true
    one_canonical_owner_per_field: true
    raw_evidence_reads_forbidden: true
    document_generation_forbidden: true
    review_ready_only: true
    local_counsel_required: true
  registry_required_fields:
  - id
  - version
  - status
  - scope
  - record_count
  - atomic_value_count
  - schema
  - phase_owner
  - boundary
  - enums
  - activation
  - validation
  registry_modes:
    inline_rows:
      requires:
      - sections
      - rows
    modular_rows:
      requires:
      - parts
      - section_index
  row_required_fields:
  - id
  - key
  - section
  - lane
  - shape
  - leaves
  - materiality
  - required
  - effects
  - documents
  - mapping_key
  - upstream
  - resolve
  - ui
  - demo
  - threats
  closed_enums:
    status:
    - LOCKED_FOR_PHASE_13_BUILD
    lane:
    - SHARED
    - A
    - B
    shape:
    - SCALAR
    - BOOLEAN
    - ENUM
    - LIST
    - MULTI-SELECT
    - OBJECT
    - REPEATABLE_OBJECT
    - LONG_TEXT
    materiality:
    - STANDARD
    - MATERIAL
    - CRITICAL
    coverage:
    - PREFILLED_EXACT
    - PREFILLED_CONFIRM
    - PARTIAL_INPUT
    - INPUT_REQUIRED
    - DEFAULT_OVERRIDE
    resolve:
    - AUTO_FILL
    - CONFIRM
    - COMPLETE
    - ANSWER
    - OVERRIDE_IF_NEEDED
    effects:
    - POPULATE
    - ACTIVATE_DOCUMENT
    - SELECT_CLAUSE
    - SELECT_VARIANT
    - SET_CLAUSE_FLAG
    ui_mode:
    - COLLAPSED_REVIEW
    - CONFIRM_OR_CORRECT
    - PREFILLED_COMPLETION
    - REQUIRED_INPUT
    - OPTIONAL_OVERRIDE
  allowed_documents:
  - DOC_AI_A_TOS
  - DOC_AI_A_AUP
  - DOC_AI_A_AGT
  - DOC_AI_A_DPA
  - DOC_AI_A_PP
  - DOC_AI_A_SLA
  - DOC_AI_A_PBK
  - DOC_AI_B_HND
  - DOC_AI_B_SCAN
  - DOC_AI_B_DPIA
  - DOC_AI_B_IP
  - DOC_AI_B_SOP
  - DOC_AI_B_PBK
  invariants:
  - registry.schema MUST equal qr_assembly_registry.v1
  - registry.record_count MUST equal the number of unique assembled rows
  - registry.atomic_value_count MUST equal the sum of row leaf counts
  - row.id MUST match ^(U|A|B)[0-9]{2}$
  - row.mapping_key MUST equal QR.<row.id>
  - row.id and row.key MUST be globally unique across the loaded registry set
  - a domain registry MUST NOT redefine a Universal key
  - every row MUST have at least one document and one assembly effect
  - every document reference MUST exist in allowed_documents
  - every non-empty threat reference MUST resolve to the active threat registry
  - threat references are traceability only and MUST NOT create QR rows
  - PREFILLED_EXACT requires AUTO_FILL unless the value is materially conflicted
  - PREFILLED_CONFIRM requires CONFIRM
  - PARTIAL_INPUT requires COMPLETE
  - INPUT_REQUIRED requires ANSWER
  - DEFAULT_OVERRIDE requires OVERRIDE_IF_NEEDED
  - demo values MUST be present and visibly labelled as demo-prefilled in demo mode
  - optional full-review rows are forbidden
  - execution-only counterparty fields are forbidden
  - completed scanner, DPIA, or HITL results are forbidden
  - playbooks may inherit assembled values but may not create independent rows
  - Lane A and Lane B are resolved per activity/exposure and both may be active
  modular_loading:
    root_registry_is_authority: true
    part_counts_must_reconcile: true
    section_paths_are_relative_to_part_file: true
    missing_part_or_section_is_blocking: true
    duplicate_section_id_is_blocking: true
  phase13_output_contract:
    authored_output: assembly_configuration_payload
    derived_outputs:
    - document_activation_manifest
    - document_injection_manifest
    provenance_values:
    - DERIVED
    - CONFIRMED
    - CORRECTED
    - MANUAL
    - DEMO_PREFILLED
    - DEFAULTED
    - UNRESOLVED
