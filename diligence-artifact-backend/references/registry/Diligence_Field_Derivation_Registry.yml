  covers: Mounted overlay; matched framework token; candidate-only overlay status
  mode: JOIN
  source_basis: active_run_package_manifest.regulatory_overlays + mounted Registry Key regulatory_overlay framework links + model-derived authority_dependency
  conditions: C1 regulatory overlay is mounted as candidate/review context; C2 obligation authority_dependency contains a framework token linked by the overlay; C3 reference remains contextual and does not assert legal applicability.
  trigger_outcome: DERIVED_IF C1 AND C2. NO_VALUE_IF no mounted-overlay/framework intersection.
  exclude_fallback: EXCLUDE_IF the result would create a duplicate obligation row, independent regulatory obligation source, legal-applicability conclusion, regulator-jurisdiction conclusion, satisfaction conclusion, or breach conclusion. FALLBACK_IF overlay metadata is malformed -> no overlay reference and record a mechanical limitation only if material.
  forbidden_inference: Do not treat an overlay reference as applicability, satisfaction, breach, regulator jurisdiction, or an independent obligation source.
  lock_status: LOCKED
- field_id: DCO.CTL.001
  profile_section: Domain Control Obligation Profile
  field_family: Control Posture
  output_field: Control mechanism present
  covers: null
  mode: CLASSIFY
  source_basis: scoped lossless control evidence (security_trust_compliance / data_governance_controls)
  conditions: C1 admitted lossless evidence shows a visible control mechanism relevant to the obligation; C2 tied to reviewed target; C3 no disqualifying inference.
  trigger_outcome: DERIVED_IF C1 AND C2. DERIVED_WITH_LIMITATION_IF evidence thin. FALLBACK_IF no visible control -> not_visible.
  exclude_fallback: EXCLUDE_IF marketing-only claim. FALLBACK_IF unresolved -> missing_proof.
  forbidden_inference: Do not infer control satisfaction from generic trust-page wording.
  lock_status: LOCKED
- field_id: DCO.CTL.002
  profile_section: Domain Control Obligation Profile
  field_family: Control Posture
  output_field: Control posture status
  covers: null
  mode: CLASSIFY
  source_basis: control_mechanism_present + evidence strength
  conditions: C1 control mechanism evaluated; C2 posture status derived as visible/partial/not-visible control posture (not compliance verdict); C3 no disqualifying inference.
  trigger_outcome: DERIVED_IF C1 AND C2. DERIVED_WITH_LIMITATION_IF partial. FALLBACK_IF unresolved -> not_visible.
  exclude_fallback: EXCLUDE_IF posture is stated as a compliance conclusion. FALLBACK_IF unresolved -> missing_proof.
  forbidden_inference: Control posture is a visibility signal, not obligation satisfaction or a compliance verdict.
  lock_status: LOCKED
- field_id: DCO.EV.001
  profile_section: Domain Control Obligation Profile
  field_family: Obligation Evidence
  output_field: Evidence basis
  covers: null
  mode: SUMMARIZE
  source_basis: scoped lossless evidence reached through domain_control_obligation_navigation_index
  conditions: C1 evidence explains why the obligation is in scope using mechanics not legal conclusion; C2 tied to reviewed target; C3 no disqualifying inference.
  trigger_outcome: DERIVED_IF C1 AND C2. DERIVED_WITH_LIMITATION_IF partial. FALLBACK_IF thin -> missing_proof.
  exclude_fallback: EXCLUDE_IF basis is a compliance conclusion. FALLBACK_IF unresolved -> package_context_limited.
  forbidden_inference: Do not use a registry exposure row as basis.
  lock_status: LOCKED
- field_id: DCO.LIM.001
  profile_section: Domain Control Obligation Profile
  field_family: Obligation Limitations
  output_field: Missing proof
  covers: null
  mode: SUMMARIZE
  source_basis: gaps between installed obligation catalog and admitted evidence
  conditions: C1 an in-scope obligation lacks visible control/evidence; C2 tied to reviewed target; C3 no disqualifying inference.
  trigger_outcome: DERIVED_IF C1 AND C2. DERIVED_WITH_LIMITATION_IF partial. FALLBACK_IF none -> no_missing_proof.
  exclude_fallback: EXCLUDE_IF gap requires forbidden inference. FALLBACK_IF unresolved -> package_context_limited.
  forbidden_inference: Do not convert a missing-proof note into a compliance failure conclusion.
  lock_status: LOCKED
- field_id: DCO.LIM.002
  profile_section: Domain Control Obligation Profile
  field_family: Obligation Limitations
  output_field: Limitation
  covers: null
  mode: SUMMARIZE
  source_basis: obligation-level limitation signals
  conditions: C1 obligation derivation is thin/gated/conflicted; C2 tied to reviewed target; C3 no disqualifying inference.
  trigger_outcome: DERIVED_IF C1 AND C2. DERIVED_WITH_LIMITATION_IF partial. FALLBACK_IF none -> no_limitation.
  exclude_fallback: EXCLUDE_IF limitation asserts a legal conclusion. FALLBACK_IF unresolved -> package_context_limited.
  forbidden_inference: Limitations are visibility notes, not legal verdicts.
  lock_status: LOCKED

# ===========================================================================
# DOMAIN DERIVATION GRAMMAR (agnostic)
#   Consolidated into this registry. This block holds
#   the domain-AGNOSTIC rule grammar, controlled vocabularies, resolution order,
#   the FALLBACK + FUSION + REGULATORY_OVERLAY rule schemas, and validator
#   requirements used by Phase 3B. Domain-SPECIFIC rule INSTANCES live in each
#   Registry Key (domain_derivation_rules + regulatory_overlay). Phase 3B evaluates
#   the mounted key's instances against this grammar; it hardcodes no domain logic.
# ===========================================================================
domain_derivation_grammar:
  single_source_of_truth: "grammar here; domain rule instances in the Registry Keys"
  controlled_vocabularies:
    rule_type: [PRIMARY_DOMAIN, AI_MOUNT, REGULATORY_OVERLAY, FUSION_CANDIDATE, FALLBACK]
    lock_scope: [PRIMARY_DOMAIN_LOCK, PACKAGE_MOUNT_ONLY, CANDIDATE_ONLY, NOT_VISIBLE, REVIEW_REQUIRED]
    primary_domain_status: [LOCKED, LOCKED_WITH_LIMITATIONS, REVIEW_REQUIRED, REJECTED, NOT_EVALUATED]
    ai_package_mount: [AI_PRIMARY, AI_OVERLAY_MOUNTED, AI_CANDIDATE_ONLY, AI_NOT_VISIBLE]
    regulatory_overlay_status: [NOT_VISIBLE, CANDIDATE_ONLY, REVIEW_REQUIRED]
    fusion_bucket_status: [FUSION_CANDIDATE_ONLY, FUSION_NOT_VISIBLE, FUSION_REVIEW_REQUIRED]
  evidence_rule:
    phase_2_indexes_are_navigation_only: true
    phase_2_indexes_are_evidence: false
    evidence_must_be_lossless_phase_1_artifacts: true
  rule_schema:
    required_fields: [rule_id, rule_type, normalized_name, priority, conditions, trigger_if, exclude_if, evidence_policy, result, lock_scope]
    condition_grammar: "CONDITION_N -> TRIGGER_IF -> EXCLUDE_IF; trigger_if may use AND/OR/NOT/parentheses over declared condition ids; exclude_if mandatory; conditions must be concrete public-footprint criteria; no Phase 2 index as evidence."
  resolution_policy:
    evaluation_order: [PRIMARY_DOMAIN, AI_MOUNT, REGULATORY_OVERLAY, FUSION_CANDIDATE, FALLBACK]
    primary_domain_resolution: "Evaluate all mounted-key PRIMARY_DOMAIN rules; apply exclude_if before priority; exactly one fires -> lock/limit; multiple unfenced -> REVIEW_REQUIRED."
    ai_mount_resolution: "ai-governance primary -> AI_PRIMARY (overlay prohibited); non-AI primary -> AI_OVERLAY_MOUNTED then AI_CANDIDATE_ONLY then AI_NOT_VISIBLE. AI_OVERLAY is availability only."
    regulatory_overlay_resolution: "For each mounted-key regulatory_overlay whose overlay_id is in package-catalog.regulatory_overlays and whose trigger_if is evidence-supported, record CANDIDATE_ONLY (or REVIEW_REQUIRED on conflict). Legal applicability is NOT determined in Phase 3B."
    fusion_resolution: "Fusion candidates recorded only after non-AI primary + AI_OVERLAY_MOUNTED both fire; owned by the locked primary domain package; never trigger exposure rows in 3B."
  fallback_rule:
    rule_id: NO_SUPPORTED_PRIMARY_DOMAIN_LOCK
    rule_type: FALLBACK
    priority: 0
    conditions: {C1: "No mounted-key PRIMARY_DOMAIN rule fires.", C2: "Evidence too thin/gated/contradictory, or points to a package that does not exist yet."}
    trigger_if: "C1 OR C2"
    exclude_if: ["Any mounted-key PRIMARY_DOMAIN rule fires."]
    result: {primary_domain_status: REVIEW_REQUIRED, active_run_package_manifest_status: PROVISIONAL_OR_LIMITED}
    lock_scope: REVIEW_REQUIRED
    defer_to: PHASE_12_QUALIFIED_REVIEW_OR_PACKAGE_BUILD
  fusion_rule:
    rule_id: DOMAIN_FUSION_CANDIDATE
    rule_type: FUSION_CANDIDATE
    priority: 60
    owner: locked_primary_domain_package
    conditions: {C1: "non-AI primary locked", C2: "AI_OVERLAY_MOUNTED fires", C3: "AI used inside a primary-domain activity", C4: "candidate depends on both primary activity and AI mechanics", C5: "duty (if later confirmed) is created by the primary domain's law/regulator/control framework"}
    trigger_if: "C1 AND C2 AND C3 AND C4 AND C5"
    exclude_if: ["Fully pure-AI exposure.", "Fully pure-domain exposure.", "AI mount is AI_CANDIDATE_ONLY or AI_NOT_VISIBLE."]
    result: {fusion_bucket_status: FUSION_CANDIDATE_ONLY, fusion_owner: locked_primary_domain_package}
    lock_scope: CANDIDATE_ONLY
    defer_to: PHASE_5_ACTIVITY_PROFILE_AND_PHASE_9_EXPOSURE_PROFILE
  validator_requirements:
    - "Every mounted-key PRIMARY_DOMAIN rule package_id must exist in the package catalog."
    - "Each active primary domain package has exactly one PRIMARY_DOMAIN rule in its key."
    - "AI_PRIMARY and AI_OVERLAY_MOUNTED cannot both be active for one run."
    - "Every regulatory_overlay candidate overlay_id must exist in package-catalog.regulatory_overlays."
    - "No regulatory_overlay candidate may assert legal applicability or a compliance conclusion in Phase 3B."
    - "DOMAIN_FUSION_CANDIDATE must resolve fusion_owner to the locked primary domain package."
    - "Phase 3B code must not hardcode domain names except to validate registry/catalog consistency."
