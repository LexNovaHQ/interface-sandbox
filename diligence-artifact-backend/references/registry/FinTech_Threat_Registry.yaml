-
    Threat_ID: PAY_LIC_001
    Threat_Name: Unlicensed Money Transmission / Payment Aggregation
    Lane: A
    Archetype: PAY
    Surface: Transaction-Data | Merchant-SME
    Authority_IN: RBI (Regulation of Payment Aggregators) Directions, 2025 + Payment and Settlement Systems Act, 2007 s.4 / s.23A
    Authority_EU: PSD2 (Dir 2015/2366) Art. 11 authorisation of payment institutions (PSD3/PSR to supersede on application, ~2028)
    Authority_US: 18 U.S.C. section 1960 (unlicensed money transmitting) + FinCEN MSB registration (31 CFR 1022.380) + state money-transmitter licences via NMLS
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Criminal
    Status: Active
    Effective_Date: 2025-09-15
    Legal_Pain: 'Operating a payment-aggregation or money-transmission business without authorisation is a first-order regulatory offence in every target market. In India non-bank PAs must be RBI-authorised and route all funds through a bank escrow; in the US unlicensed money transmission is a federal crime under 18 U.S.C. 1960 plus a state licensing regime; in the EU payment services require payment-institution authorisation. The consequence is a wind-down of the regulated activity.'
    FP_Mechanism: 'your product collects, pools, or moves customer or merchant funds without holding the payment-aggregator authorisation, money-transmitter licences, or payment-institution authorisation that activity requires in the markets you serve'
    FP_Impact: 'cease-and-desist / wind-down of the regulated flow, disgorgement of processed volume, and in the US criminal exposure under 18 U.S.C. 1960. partner banks and card networks drop an unlicensed aggregator immediately.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product collects OR pools OR holds OR transmits customer/merchant funds OR settles payments to third parties. | CONDITION_2: Product serves India OR US states OR EU/UK OR does not exclude those markets. | CONDITION_3: Product shows no payment-aggregator authorisation OR money-transmitter licence OR payment-institution authorisation OR licensed bank-sponsor arrangement. | CONDITION_4: Funds pass through the product entity rather than a licensed bank/escrow before reaching the payee. | TRIGGER_IF: CONDITION_1 = TRUE AND CONDITION_3 = TRUE AND AT_LEAST_1_OF(CONDITION_2, CONDITION_4) = TRUE | EXCLUDE_IF: Product operates strictly as a technology provider to a licensed bank/PA under a disclosed sponsor arrangement, never takes possession of funds, and routes all money through the licensed party escrow.'
    Provenance: 't1:LIC_001 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: PAY
    FIELD22: LIC
    FIELD23: 1
-
    Threat_ID: LEND_LIC_001
    Threat_Name: Unlicensed Lending / NBFC Authorisation Defect
    Lane: A
    Archetype: LEND
    Surface: Consumer-Retail | Credit-Data
    Authority_IN: RBI (Digital Lending) Directions, 2025 + Reserve Bank of India Act, 1934 s.45-IA (NBFC registration)
    Authority_EU: Consumer Credit Directive 2 (Dir (EU) 2023/2225) creditor/credit-intermediary admission (applies 20 Nov 2026) + national credit-institution licensing
    Authority_US: State lender-licensing statutes + true-lender doctrine (bank-partner look-through) + state usury caps
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Corporate
    Status: Active
    Effective_Date: 2025-05-01
    Legal_Pain: 'Extending credit as a business without the required licence, NBFC registration, or a valid bank-partner structure exposes the lender to loan-unenforceability and licence-defect enforcement. In India the RBI Digital Lending Directions route all regulated lending through Regulated Entities and their registered Lending Service Providers. US true-lender challenges look through rent-a-charter arrangements to the party with the predominant economic interest.'
    FP_Mechanism: 'your platform originates, underwrites, or funds loans in its own economic interest without the NBFC registration or state lending licences that requires, or relies on a bank-partner rent-a-charter that a true-lender analysis would look straight through'
    FP_Impact: 'loans made in the unlicensed window can be rendered void or unenforceable, interest/charges disgorged, and the origination model shut until licensing lands. in India non-compliant digital lending draws RBI enforcement against the RE and its LSP.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product originates OR underwrites OR funds OR materially controls consumer or SME loans OR credit lines. | CONDITION_2: Product serves India OR US states OR EU OR does not exclude those markets. | CONDITION_3: Product shows no NBFC registration OR state lending licence OR disclosed Regulated-Entity/bank-partner lending structure. | CONDITION_4: The platform (not a licensed bank) sets credit terms OR bears the predominant economic interest in the loans. | TRIGGER_IF: CONDITION_1 = TRUE AND CONDITION_3 = TRUE AND AT_LEAST_1_OF(CONDITION_2, CONDITION_4) = TRUE | EXCLUDE_IF: All lending is done by a licensed bank/NBFC of record that sets terms and holds the economic interest, with the platform acting only as a disclosed technology/servicing LSP.'
    Provenance: 't1:LIC_002 web-verified 2026-07 FinTech_Registry_Key v1.0'
