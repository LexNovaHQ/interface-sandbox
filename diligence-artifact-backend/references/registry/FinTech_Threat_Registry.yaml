    Threat_ID: XCHG_LIC_001
    Threat_Name: Unauthorised Crypto-Asset Service (CASP / VASP)
    Lane: A
    Archetype: XCHG
    Surface: Crypto-VirtualAsset | Cross-Border
    Authority_IN: PMLA, 2002 + FIU-IND registration of Virtual Digital Asset service providers (2023 notification)
    Authority_EU: Markets in Crypto-Assets Regulation (Reg (EU) 2023/1114) CASP authorisation; transitional period ended 1 July 2026
    Authority_US: Securities Act / Exchange Act registration where the asset is a security + FinCEN MSB registration for exchange/transfer
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Criminal
    Status: Active
    Effective_Date: 2026-07-01
    Legal_Pain: 'As of 1 July 2026 the MiCA transitional window has closed: any provider offering crypto-asset services to EU clients without CASP authorisation (or a timely pending application filed before the national cut-off) must cease regulated services. In India VDA providers must register with FIU-IND under the PMLA; in the US crypto exchange/transfer triggers FinCEN MSB duties and securities registration where tokens are investment contracts.'
    FP_Mechanism: 'your product offers crypto-asset exchange, custody, transfer, or brokerage to EU users without a MiCA CASP authorisation now that the transitional period has ended, or serves Indian users without FIU-IND registration, or US users without MSB registration'
    FP_Impact: 'mandatory cessation of EU crypto services after 1 July 2026, FIU-IND/ED action in India under the PMLA, and US MSB/securities enforcement. loss of banking and fiat on-ramps follows immediately for an unlicensed CASP.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product provides crypto-asset exchange OR custody OR transfer OR brokerage OR trading. | CONDITION_2: Product serves EU users OR Indian users OR US users OR does not exclude those markets. | CONDITION_3: Product shows no MiCA CASP authorisation (EU) OR FIU-IND VDA registration (India) OR FinCEN MSB registration (US) appropriate to the users served. | CONDITION_4: Crypto services are live to EU users after 1 July 2026 without a pre-cutoff pending application. | TRIGGER_IF: CONDITION_1 = TRUE AND CONDITION_3 = TRUE AND CONDITION_2 = TRUE | EXCLUDE_IF: Product holds the market-appropriate authorisation (MiCA CASP, FIU-IND, FinCEN MSB) or geoblocks the markets where it is unlicensed with evidence of effective exclusion.'
    Provenance: 't1:LIC_003 web-verified 2026-07 FinTech_Registry_Key v1.0'
