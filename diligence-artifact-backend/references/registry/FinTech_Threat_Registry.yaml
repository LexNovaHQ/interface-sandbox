    Legal_Pain: 'Issuing prepaid wallets or stored value is an authorised, KYC-tiered activity. India RBI PPI Master Directions require issuance authorisation, distinguish Small-PPI from Full-KYC-PPI (with different limits, interoperability, and KYC), and require the outstanding PPI balance to be held in escrow; the EU E-Money Directive requires e-money-institution authorisation and safeguarding; US stored-value issuance needs state money-transmitter licensing and triggers FinCEN prepaid-access rules. Issuing wallets without authorisation, mis-tiering KYC, or failing to escrow the float is unauthorised e-money issuance.'
    FP_Mechanism: 'your product issues prepaid wallets or stored value without PPI/e-money authorisation, applies the wrong KYC tier for the limits offered, or fails to hold the outstanding balance in escrow/safeguarding, breaching PPI/EMD/state stored-value rules'
    FP_Impact: 'RBI/EU/state enforcement and cessation of issuance, escrow-shortfall and safeguarding liability, and loss of interoperability access. mis-tiered KYC (offering Full-KYC limits on Small-PPI onboarding) is a specific breach.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product issues prepaid wallets, stored value, or e-money to customers. | CONDITION_2: Product serves India OR EU OR US customers OR does not exclude those markets. | CONDITION_3: No PPI/e-money issuance authorisation OR wrong KYC tier for the limits offered OR outstanding balance not held in escrow/safeguarding. | CONDITION_4: Wallet limits or interoperability exceed what the applied KYC tier permits. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Product holds PPI/e-money issuance authorisation, applies the correct KYC tier for the limits and interoperability offered, and holds the outstanding balance in escrow/safeguarding.'
