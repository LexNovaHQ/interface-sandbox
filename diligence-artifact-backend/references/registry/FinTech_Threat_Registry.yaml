-
    Threat_ID: PAY_FUND_001
    Threat_Name: Customer-Funds Commingling / Escrow Breach
    Lane: A
    Archetype: PAY
    Surface: Funds-Custody | Transaction-Data
    Authority_IN: RBI (Regulation of Payment Aggregators) Directions, 2025 (mandatory bank escrow, no commingling) + Payment and Settlement Systems Act, 2007 s.23A
    Authority_EU: PSD2 (Dir 2015/2366) Art. 10 safeguarding / E-Money Directive Art. 7 (UK FCA supplementary safeguarding regime in force 7 May 2026)
    Authority_US: State money-transmitter permissible-investment / customer-fund-protection statutes + FDIC pass-through insurance conditions
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Corporate
    Status: Active
    Effective_Date: 2025-09-15
    Legal_Pain: 'Customer money must be segregated from operator funds. The India 2025 PA Directions require all customer funds to flow only through a bank-held escrow with no commingling and quarterly auditor certification; EU/UK regimes require segregation and (UK from 7 May 2026) enhanced record-keeping toward a CASS-style statutory trust; US money-transmitter law imposes permissible-investment and customer-fund-protection duties. Commingling collapses the ring-fence that protects customers on insolvency.'
    FP_Mechanism: 'your product holds customer or merchant balances in the same account as operating funds, or outside a compliant bank escrow / safeguarding account, so on a shortfall or insolvency the customer money is not ring-fenced and is reachable by your creditors'
    FP_Impact: 'RBI can suspend the escrow-dependent authorisation and freeze flows; UK/EU regulators can direct remediation and impose penalties; on insolvency, commingled customer funds become general estate assets. this is a deposit-freeze / wind-down trigger.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product holds OR pools customer/merchant balances OR settles with a float. | CONDITION_2: Product serves India OR EU/UK OR US OR does not exclude those markets. | CONDITION_3: No evidence of a segregated bank escrow / safeguarding account separate from operating funds OR no safeguarding disclosure. | CONDITION_4: Operating or corporate funds can be drawn from the account holding customer balances. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Customer funds are held in a dedicated bank escrow/safeguarding account, segregated from operating funds, with published safeguarding method and auditor certification where applicable.'
    Provenance: 't1:FUND_001 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: PAY
    FIELD22: FUND
    FIELD23: 1
-
    Threat_ID: CUST_FUND_001
    Threat_Name: Safeguarding Shortfall on Held Client Assets
    Lane: A
    Archetype: CUST
    Surface: Funds-Custody
    Authority_IN: RBI escrow/nodal-account safeguarding norms for regulated intermediaries + RBI (Regulation of Payment Aggregators) Directions, 2025
    Authority_EU: E-Money Directive (Dir 2009/110/EC) Art. 7 / PSD2 Art. 10 safeguarding (UK FCA CASS-style statutory-trust reform staged through 2026)
    Authority_US: State custody / permissible-investment statutes for held client balances
    Velocity: ACTIVE_NOW
    Pain_Tier: T2
    Pain_Category: Uncapped Money
    Pain_Depth: Personal
    Status: Active
    Effective_Date: 2025-09-15
    Legal_Pain: 'Where a firm holds client money or assets, a safeguarding shortfall (under-reconciliation, mixing, or use of client funds for working capital) creates a restitution liability measured by the client shortfall, not a capped fine. Fit-and-proper and director-duty regimes can push exposure to principals. UK reform is moving safeguarding toward a statutory trust that hard-locks client funds against firm creditors.'
    FP_Mechanism: 'your product holds client balances or assets but cannot demonstrate daily reconciliation and a fully-funded segregated safeguarding pool, so a reconciliation gap or use of client funds for operations creates a shortfall the firm must make good'
    FP_Impact: 'restitution of the client shortfall (uncapped), supervisory action, and fit-and-proper/director exposure to principals. reconciliation and trust-status evidence become a hard gate for partner banks and acquirers.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product holds OR controls client money OR client assets OR a custodial balance. | CONDITION_2: Product serves India OR EU/UK OR US OR does not exclude those markets. | CONDITION_3: No evidence of daily reconciliation OR a segregated fully-funded safeguarding/custody pool OR independent safeguarding audit. | CONDITION_4: Client funds are usable for the firm working capital without a permissible-investment framework. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Client assets are fully segregated, reconciled at least daily, held under a safeguarding/trust arrangement, and evidenced by independent audit.'
    Provenance: 't1:FUND_002 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: CUST
    FIELD22: FUND
    FIELD23: 2
-
    Threat_ID: KYCV_AML_001
    Threat_Name: Inadequate KYC / CDD at Onboarding
    Lane: Both
    Archetype: KYCV
    Surface: KYC-Identity-Data
    Authority_IN: Prevention of Money Laundering Act, 2002 + PML (Maintenance of Records) Rules, 2005 + RBI Master Direction KYC (amended Jun & Aug 2025)
    Authority_EU: AMLD framework in national law (single-rulebook AMLR (Reg (EU) 2024/1624) applies 10 July 2027)
    Authority_US: Bank Secrecy Act + FinCEN Customer Due Diligence Rule (31 CFR 1010.230) + OFAC sanctions screening
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Criminal
    Status: Active
    Effective_Date: 2025-08-14
    Legal_Pain: 'AML/CFT onboarding failures are a criminal-adjacent, licence-threatening exposure. India PMLA and the RBI KYC Master Direction mandate risk-based CDD from reliable independent sources with periodic re-KYC; the US BSA/CDD rule requires identity verification and beneficial-ownership collection; sanctions screening is strict-liability under OFAC. Weak onboarding is the single most common trigger for supervisory action and rail loss.'
    FP_Mechanism: 'your onboarding does not perform risk-based identity verification, beneficial-ownership checks, and sanctions screening from reliable independent sources, so you admit customers you cannot adequately identify or screen, breaching PMLA / BSA / CDD duties'
    FP_Impact: 'PMLA and BSA carry criminal exposure and personal officer liability; regulators impose remediation, monitorships, and penalties; partner banks and card networks terminate for AML-program deficiency. this reaches principals, not just the entity.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product onboards customers OR opens accounts OR enables funds movement for identified users. | CONDITION_2: Product serves India OR US OR EU OR does not exclude those markets. | CONDITION_3: No evidence of risk-based CDD OR identity verification from reliable independent sources OR sanctions/PEP screening OR beneficial-ownership collection. | CONDITION_4: Accounts can transact before verification completes OR no periodic re-KYC is described. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Product performs documented risk-based CDD with reliable-source identity verification, sanctions/PEP screening, beneficial-ownership capture, and periodic re-KYC before or at account activation.'
    Provenance: 't1:AML_001 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: KYCV
    FIELD22: AML
    FIELD23: 1
-
    Threat_ID: PAY_AML_001
    Threat_Name: Transaction-Monitoring / SAR-STR Failure
    Lane: A
    Archetype: PAY
    Surface: Transaction-Data | Cross-Border
    Authority_IN: PMLA, 2002 + PML (Maintenance of Records) Rules + FIU-IND reporting (STR/CTR)
    Authority_EU: AMLD-based national suspicious-transaction reporting (AMLR from 10 July 2027) + Transfer of Funds Regulation (travel rule)
    Authority_US: Bank Secrecy Act Suspicious Activity Report (FinCEN Form 111, USD 2,000+ threshold) + FinCEN MSB AML-program duty
    Velocity: ACTIVE_NOW
    Pain_Tier: T1
    Pain_Category: Existential
    Pain_Depth: Criminal
    Status: Active
    Effective_Date: 2024-07-19
    Legal_Pain: 'Firms that move value must monitor transactions and file suspicious-activity/transaction reports. The US BSA requires SAR filing for suspicious activity at or above USD 2,000 for MSBs; India requires STR/CTR filing to FIU-IND; the EU requires suspicious-transaction reporting and travel-rule data on transfers. A monitoring/reporting gap is treated as a program failure supporting criminal and supervisory action.'
    FP_Mechanism: 'your product moves funds but has no described transaction-monitoring, thresholds, or suspicious-activity reporting workflow, so suspicious or sanctioned flows pass unreported, breaching SAR/STR and travel-rule duties'
    FP_Impact: 'BSA/PMLA program-failure enforcement with criminal exposure, per-violation penalties, and monitorships; loss of banking and network access. travel-rule gaps additionally block regulated crypto/cross-border rails.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product transmits OR settles OR routes funds OR crypto-asset transfers between parties. | CONDITION_2: Product serves India OR US OR EU OR cross-border corridors OR does not exclude those markets. | CONDITION_3: No evidence of transaction monitoring OR suspicious-activity/transaction reporting OR travel-rule originator/beneficiary data. | CONDITION_4: Cross-border transfers occur without originator/beneficiary information capture. | TRIGGER_IF: CONDITION_1 = TRUE AND CONDITION_3 = TRUE AND AT_LEAST_1_OF(CONDITION_2, CONDITION_4) = TRUE | EXCLUDE_IF: Product operates documented transaction monitoring with SAR/STR workflows and travel-rule data capture appropriate to the corridors served.'
    Provenance: 't1:AML_002 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: PAY
    FIELD22: AML
    FIELD23: 2
-
    Threat_ID: LEND_CRED_001
    Threat_Name: Predatory APR / Undisclosed All-In Cost
    Lane: A
    Archetype: LEND
    Surface: Consumer-Retail | Credit-Data
    Authority_IN: RBI (Digital Lending) Directions, 2025 (APR + all-in cost + penal-charge rules in the Key Fact Statement)
    Authority_EU: Consumer Credit Directive 2 (Dir (EU) 2023/2225) APR + total-cost-of-credit + creditworthiness (applies 20 Nov 2026)
    Authority_US: Truth in Lending Act / Regulation Z (12 CFR 1026) APR disclosure + state usury caps
    Velocity: ACTIVE_NOW
    Pain_Tier: T2
    Pain_Category: Uncapped Money
    Pain_Depth: Corporate
    Status: Active
    Effective_Date: 2025-05-01
    Legal_Pain: 'Consumer credit must disclose a true, all-in cost of borrowing and stay within usury limits. India Digital Lending Directions require an APR and full penal-charge disclosure in a Key Fact Statement before acceptance; TILA/Reg Z mandates an accurate APR; state usury caps void or penalise excess charges; EU CCD2 tightens APR and creditworthiness rules from 20 Nov 2026. Hidden fees that understate APR are a mis-statement with restitution and penalty exposure.'
    FP_Mechanism: 'your pricing surfaces a headline rate but buries processing, insurance, or penal charges so the real APR the borrower pays is materially higher than disclosed, and in India it is not in a compliant Key Fact Statement before acceptance'
    FP_Impact: 'refund/restitution of excess charges, penal-charge caps, RBI enforcement against the RE/LSP, and TILA statutory damages with class exposure in the US. usury breaches can void the interest entirely.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product extends consumer credit OR BNPL OR short-term loans with fees, interest, or penal charges. | CONDITION_2: Product serves India OR US OR EU OR does not exclude those markets. | CONDITION_3: No single all-in APR / total-cost figure is disclosed before acceptance OR fees are shown separately from the rate OR (India) no Key Fact Statement is presented pre-acceptance. | CONDITION_4: Penal / late / bounce charges are not disclosed as part of the cost of credit. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Product discloses a single all-in APR / total cost of credit (and in India a compliant Key Fact Statement) before the borrower accepts, within applicable usury limits.'
    Provenance: 't1:CRED_001 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: LEND
    FIELD22: CRED
    FIELD23: 1
-
    Threat_ID: LEND_CRED_002
    Threat_Name: Abusive Collections / Recovery Conduct
    Lane: Both
    Archetype: LEND
    Surface: Consumer-Retail
    Authority_IN: RBI (Digital Lending) Directions, 2025 + RBI Fair Practices Code / recovery-agent conduct norms
    Authority_EU: Consumer Credit Directive 2 (Dir (EU) 2023/2225) forbearance / arrears-handling duties (applies 20 Nov 2026)
    Authority_US: Fair Debt Collection Practices Act (15 U.S.C. section 1692) + state debt-collection statutes
    Velocity: ACTIVE_NOW
    Pain_Tier: T3
    Pain_Category: Deal Death
    Pain_Depth: Corporate
    Status: Active
    Effective_Date: 2025-05-01
    Legal_Pain: 'Collections conduct is tightly regulated. India digital-lending and fair-practices norms restrict recovery-agent harassment, contact hours, and third-party disclosure; the FDCPA gives US consumers a private right of action with statutory damages for abusive collection; CCD2 adds arrears-forbearance duties. Contact-list scraping and shaming tactics common in app-based lending are direct violations.'
    FP_Mechanism: 'your collections access the borrower contacts or location, contact third parties, or use pressure tactics outside permitted hours and channels, conduct the RBI fair-practices norms and the FDCPA treat as abusive'
    FP_Impact: 'FDCPA statutory damages plus fees and class exposure in the US; RBI action against the RE/LSP and app-store removal in India; reputational and partner-bank fallout. contact-scraping additionally triggers the privacy threats.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product performs OR arranges loan collections OR recovery OR arrears outreach. | CONDITION_2: Product serves India OR US OR EU OR does not exclude those markets. | CONDITION_3: Collections access borrower contacts/location OR contact third parties OR lack disclosed permitted-hours/channel limits and a grievance route. | CONDITION_4: No forbearance / hardship handling is described. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Collections follow a documented fair-practices policy limiting hours/channels, prohibit contact-scraping and third-party disclosure, and offer a forbearance and grievance route.'
    Provenance: 't1:CRED_002 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: LEND
    FIELD22: CRED
    FIELD23: 2
-
    Threat_ID: LEND_DISC_001
    Threat_Name: Missing Key Fact Statement / Pre-Contract Disclosure
    Lane: A
    Archetype: LEND
    Surface: Consumer-Retail | Credit-Data
    Authority_IN: RBI (Digital Lending) Directions, 2025 (mandatory digitally-signed Key Fact Statement before borrower acceptance)
    Authority_EU: Consumer Credit Directive 2 (Dir (EU) 2023/2225) SECCI / pre-contractual disclosure (applies 20 Nov 2026)
    Authority_US: Truth in Lending Act / Regulation Z (12 CFR 1026) pre-consummation disclosures
    Velocity: ACTIVE_NOW
    Pain_Tier: T3
    Pain_Category: Deal Death
    Pain_Depth: Corporate
    Status: Active
    Effective_Date: 2025-05-01
    Legal_Pain: 'Consumer lenders must give standardised pre-contract disclosure. India 2025 Directions require a one-page digitally-signed Key Fact Statement (APR, fees, cooling-off, full-terms link) captured before acceptance and auto-delivered to the borrower; TILA requires pre-consummation disclosures; CCD2 requires the SECCI. A missing or post-hoc KFS is a per-loan compliance defect that RBI actively enforces.'
    FP_Mechanism: 'your loan flow does not present a compliant Key Fact Statement / pre-contract disclosure before the borrower accepts, or captures acceptance before the borrower has seen the APR, fees, cooling-off period, and full terms'
    FP_Impact: 'per-loan RBI enforcement against the RE/LSP, unwinding/cooling-off exposure, and TILA statutory damages in the US. the KFS gap is one of the most cited digital-lending violations and stalls partner-bank and audit sign-off.'
    Lex_Nova_Fix: TBD/DEFERRED
    Hunter_Trigger: 'CONDITION_1: Product presents OR concludes consumer-loan/BNPL agreements. | CONDITION_2: Product serves India OR US OR EU OR does not exclude those markets. | CONDITION_3: No standardised pre-contract disclosure (India KFS / EU SECCI / TILA disclosure) is shown before acceptance OR terms appear only after acceptance. | CONDITION_4: No cooling-off / withdrawal right is disclosed where required. | TRIGGER_IF: CONDITION_1 = TRUE AND AT_LEAST_1_OF(CONDITION_3, CONDITION_4) = TRUE | EXCLUDE_IF: Product shows a compliant standardised pre-contract disclosure (KFS / SECCI / TILA) with APR, fees, cooling-off, and full-terms link before capturing acceptance, delivered to the borrower on execution.'
    Provenance: 't1:DISC_001 web-verified 2026-07 FinTech_Registry_Key v1.0'
    FIELD21: LEND
    FIELD22: DISC
    FIELD23: 1
