# =============================================================================
# FinTech_Threat_Registry.yaml  —  Phase 9 Exposure Registry (fintech package)
# -----------------------------------------------------------------------------
# Schema mirrors AI_THREAT_REGISTRY.yaml FIELD-FOR-FIELD so the Phase 9 / m11
# loader can consume it identically (matches on Archetype, Surface, Status,
# Hunter_Trigger, FIELD21/22/23; Threat_ID = Archetype_Subcat_Number).
#
# Archetype = fintech behavior_class code; Subcat = terminal-harm code;
# Surface = fintech surface tokens.
#
# COMPLETE: 44 threat rows across all 14 behavior classes and all 10 subcats.
#   Tranche 3 (12 rows) adds India + US DEPTH: fair-lending/ECOA, algorithmic-underwriting
#   bias, Military Lending Act, OFAC sanctions, RBI PA-CB cross-border, sponsor-bank/BaaS
#   third-party risk, NYDFS/GLBA/CERT-In cybersecurity, crypto tax (India 194S/115BBH +
#   US 1099-DA), IRDAI unfair-claims, unregistered SEBI RA/US adviser, Aadhaar eKYC, RBI PPI.
#   40 rows India-anchored, 39 rows US-anchored. (Note: US CTA/BOI intentionally omitted -
#   FinCEN Mar-2025 interim rule exempts US domestic companies; federal ECOA disparate-impact
#   narrowing eff. 21 Jul 2026 so fair-lending row is anchored on intentional-discrimination +
#   adverse-action + state disparate-impact + private right of action, which remain live.)
#   Tranche 1 (19 rows): LIC, FUND, AML, CRED, DISC, PRV + India-completeness
#     (RBI payment-data localisation, card-on-file tokenisation, digital-lending data-minimisation).
#   Tranche 2 (13 rows): FRD, MKT, SETL_H, CONS + behavior classes ISSU, BRKR,
#     TRAD, SETL, INSR, AGGR, plus 4 forward-dated Upcoming regime rows
#     (PSD3/PSR ~2028, EU AMLR 10 Jul 2027, EU CCD2 20 Nov 2026, India DPDP-core 13 May 2027).
# Status: 28 Active / 4 Upcoming. SETL_H is a compound subcat (FIELD22=SETL_H) carried
# in Threat_IDs as CUST_SETL_H_001 / SETL_SETL_H_001; FIELD21/22/23 are authoritative.
#
# Lex_Nova_Fix = TBD/DEFERRED for every row. Triad Authority_IN/EU/US; UK noted in cells.
# All anchors web-verified July 2026. Currency: MiCA CASP live 1 Jul 2026; RBI PA
# Directions 2025 + Digital Lending Directions 2025 in force; DPDP core duties 13 May 2027;
# PSD3/PSR ~2028; AMLR 10 Jul 2027; CCD2 20 Nov 2026; DORA in force; UK FCA safeguarding
# 7 May 2026; US CFPB diminished and Section 1033 enjoined, so US anchors use durable
# statutes (EFTA, TILA, FCRA, FDCPA, BSA, state MTL, FTC Act 5), not CFPB enforcement.
# =============================================================================
