schema: TARGET_PROFILE_REVIEW_DERIVATION_AUTHORITY_v7_PHASE2G_ROUTED_SOURCE_BOUNDARY
purpose: Target Profile Review derivation authority aligned to Phase 2G-routed 2A Target Profile source bucket, scoped target-profile lossless evidence, bounded legal_signal_derivation_profile use, public regulatory/grievance operating-context signals, and no Lane/domain-package derivation.
phase: TARGET_PROFILE_REVIEW
active_agent: agent_3_target_feature
compatibility_note: File name retained for backend compatibility. Governing phase name is Target Profile Review, and the live source boundary is Phase 2G-routed.

source_boundary:
  routing_authority: P2G_CENTRALIZED_PHASE_ROUTING_AUTHORITY
  route_id: ROUTE.PHASE3A.TARGET_PROFILE
  bucket_id: 2A_BUCKET_TARGET_PROFILE
  allowed_model_sources:
    - phase_route_runtime_packet
    - target_profile_source_index
    - lossless_root__homepage_landing
    - lossless_root__company_identity
    - lossless_root__pricing_commercial_availability
    - lossless_root__contact_notice
    - lossless_root__regulatory_licensing_status
    - lossless_root__grievance_complaints
    - legal_signal_derivation_profile
  navigation_only_sources:
    - phase_route_runtime_packet
    - target_profile_source_index
  evidence_sources:
    - lossless_root__homepage_landing
    - lossless_root__company_identity
    - lossless_root__pricing_commercial_availability
    - lossless_root__contact_notice
    - lossless_root__regulatory_licensing_status
    - lossless_root__grievance_complaints
  bounded_secondary_signal_sources:
    - legal_signal_derivation_profile
  allowed_reference_documents:
    - M7_TARGET_PROFILE_DERIVATION_AUTHORITY.yaml
    - Diligence_Field_Derivation_Registry.yml
    - FORENSIC_ANNEXURE_REGISTRY_v1_LOCKED.yaml
  forbidden_model_sources:
    - source_discovery_handoff
    - cartography_index
    - domain_selection_profile
    - active_run_package_manifest
    - legal_cartography_index
    - legal_doc_inventory
    - legal_doc_extraction_index
    - legal_doc_{DOC_TYPE}
    - m7_deterministic_legal_signal_overlay
    - lossless_root__about_company
    - lossless_root__legal_identity_notice
    - lossless_root__operator_entity_signals
    - lossless_root__supporting_company_signals
    - retired pre-cutover family artifacts
    - product/activity roots outside the scoped Target Profile Review evidence list
    - data-provenance roots

controlled_statuses:
  - FIELD_LIMITED
  - FIELD_NOT_PUBLIC
  - FIELD_CONFLICTED
  - FIELD_NOT_FOUND

lane_policy:
  lane_derivation_forbidden_in_target_profile_review: true
  business_context_lane_forbidden: true
  domain_derivation_layer_owns_domain_package_and_ai_mount: true

direct_legal_signal_policy:
  artifact: legal_signal_derivation_profile
  compatibility_status: PHASE2G_ROUTED_BOUNDED_SECONDARY_SIGNAL
  model_may_use_supported_field_rows_only: true
  model_must_not_read_raw_legal_sources: true
  direct_signal_is_not_legal_advice: true
  direct_signal_is_not_legal_sufficiency: true
  allowed_field_ids:
    - LGC.NOT.010
    - LGC.NOT.011
    - LGC.NOT.012
    - LGC.NOT.013
    - TP.JUR.003
    - TP.JUR.004
    - TP.JUR.005
    - TP.JUR.007
    - TP.JUR.008
  forbidden_field_families:
    - privacy_grievance_contact_signal_map
    - consent_manager_signal_map
  allowed_target_branches:
    - jurisdiction_notice
    - target_profile_limitations
  status_translation:
    DERIVED: use_value_if_target_profile_schema_permits
    DERIVED_WITH_LIMITATION: use_value_only_with_target_profile_limitation
    LOCATOR_FOUND_VALUE_NOT_VISIBLE: no_value_record_controlled_limitation
    SOURCE_NOT_PUBLIC: no_value_record_controlled_limitation
    SOURCE_CONFLICT: no_winner_record_conflict_limitation
    NOT_APPLICABLE_CONTEXTUAL: controlled_not_applicable_where_schema_permits
    NOT_DERIVED_AFTER_EXHAUSTIVE_SCAN: no_value_record_controlled_limitation

regulatory_grievance_signal_policy:
  branch: business_context
  public_regulatory_licensing_signal:
    field_id: TP.BIZ.009
    source_basis: scoped_target_lossless_evidence_only
    allowed_roots:
      - lossless_root__regulatory_licensing_status
      - lossless_root__company_identity
      - lossless_root__pricing_commercial_availability
      - lossless_root__contact_notice
    factual_signal_only: true
    forbidden_conclusions:
      - license_validity
      - license_requirement
      - applicable_regulator
      - regulatory_compliance_status
      - RBI_applicability
      - SEBI_applicability
      - FCA_authorisation_status
  public_grievance_complaints_signal:
    field_id: TP.BIZ.010
    source_basis: scoped_target_lossless_evidence_only
    allowed_roots:
      - lossless_root__grievance_complaints
      - lossless_root__contact_notice
      - lossless_root__regulatory_licensing_status
    factual_signal_only: true
    forbidden_conclusions:
      - grievance_sufficiency
      - grievance_compliance_status
      - ombudsman_requirement
      - statutory_complaint_obligation
      - regulator_applicability
  governing_law_and_venue_boundary:
    grievance_or_regulatory_roots_may_not_derive_governing_law: true
    grievance_or_regulatory_roots_may_not_derive_courts_venue: true
    governing_law_source_must_be_terms_customer_agreement_or_legal_terms: true
    courts_venue_source_must_be_terms_dispute_clause_or_legal_terms: true

selected_fields:
  target_identity.brand_name:
    field_id: TP.ID.001
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  target_identity.legal_entity_name:
    field_id: TP.ID.002
    source_basis: scoped_target_lossless_evidence
    direct_legal_signal_allowed: false
    regulatory_grievance_roots_may_support_locator_context: true
    unsupported_behavior: controlled_status_plus_limitation
  target_identity.entity_type:
    field_id: TP.ID.005
    source_basis: scoped_target_lossless_evidence
    regulatory_grievance_roots_may_support_locator_context: true
    unsupported_behavior: controlled_status_plus_limitation
  target_identity.reviewed_website:
    field_id: TP.ID.003
    source_basis: phase_route_runtime_packet_target_or_scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  target_identity.primary_domain:
    field_id: TP.ID.004
    source_basis: reviewed_website_or_phase_route_runtime_packet_target
    unsupported_behavior: controlled_status_plus_limitation
  jurisdiction_notice.registered_notice_location:
    field_id: TP.JUR.001
    source_basis: scoped_target_lossless_evidence_or_direct_legal_signal_only
    direct_legal_signal_allowed: true
    regulatory_grievance_roots_may_support_notice_address_context: true
    unsupported_behavior: controlled_status_plus_limitation
  jurisdiction_notice.governing_law:
    field_ids:
      - TP.JUR.003
      - TP.JUR.004
    source_basis: direct_legal_signal_only
    direct_legal_signal_allowed: true
    regulatory_grievance_roots_forbidden: true
    unsupported_behavior: controlled_status_plus_limitation
  jurisdiction_notice.courts_venue:
    field_id: TP.JUR.005
    source_basis: direct_legal_signal_only
    direct_legal_signal_allowed: true
    regulatory_grievance_roots_forbidden: true
    unsupported_behavior: controlled_status_plus_limitation
  business_context.business_category:
    field_id: TP.BIZ.001
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  business_context.primary_customer_type:
    field_id: TP.BIZ.002
    source_basis: scoped_target_lossless_evidence
    regulatory_grievance_roots_may_support_customer_context: true
    unsupported_behavior: controlled_status_plus_limitation
  business_context.market_type_candidate:
    field_id: TP.BIZ.003
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  business_context.industry_sector:
    field_id: TP.BIZ.004
    source_basis: scoped_target_lossless_evidence
    regulatory_grievance_roots_may_support_industry_context: true
    unsupported_behavior: controlled_status_plus_limitation
  business_context.regulated_sector_hints:
    field_id: TP.BIZ.005
    source_basis: scoped_target_lossless_evidence
    regulatory_grievance_roots_may_support_factual_sector_hint: true
    unsupported_behavior: empty_array_plus_limitation_when_material
  business_context.public_regulatory_licensing_signal:
    field_id: TP.BIZ.009
    source_basis: scoped_target_lossless_evidence
    output_boundary: factual_public_operating_context_signal_only
    unsupported_behavior: FIELD_LIMITED_or_NO_PUBLIC_SIGNAL_FOUND
  business_context.public_grievance_complaints_signal:
    field_id: TP.BIZ.010
    source_basis: scoped_target_lossless_evidence
    output_boundary: factual_public_route_visibility_signal_only
    unsupported_behavior: FIELD_LIMITED_or_NO_PUBLIC_SIGNAL_FOUND
  product_service_wrapper.high_level_offering:
    field_id: TP.WRAP.001
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  product_service_wrapper.primary_public_claim:
    field_id: TP.WRAP.002
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: controlled_status_plus_limitation
  product_service_wrapper.product_service_wrapper_names:
    field_id: TP.WRAP.003
    source_basis: scoped_target_lossless_evidence
    unsupported_behavior: empty_array_plus_limitation_when_material
  product_service_wrapper.delivery_model_signals:
    field_ids:
      - TP.WRAP.005
      - TP.WRAP.006
      - TP.WRAP.007
      - TP.WRAP.008
    source_basis: scoped_target_lossless_evidence
    regulatory_licensing_roots_may_support_partner_or_intermediary_delivery_signal: true
    unsupported_behavior: empty_array_plus_limitation_when_material
  target_profile_limitations:
    source_basis: controlled_statuses_and_source_boundary
    unsupported_behavior: array_required

hard_rules:
  - Target Profile Review must enter through Phase 2G routed 2A source bucket only.
  - Target Profile Review must not directly request source_discovery_handoff, cartography_index, domain_selection_profile, or active_run_package_manifest as model sources.
  - Target Profile Review must not request legal/governance family artifacts.
  - Target Profile Review must not request legal_cartography_index.
  - Target Profile Review must not request legal documents or legal lossless text.
  - Target Profile Review must not request m7_deterministic_legal_signal_overlay.
  - Target Profile Review must not request retired Phase 1 target roots including about_company, legal_identity_notice, operator_entity_signals, or supporting_company_signals.
  - Target Profile Review may use regulatory_licensing_status and grievance_complaints only as scoped target lossless evidence for factual operating-context and route-visibility signals.
  - Target Profile Review must not use regulatory_licensing_status or grievance_complaints to derive license validity, license requirement, applicable regulator, compliance status, statutory grievance sufficiency, governing law, or courts/venue.
  - Target Profile Review must not use direct legal signal rows for target_identity, business_context, product_service_wrapper, Lane, domain package, or AI overlay derivation.
  - Target Profile Review must not derive Lane, domain package, AI mount, archetype, surface, legal risk, compliance framework, exposure rows, threat triggers, or pain tier.
  - Target Profile Review must not block because legal/governance families are unavailable.
  - Missing direct legal signal data means controlled field status, not source repair.
  - Source repair is reserved for missing or corrupted scoped target lossless evidence artifacts.
