registry_id: DOMAIN_DERIVATION_REGISTRY_v0
registry_name: Domain Derivation Registry
schema_version: 0.1.0
status: LOCKED_DRAFT_FOR_PHASE_3B
owner_phase: P3_DOMAIN_DERIVATION_LAYER
purpose: >-
  Machine-derivable registry used by Phase 3B to derive primary domain package,
  AI package mount mode, and domain-owned fusion candidates. Phase 3B must remain
  domain-agnostic and must evaluate this registry rather than hardcoding domain logic.

runtime_doctrine:
  phase_3b_role: SEMANTIC_RULE_BOUND_DERIVATION_LAYER
  model_authority: RECOMMENDATION_ONLY
  validator_authority: LOCK_DECISION_AUTHORITY
  manifest_authority: WRITE_ONLY_AFTER_VALIDATION
  universal_evidence_rule:
    phase_2_indexes_are_navigation_only: true
    phase_2_indexes_are_evidence: false
    evidence_must_be_lossless_phase_1_artifacts: true
    downstream_phases_must_use_phase_2_navigation: true
  phase_3b_must_not_emit:
    - company_level_lane
    - ai_archetype_lock
    - registry_lane_lock
    - surface_lock
    - exposure_row_status
    - legal_conclusion
    - compliance_verdict
    - remediation_route

controlled_vocabularies:
  rule_type:
    - PRIMARY_DOMAIN
    - AI_MOUNT
    - FUSION_CANDIDATE
    - FALLBACK
  lock_scope:
    - PRIMARY_DOMAIN_LOCK
    - PACKAGE_MOUNT_ONLY
    - CANDIDATE_ONLY
    - NOT_VISIBLE
    - REVIEW_REQUIRED
  primary_domain_status:
    - LOCKED
    - LOCKED_WITH_LIMITATIONS
    - REVIEW_REQUIRED
    - REJECTED
    - NOT_EVALUATED
  ai_package_mount:
    - AI_PRIMARY
    - AI_OVERLAY_MOUNTED
    - AI_CANDIDATE_ONLY
    - AI_NOT_VISIBLE
  fusion_bucket_status:
    - FUSION_CANDIDATE_ONLY
    - FUSION_NOT_VISIBLE
    - FUSION_REVIEW_REQUIRED
  evidence_classes:
    allowed_lossless_classes:
      - lossless_product_evidence
      - lossless_technical_evidence
      - lossless_legal_or_control_evidence
      - lossless_api_or_documentation_evidence
      - lossless_activity_evidence
      - lossless_domain_evidence
      - lossless_evidence
      - lossless_evidence_review_complete
    forbidden_as_sole_basis:
      - index_only
      - generic_marketing_only
      - generic_ai_marketing_only
      - blog_only
      - seo_metadata_only
      - hiring_copy_only
      - investor_positioning_only
      - roadmap_only
      - customer_case_study_only
      - billing_only
      - generic_vertical_example_only
      - investor_relations_only

rule_schema:
  required_fields:
    - rule_id
    - rule_type
    - normalized_name
    - status
    - priority
    - conditions
    - trigger_if
    - exclude_if
    - evidence_policy
    - result
    - lock_scope
  condition_grammar:
    format: CONDITION_N_TO_TRIGGER_IF_TO_EXCLUDE_IF
    rules:
      - Each active rule must define at least one condition.
      - trigger_if must reference only declared condition ids or declared rule ids.
      - trigger_if may use AND, OR, NOT, and parentheses.
      - exclude_if must be present for every rule.
      - Conditions must be concrete, public-footprint-derivable criteria.
      - Conditions must not cite Phase 2 indexes as evidence.
      - Every fired condition must trace to admitted lossless evidence reached through Phase 2 navigation.

resolution_policy:
  evaluation_order:
    - PRIMARY_DOMAIN
    - AI_MOUNT
    - FUSION_CANDIDATE
    - FALLBACK
  primary_domain_resolution:
    - Evaluate all active PRIMARY_DOMAIN rules.
    - Apply exclude_if fences before priority comparison.
    - If exactly one PRIMARY_DOMAIN rule fires, lock or limit that primary domain according to its result.
    - If multiple PRIMARY_DOMAIN rules fire for the same reviewed offering after exclusions, resolve by priority only if the lower-priority rule is expressly fenced as a mechanism/use-case of the higher-priority rule.
    - If conflict remains, set primary_domain_status to REVIEW_REQUIRED.
  ai_mount_resolution:
    - If PRIMARY_DOMAIN_AI_GOVERNANCE fires, AI package mount is AI_PRIMARY and AI overlay is prohibited.
    - If a non-AI primary domain fires, evaluate AI_OVERLAY_MOUNTED, then AI_CANDIDATE_ONLY, then AI_NOT_VISIBLE.
    - AI_OVERLAY_MOUNTED is package availability only and does not trigger AI exposure rows.
  fusion_resolution:
    - Fusion candidates may be recorded only after non-AI primary domain and AI_OVERLAY_MOUNTED both fire.
    - Fusion candidates are owned by the locked primary domain package.
    - Fusion candidates never trigger exposure rows in Phase 3B.

rules:
  - rule_id: PRIMARY_DOMAIN_AI_GOVERNANCE
    rule_type: PRIMARY_DOMAIN
    package_id: ai-governance
    normalized_name: AI Product / AI Governance Primary Domain
    status: ACTIVE
    priority: 80
    conditions:
      C1: >-
        Admitted lossless evidence shows the target offers, sells, licenses, provides,
        exposes, integrates, or makes available a product, service, API, platform,
        application, model, agent, assistant, copilot, workflow, automation layer,
        or governance/control tool to external users, customers, developers,
        enterprises, or partners.
      C2: >-
        The reviewed offering performs or provides generative output, synthetic
        content, drafting, summarization, translation, code generation,
        image/audio/video generation, or other content generation.
      C3: >-
        The reviewed offering performs or provides classification, scoring,
        prediction, assessment, recommendation, ranking, eligibility support,
        prioritization, or automated decision support.
      C4: >-
        The reviewed offering performs or provides model/API access, LLM access,
        foundation model access, hosted model access, fine-tuning, embeddings,
        RAG, vector search, model routing, or multi-model orchestration.
      C5: >-
        The reviewed offering performs or provides agentic action, autonomous
        workflow execution, tool/API calling, external action execution, task
        automation, or system operation without per-step manual execution by the
        customer.
      C6: >-
        The reviewed offering performs or provides AI moderation, AI monitoring,
        AI security, AI optimization, biometric/signal processing, or AI
        governance/control functionality.
      C7: >-
        The AI capability is presented as the product/service wrapper or a core
        capability of the reviewed offering, not merely an internal operating tool.
      C8: >-
        Evidence appears in at least one admitted product-facing or legal/control
        source: product page, platform page, API/developer documentation,
        technical documentation, demo page, pricing page, terms/service
        description, AI policy, trust/security page, help center, integration
        documentation, or public product announcement tied to the reviewed
        offering.
    trigger_if: C1 AND (C2 OR C3 OR C4 OR C5 OR C6) AND C7 AND C8
    exclude_if:
      - >-
        A non-AI primary-domain rule fires for the same reviewed offering and the
        AI capability is only the mechanism used inside that non-AI vertical
        activity.
      - >-
        The only AI evidence is generic wording such as AI-powered, smart,
        intelligent, automated, next-gen, data-driven, SEO metadata, blog
        commentary, hiring copy, investor positioning, or roadmap language
        without a concrete current AI product/service capability.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_product_evidence
        - lossless_technical_evidence
        - lossless_legal_or_control_evidence
        - lossless_api_or_documentation_evidence
      forbidden_as_sole_basis:
        - index_only
        - blog_only
        - customer_case_study_only
        - seo_metadata_only
        - generic_marketing_only
    result:
      primary_domain_package: ai-governance
      primary_domain_status: LOCKED
      ai_package_mount: AI_PRIMARY
      ai_overlay_mount: PROHIBITED
    lock_scope: PRIMARY_DOMAIN_LOCK
    defer_to: null

  - rule_id: PRIMARY_DOMAIN_FINTECH
    rule_type: PRIMARY_DOMAIN
    package_id: fintech
    normalized_name: Financial Technology / Financial Services Primary Domain
    status: ACTIVE
    priority: 90
    conditions:
      C1: >-
        Admitted lossless evidence shows the target offers, enables, facilitates,
        intermediates, supports, provides infrastructure for, or operates a
        financial product, financial service, financial workflow, or financial
        transaction activity.
      C2: >-
        The reviewed offering involves payments, money movement, payment
        acceptance, payouts, wallets, stored value, settlement, merchant
        acquiring, refunds, chargebacks, or transaction processing.
      C3: >-
        The reviewed offering involves lending, credit, BNPL, underwriting,
        credit scoring, affordability review, loan origination, collections,
        repayment, or borrower workflow.
      C4: >-
        The reviewed offering involves KYC, AML, sanctions screening, fraud
        screening for financial transactions, identity verification for financial
        access, onboarding for financial services, or compliance workflow for
        financial institutions.
      C5: >-
        The reviewed offering involves brokerage, trading, investment, wealth
        management, portfolio management, investment advice, securities workflow,
        or capital-markets activity.
      C6: >-
        The reviewed offering involves insurance, insurtech workflow, policy
        issuance, claims, risk pricing, or insurance distribution.
      C7: >-
        The reviewed offering involves customer funds, client assets, custody,
        safeguarding, partner-bank route, financial account infrastructure, or
        regulated account/wallet infrastructure.
      C8: >-
        The reviewed offering involves financial data infrastructure, open
        banking, account aggregation, financial API, transaction-data enrichment,
        bank connectivity, or financial-data analytics as a product/service.
      C9: >-
        The financial activity is part of the target's own product/service wrapper
        offered to customers, users, merchants, borrowers, lenders, investors,
        financial institutions, platforms, or partners.
      C10: >-
        Evidence appears in at least one admitted product-facing or legal/control
        source: product page, pricing page, documentation, legal terms, user
        agreement, disclosure page, help center, API docs, integration docs,
        partner/bank page, compliance page, trust page, or equivalent source tied
        to the target's actual offering.
    trigger_if: C1 AND (C2 OR C3 OR C4 OR C5 OR C6 OR C7 OR C8) AND C9 AND C10
    exclude_if:
      - >-
        The only financial signal is subscription billing, generic pricing,
        payment collection for the target's own SaaS fees, investor relations,
        customer logos, blog content, a case study, or a financial vertical
        example for a non-financial product.
      - >-
        The target's actual reviewed offering is an AI product and finance appears
        only as a customer use case, demo, industry page, or example vertical.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_product_evidence
        - lossless_legal_or_control_evidence
        - lossless_api_or_documentation_evidence
        - lossless_domain_evidence
      forbidden_as_sole_basis:
        - index_only
        - billing_only
        - blog_only
        - customer_case_study_only
        - investor_relations_only
        - generic_vertical_example_only
    result:
      primary_domain_package: fintech
      primary_domain_status: LOCKED
      ai_package_mount: EVALUATE_SEPARATELY
    lock_scope: PRIMARY_DOMAIN_LOCK
    defer_to: null

  - rule_id: AI_OVERLAY_MOUNTED
    rule_type: AI_MOUNT
    package_id: ai-native
    normalized_name: AI Capability Overlay Mounted
    status: ACTIVE
    priority: 70
    conditions:
      C1: >-
        A non-AI primary domain is locked or locked-with-limitations.
      C2: >-
        Admitted lossless evidence shows the target's product/service uses or
        provides generative output, synthetic content, drafting, summarization,
        translation, code generation, image/audio/video generation, or other
        content generation.
      C3: >-
        Admitted lossless evidence shows the target's product/service uses or
        provides classification, scoring, prediction, assessment,
        recommendation, ranking, eligibility support, prioritization, or
        automated decision support.
      C4: >-
        Admitted lossless evidence shows the target's product/service uses or
        provides model/API access, LLM access, hosted model access, fine-tuning,
        embeddings, RAG, vector search, model routing, or multi-model
        orchestration.
      C5: >-
        Admitted lossless evidence shows the target's product/service uses or
        provides agentic action, autonomous workflow execution, tool/API calling,
        external action execution, task automation, or system operation without
        per-step manual execution by the customer.
      C6: >-
        Admitted lossless evidence shows the target's product/service uses or
        provides AI moderation, AI monitoring, AI security, AI optimization,
        biometric/signal processing, or AI governance/control functionality.
      C7: >-
        The AI function is tied to an actual product activity, user workflow,
        customer output, operational decision, API function, automation flow, or
        service delivery mechanism.
      C8: >-
        The AI function appears in at least one admitted product-facing or
        legal/control source: product page, feature page, API/developer docs,
        technical docs, demo, terms/service description, privacy/data-processing
        description, help docs, trust docs, integration docs, or equivalent
        source tied to the reviewed offering.
    trigger_if: C1 AND (C2 OR C3 OR C4 OR C5 OR C6) AND C7 AND C8
    exclude_if:
      - Primary domain is ai-governance.
      - >-
        AI appears only as generic AI-powered wording, SEO metadata, blog/news
        content, hiring copy, investor positioning, vague future roadmap, or
        untied marketing language without current product/activity connection.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_product_evidence
        - lossless_technical_evidence
        - lossless_legal_or_control_evidence
        - lossless_api_or_documentation_evidence
      forbidden_as_sole_basis:
        - index_only
        - blog_only
        - seo_metadata_only
        - hiring_copy_only
        - investor_positioning_only
        - roadmap_only
        - generic_marketing_only
    result:
      ai_package_mount: AI_OVERLAY_MOUNTED
      ai_overlay_status: LOCKED_FOR_PACKAGE_MOUNT_ONLY
    lock_scope: PACKAGE_MOUNT_ONLY
    defer_to: PHASE_5_ACTIVITY_PROFILE_FOR_ARCHETYPE_LANE_SURFACE_AND_EXPOSURE_ROUTING

  - rule_id: AI_CANDIDATE_ONLY
    rule_type: AI_MOUNT
    package_id: ai-native
    normalized_name: Weak AI Signal / Candidate Only
    status: ACTIVE
    priority: 40
    conditions:
      C1: >-
        Admitted lossless evidence contains AI-adjacent wording or signal such as
        AI-powered, artificial intelligence, machine learning, model, LLM,
        generative, smart, intelligent, automated, assistant, copilot, agent,
        prediction, ranking, recommendation, or automation.
      C2: >-
        The evidence does not identify a concrete current AI product activity,
        workflow, output, model function, decision function, API behavior,
        user-facing capability, or service-delivery mechanism.
    trigger_if: C1 AND C2
    exclude_if:
      - PRIMARY_DOMAIN_AI_GOVERNANCE fires.
      - AI_OVERLAY_MOUNTED fires.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_evidence
      forbidden_as_sole_basis:
        - index_only
    result:
      ai_package_mount: AI_CANDIDATE_ONLY
    lock_scope: CANDIDATE_ONLY
    defer_to: PHASE_5_ACTIVITY_PROFILE_OR_PHASE_12_QUALIFIED_REVIEW_IF_PRIVATE_CONFIRMATION_IS_NEEDED

  - rule_id: AI_NOT_VISIBLE
    rule_type: AI_MOUNT
    package_id: ai-native
    normalized_name: No Visible AI Capability Signal
    status: ACTIVE
    priority: 10
    conditions:
      C1: >-
        No admitted lossless evidence contains AI function wording, AI product
        description, AI capability, AI model reference, AI workflow, or
        AI-adjacent signal.
    trigger_if: C1
    exclude_if:
      - PRIMARY_DOMAIN_AI_GOVERNANCE fires.
      - AI_OVERLAY_MOUNTED fires.
      - AI_CANDIDATE_ONLY fires.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_evidence_review_complete
      forbidden_as_sole_basis:
        - index_only
    result:
      ai_package_mount: AI_NOT_VISIBLE
    lock_scope: NOT_VISIBLE
    defer_to: null

  - rule_id: DOMAIN_FUSION_CANDIDATE
    rule_type: FUSION_CANDIDATE
    package_id: locked_primary_domain_package
    normalized_name: Domain-Owned AI Fusion Candidate
    status: ACTIVE
    priority: 60
    conditions:
      C1: A non-AI primary domain is locked or locked-with-limitations.
      C2: AI_OVERLAY_MOUNTED fires.
      C3: >-
        Admitted lossless evidence indicates AI is used inside an activity
        belonging to the locked primary domain.
      C4: >-
        The candidate issue depends on both the primary-domain activity and AI
        mechanics.
      C5: >-
        The legal or control obligation, if later confirmed, would be created by
        the primary domain's law, regulator, control framework, or sector duty
        rather than by general AI/product law alone.
    trigger_if: C1 AND C2 AND C3 AND C4 AND C5
    exclude_if:
      - The issue is fully explainable as pure AI exposure without domain-law dependence.
      - The issue is fully explainable as pure domain exposure without AI mechanics.
      - AI package mount is AI_CANDIDATE_ONLY or AI_NOT_VISIBLE.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_product_evidence
        - lossless_activity_evidence
        - lossless_domain_evidence
      forbidden_as_sole_basis:
        - index_only
        - generic_ai_marketing_only
    result:
      fusion_bucket_status: FUSION_CANDIDATE_ONLY
      fusion_owner: locked_primary_domain_package
    lock_scope: CANDIDATE_ONLY
    defer_to: PHASE_5_ACTIVITY_PROFILE_AND_PHASE_9_EXPOSURE_PROFILE

  - rule_id: NO_SUPPORTED_PRIMARY_DOMAIN_LOCK
    rule_type: FALLBACK
    package_id: null
    normalized_name: No Supported Primary Domain Lock
    status: ACTIVE
    priority: 0
    conditions:
      C1: No implemented PRIMARY_DOMAIN rule fires.
      C2: >-
        Evidence is too thin, gated, inaccessible, contradictory, or points to a
        domain package that does not exist yet.
    trigger_if: C1 OR C2
    exclude_if:
      - PRIMARY_DOMAIN_AI_GOVERNANCE fires.
      - PRIMARY_DOMAIN_FINTECH fires.
    evidence_policy:
      must_cite_lossless_evidence: true
      phase_2_index_as_evidence: FORBIDDEN
      acceptable_source_classes:
        - lossless_evidence_review_complete
      forbidden_as_sole_basis:
        - index_only
    result:
      primary_domain_status: REVIEW_REQUIRED
      active_run_package_manifest_status: PROVISIONAL_OR_LIMITED
    lock_scope: REVIEW_REQUIRED
    defer_to: PHASE_12_QUALIFIED_REVIEW_OR_PACKAGE_BUILD

validator_requirements:
  - Every active PRIMARY_DOMAIN rule package_id must exist in the package catalog.
  - Every active primary domain package must have exactly one active PRIMARY_DOMAIN rule.
  - Every active rule must have at least one condition.
  - Every active rule must have exactly one trigger_if expression.
  - Every active rule must have at least one exclude_if fence.
  - trigger_if may use AND, OR, NOT, and parentheses, but only declared condition ids and allowed declared rule references.
  - exclude_if may reference declared rules, declared evidence classes, or explicit source exclusions.
  - No rule may cite Phase 2 index rows as evidence.
  - AI_PRIMARY and AI_OVERLAY_MOUNTED cannot both be active for the same run.
  - DOMAIN_FUSION_CANDIDATE must resolve fusion_owner to the locked primary domain package.
  - Phase 3B code must not hardcode primary domain names except to validate registry/package-catalog consistency.
