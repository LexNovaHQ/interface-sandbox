package_lifecycle_manifest:
  schema_version: DOMAIN_PACKAGE_LIFECYCLE_v1
  status: LOCKED
  authority: EXECUTABLE_DOMAIN_PACKAGE_MOUNT_ELIGIBILITY
  catalog_path: references/domain-packages/package-catalog.v0.json
  doctrine:
    model_derives_primary_domain_and_overlays: true
    registry_conditions_trigger_if_and_exclude_if_support_model_reasoning: true
    deterministic_layer_validates_structure_evidence_consistency_and_mount_eligibility_only: true
    deterministic_layer_must_not_select_or_replace_model_domain_judgment: true
    every_catalog_primary_domain_is_derivable_in_phase3b: true
    package_mounting_requires_installed_asset_bundle: true
    package_promotion_requires_complete_asset_bundle: true
    placeholder_registry_keys_forbidden: true
    operator_domain_selection_forbidden: true
    unresolved_primary_after_reinvestigation_is_non_blocking: true
    valid_ai_overlay_may_continue_without_resolved_primary: true
  lifecycle_values:
    - ACTIVE_E2E
    - ACTIVE_REPORT_ONLY
    - DECLARED_NOT_INSTALLED
    - FALLBACK_ONLY
  required_asset_bundle_for_active_e2e:
    - registry_key
    - primary_domain_rule
    - activity_taxonomy
    - domain_control_obligations
    - obligation_navigation_catalog
    - threat_registry_binding
    - threat_registry
    - qr_bridge_registry
    - document_template_manifest
    - document_injection_map
    - production_fixtures
  packages:
    ai-governance:
      lifecycle: ACTIVE_E2E
      derivable_in_phase3b: true
      mountable_downstream: true
      downstream_delivery_mode: FULL_REVIEW_READY
      phase10_enabled: true
      phase13_enabled: true
      phase16_enabled: true
    fintech:
      lifecycle: ACTIVE_REPORT_ONLY
      derivable_in_phase3b: true
      mountable_downstream: true
      downstream_delivery_mode: REPORT_ONLY
      phase10_enabled: true
      phase13_enabled: false
      phase16_enabled: false
      limitation: FinTech QR bridge and Review-Ready document package are not installed.
    saas: &not_installed
      lifecycle: DECLARED_NOT_INSTALLED
      derivable_in_phase3b: true
      mountable_downstream: false
      downstream_delivery_mode: UNIVERSAL_REPORT_ONLY
      phase10_enabled: false
      phase13_enabled: false
      phase16_enabled: false
      limitation: Domain may be derived semantically, but no executable domain package is installed.
    healthtech: *not_installed
    hrtech: *not_installed
    legaltech: *not_installed
    edtech: *not_installed
    marketplace: *not_installed
    ecommerce: *not_installed
    cybersecurity: *not_installed
    developer-tools: *not_installed
    data-infrastructure: *not_installed
    enterprise-software: *not_installed
    consumer-app: *not_installed
    other-technology: *not_installed
    unknown:
      lifecycle: FALLBACK_ONLY
      derivable_in_phase3b: false
      mountable_downstream: false
      downstream_delivery_mode: UNIVERSAL_REPORT_ONLY
      phase10_enabled: false
      phase13_enabled: false
      phase16_enabled: false
      limitation: Used only as a non-blocking unresolved-primary disposition after targeted reinvestigation.
